name: Sovereign-Wissam-Engine

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-export-ios-ui:
    name: Build Sovereign Dylib (Strict iOS Hooks)
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download & Build Dobby Framework
        run: |
          echo "📥 Fetching Dobby Framework..."
          git clone --depth=1 https://github.com/jmpews/Dobby.git
          cd Dobby
          mkdir build && cd build
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          cmake .. -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_PROCESSOR=arm64 -DCMAKE_OSX_SYSROOT=$IOS_SDK -DDOBBY_GENERATE_SHARED=OFF -DDOBBY_DEBUG=OFF
          make -j4
          cd ../..
          cp Dobby/include/dobby.h .
          cp Dobby/build/libdobby.a .
          echo "✅ Dobby Framework Ready."

      - name: Generate Sovereign Objective-C++ Source
        run: |
          cat << 'EOF_CPP' > sovereign_dylib.mm
          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #include <mach-o/dyld.h>
          #include <dlfcn.h>
          #include <fcntl.h>
          #include <stdarg.h>
          #include <iostream>
          #include <string>
          #include <chrono>
          #include <iomanip>
          #include <sstream>
          
          #include "dobby.h"

          using namespace std;

          // --- واجهة المستخدم العالمية ---
          UITextView *terminalView;
          UIView *menuView;
          UIButton *floatingBtn;
          UIButton *copyBtn;

          void PrintToScreen(string text) {
              NSString *nsText = [NSString stringWithUTF8String:text.c_str()];
              dispatch_async(dispatch_get_main_queue(), ^{
                  if (terminalView) {
                      NSString *currentText = terminalView.text;
                      if (currentText.length > 10000) {
                          currentText = [currentText substringFromIndex:currentText.length - 4000];
                      }
                      terminalView.text = [NSString stringWithFormat:@"%@\n%@", currentText, nsText];
                      NSRange range = NSMakeRange(terminalView.text.length, 0);
                      [terminalView scrollRangeToVisible:range];
                  }
              });
          }

          void logEvent(string type, string target, string details) {
              auto now = chrono::system_clock::to_time_t(chrono::system_clock::now());
              stringstream ss;
              ss << put_time(localtime(&now), "%H:%M:%S");
              string logMsg = "[" + ss.str() + "] [" + type + "] " + target + " -> " + details;
              PrintToScreen(logMsg);
          }

          // =========================================================================
          // 🎯 قسم المهندس وسام (اعتراض دوال نظام iOS الحقيقية 100%)
          // =========================================================================

          // دالة Hook لاعتراض أي ملف تحاول اللعبة فتحه في الرام
          int (*orig_open)(const char *path, int oflag, ...);
          int my_open(const char *path, int oflag, ...) {
              va_list args;
              va_start(args, oflag);
              int mode = va_arg(args, int);
              va_end(args);

              if (path != nullptr) {
                  string filePath(path);
                  
                  // صيد ملفات iOS الحساسة فقط لكي لا تنفجر الشاشة
                  if (filePath.find("ShadowTrackerExtra") != string::npos || 
                      filePath.find(".pak") != string::npos || 
                      filePath.find("Enchos") != string::npos ||
                      filePath.find(".json") != string::npos ||
                      filePath.find(".dat") != string::npos) {
                      
                      string fileName = filePath.substr(filePath.find_last_of("/") + 1);
                      logEvent("FILE_ACCESS", "SYS_OPEN", "Reading File: " + fileName);
                  }
              }
              
              return orig_open(path, oflag, mode);
          }

          // دالة Hook لاعتراض تحميل المكتبات الديناميكية (iOS dylib & frameworks)
          void* (*orig_dlopen)(const char* path, int mode);
          void* my_dlopen(const char* path, int mode) {
              if (path != nullptr) {
                  string libPath(path);
                  
                  // التركيز على مكتبات آيفون حصراً (.dylib و .framework)
                  if (libPath.find(".dylib") != string::npos || 
                      libPath.find(".framework") != string::npos || 
                      libPath.find("tersafe") != string::npos ||
                      libPath.find("GCloudCore") != string::npos) {
                      
                      string libName = libPath.substr(libPath.find_last_of("/") + 1);
                      logEvent("DYLIB_LOAD", "SYS_DLOPEN", "iOS Library Loaded: " + libName);
                  }
              }
              return orig_dlopen(path, mode);
          }

          void setupRealHooks() {
              logEvent("DOBBY", "ENGINE", "Planting Hooks in iOS C Standard Library...");
              
              void* open_ptr = dlsym(RTLD_DEFAULT, "open");
              if (open_ptr) {
                  DobbyHook(open_ptr, (void*)my_open, (void**)&orig_open);
                  logEvent("HOOK_SUCCESS", "SYS_OPEN", "iOS File reads intercepted.");
              }

              void* dlopen_ptr = dlsym(RTLD_DEFAULT, "dlopen");
              if (dlopen_ptr) {
                  DobbyHook(dlopen_ptr, (void*)my_dlopen, (void**)&orig_dlopen);
                  logEvent("HOOK_SUCCESS", "SYS_DLOPEN", "iOS Dylib loads intercepted.");
              }
              
              uintptr_t slide = _dyld_get_image_vmaddr_slide(0);
              stringstream ss;
              ss << "Real ASLR Slide Address: 0x" << hex << uppercase << slide;
              logEvent("MEM_INFO", "ASLR_BASE", ss.str());
          }
          // =========================================================================

          // --- بناء الواجهة المرئية (الخدود الطويلة) ---
          @interface SovereignMenu : NSObject
          + (instancetype)sharedInstance;
          - (void)setupUI;
          - (void)copyTerminalData;
          @end

          @implementation SovereignMenu
          + (instancetype)sharedInstance {
              static SovereignMenu *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{ shared = [[self alloc] init]; });
              return shared;
          }

          - (void)setupUI {
              UIWindow *mainWindow = nil;
              #pragma clang diagnostic push
              #pragma clang diagnostic ignored "-Wdeprecated-declarations"
              mainWindow = [UIApplication sharedApplication].keyWindow;
              #pragma clang diagnostic pop
              
              if (!mainWindow) return;

              floatingBtn = [UIButton buttonWithType:UIButtonTypeCustom];
              floatingBtn.frame = CGRectMake(20, 50, 50, 50);
              floatingBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.0 blue:0.0 alpha:0.8]; 
              floatingBtn.layer.cornerRadius = 25;
              floatingBtn.layer.borderWidth = 2;
              floatingBtn.layer.borderColor = [UIColor greenColor].CGColor;
              [floatingBtn setTitle:@"S" forState:UIControlStateNormal];
              [floatingBtn setTitleColor:[UIColor greenColor] forState:UIControlStateNormal];
              floatingBtn.titleLabel.font = [UIFont boldSystemFontOfSize:24];
              [floatingBtn addTarget:self action:@selector(toggleMenu) forControlEvents:UIControlEventTouchUpInside];
              
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(dragBtn:)];
              [floatingBtn addGestureRecognizer:pan];

              CGFloat width = mainWindow.bounds.size.width * 0.85; 
              CGFloat height = mainWindow.bounds.size.height * 0.45;
              menuView = [[UIView alloc] initWithFrame:CGRectMake((mainWindow.bounds.size.width - width)/2, 60, width, height)];
              menuView.backgroundColor = [UIColor colorWithWhite:0.0 alpha:0.9];
              menuView.layer.cornerRadius = 8;
              menuView.layer.borderWidth = 2;
              menuView.layer.borderColor = [UIColor redColor].CGColor; 
              menuView.hidden = YES;

              UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(10, 5, width - 80, 25)];
              title.text = @"[ SOVEREIGN V200K - iOS MACH-O HOOKS ]";
              title.textColor = [UIColor redColor];
              title.font = [UIFont fontWithName:@"Courier-Bold" size:12];
              [menuView addSubview:title];

              copyBtn = [UIButton buttonWithType:UIButtonTypeSystem];
              copyBtn.frame = CGRectMake(width - 65, 5, 55, 25);
              copyBtn.backgroundColor = [UIColor colorWithRed:0.0 green:0.3 blue:0.0 alpha:1.0];
              copyBtn.layer.borderWidth = 1;
              copyBtn.layer.borderColor = [UIColor greenColor].CGColor;
              [copyBtn setTitle:@"COPY" forState:UIControlStateNormal];
              [copyBtn setTitleColor:[UIColor greenColor] forState:UIControlStateNormal];
              copyBtn.titleLabel.font = [UIFont fontWithName:@"Courier-Bold" size:12];
              [copyBtn addTarget:self action:@selector(copyTerminalData) forControlEvents:UIControlEventTouchUpInside];
              [menuView addSubview:copyBtn];

              UIView *separator = [[UIView alloc] initWithFrame:CGRectMake(0, 35, width, 1)];
              separator.backgroundColor = [UIColor redColor];
              [menuView addSubview:separator];

              terminalView = [[UITextView alloc] initWithFrame:CGRectMake(5, 40, width - 10, height - 45)];
              terminalView.backgroundColor = [UIColor clearColor];
              terminalView.textColor = [UIColor cyanColor]; 
              terminalView.font = [UIFont fontWithName:@"Courier" size:11];
              terminalView.editable = NO;
              terminalView.selectable = YES; 
              [menuView addSubview:terminalView];

              [mainWindow addSubview:menuView];
              [mainWindow addSubview:floatingBtn];
              
              PrintToScreen("============================================");
              PrintToScreen("  SOVEREIGN iOS ENGINE INJECTED");
              PrintToScreen("  DEVELOPER: ENG. WISSAM (BASRAH CYBER LABS)");
              PrintToScreen("============================================");
              
              setupRealHooks();
          }

          - (void)toggleMenu {
              menuView.hidden = !menuView.hidden;
          }

          - (void)copyTerminalData {
              UIPasteboard *pasteboard = [UIPasteboard generalPasteboard];
              pasteboard.string = terminalView.text;
              
              [copyBtn setTitle:@"OK!" forState:UIControlStateNormal];
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [copyBtn setTitle:@"COPY" forState:UIControlStateNormal];
              });
          }

          - (void)dragBtn:(UIPanGestureRecognizer *)recognizer {
              UIView *view = recognizer.view;
              CGPoint translation = [recognizer translationInView:view.superview];
              view.center = CGPointMake(view.center.x + translation.x, view.center.y + translation.y);
              [recognizer setTranslation:CGPointMake(0, 0) inView:view.superview];
          }
          @end

          __attribute__((constructor))
          void onSovereignInject() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  [[SovereignMenu sharedInstance] setupUI];
              });
          }
          EOF_CPP

      - name: Compile Objective-C++ Dylib with Dobby (arm64)
        run: |
          echo "🔥 Building Sovereign Visual Dylib + Dobby for iPhone..."
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang++ -x objective-c++ -std=c++17 -arch arm64 -isysroot $IOS_SDK -miphoneos-version-min=13.0 -fobjc-arc -dynamiclib -framework Foundation -framework UIKit -framework CoreGraphics -L. -ldobby sovereign_dylib.mm -o SovereignEngine.dylib
          echo "✅ Compilation Successful!"

      - name: Upload iOS Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Real-Hooks-Dylib
          path: SovereignEngine.dylib
          retention-days: 5
