
name: 🐲 DRAGON HACK - ESIGN SAFE BUILDER (iOS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build_dragon:
    name: صهر محرك دراكون (محمد الشمري)
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      # ========================================================
      # 1. التوليد البرمجي للمحرك الآمن (Objective-C++)
      # ========================================================
      - name: 📝 توليد محرك دراكون (wsam.mm)
        run: |
          cat << 'EOF' > wsam.mm
          // 🛠️ إضافة التعريفات اللازمة لحل مشاكل أبل
          #define _DARWIN_C_SOURCE 
          
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <Metal/Metal.h>
          #import <MetalKit/MetalKit.h>
          #include <iostream>
          #include <string>
          #include <thread>
          #include <vector>
          #include <chrono>
          #include <sys/socket.h> 
          #include <netinet/in.h>
          #include <arpa/inet.h>
          #include <mach-o/dyld.h> 
          #include <dlfcn.h>
          #include <unistd.h>
          #include "imgui.h"
          #include "imgui_impl_metal.h"
          #include "dobby.h"
          #include "json.hpp"

          using json = nlohmann::json;
          using namespace std;

          // ==========================================================
          // 1. [رابط السيرفر] - ضع رابط لوحة التحكم الخاصة بك هنا
          // ==========================================================
          const string SERVER_URL = "http://34.204.178.160/panel.php?api=check&key=";
          
          // متغيرات النظام
          char g_KeyInput[32] = "SHAMMARI-VIP-16X";
          bool g_IsLoggedIn = false;
          bool g_Connected = false;
          bool g_Checking = false;
          bool g_MenuOpen = true;
          bool g_Maintenance = false;

          string g_SubStart = "--/--/----", g_SubEnd = "--/--/----";

          // ==========================================================
          // 2. [إحداثيات الرادار والمميزات]
          // ==========================================================
          uintptr_t GWORLD_ADDR = 0x11223344; 
          uintptr_t GNAMES_ADDR = 0x55667788; 

          uintptr_t OFF_ACTOR_ARRAY = 0xA0;    
          uintptr_t OFF_HEALTH      = 0x988;   
          uintptr_t OFF_NAME        = 0x640;   
          uintptr_t OFF_BONE        = 0x5B0;   
          uintptr_t OFF_VEHICLES    = 0x180;   
          uintptr_t OFF_LOOT        = 0x220;   
          
          uintptr_t OFF_NO_RECOIL   = 0x1A2B3C; 
          uintptr_t OFF_AIMBOT      = 0x4D5E6F; 

          // ==========================================================
          // 3. [برمجية حظر الروابط]
          // ==========================================================
          bool g_BypassEnabled = true; 
          bool g_OnlineBypass = false; 

          vector<string> BlockedURLs = { 
              "log.cheat-detection.com", 
              "anticheat.pubg.com", 
              "crash-report.tencent.com"
          };

          static int (*Orig_Connect)(int, const struct sockaddr*, socklen_t);
          int Hook_Connect(int s, const struct sockaddr* name, socklen_t namelen) {
              if ((g_BypassEnabled || g_OnlineBypass) && name->sa_family == AF_INET) {
                  struct sockaddr_in* addr = (struct sockaddr_in*)name;
                  char* ip = inet_ntoa(addr->sin_addr);
                  
                  for (const auto& blocked : BlockedURLs) {
                      // if (strstr(ip, blocked.c_str())) return -1; 
                  }
              }
              return Orig_Connect(s, name, namelen);
          }

          // ==========================================================
          // 4. [مكان إضافة الهوكات الخاصة بك]
          // ==========================================================
          void InstallHooksSafe() {
              void* handle = dlopen("/usr/lib/libSystem.B.dylib", RTLD_NOW);
              if (handle) {
                  void* connect_ptr = dlsym(handle, "connect");
                  if (connect_ptr) {
                      DobbyHook(connect_ptr, (void*)Hook_Connect, (void**)&Orig_Connect);
                  }
              }
          }

          // ==========================================================
          // 5. الاتصال والمزامنة (Server API)
          // ==========================================================
          void SyncWithServer() {
              g_Checking = true; 
              @autoreleasepool {
                  NSURL *url = [NSURL URLWithString:[NSString stringWithUTF8String:(SERVER_URL + string(g_KeyInput)).c_str()]];
                  NSData *data = [NSData dataWithContentsOfURL:url];
                  if(data) {
                      try {
                          auto res = json::parse(string((char*)[data bytes], [data length]));
                          if(res["server_state"] == "danger") g_Maintenance = true;
                          else g_Maintenance = false;

                          if(res["status"] == "success") {
                              g_Connected = true;
                              g_IsLoggedIn = true;
                              if(res.contains("online_bypass")) g_OnlineBypass = res["online_bypass"].get<bool>();
                              if(res.contains("offsets")) GWORLD_ADDR = std::stoull(res["offsets"]["gworld"].get<string>(), 0, 16);
                          }
                      } catch(...) { g_Connected = false; }
                  } else { g_Connected = false; }
              }
              g_Checking = false;
          }

          void BackgroundSyncLoop() {
              while(true) {
                  if(g_IsLoggedIn) {
                      SyncWithServer();
                  }
                  this_thread::sleep_for(chrono::seconds(g_Connected && !g_Checking ? 10 : 2));
              }
          }

          // ==========================================================
          // 6. واجهة دراكون (ImGui)
          // ==========================================================
          void ApplyPremiumTheme() {
              ImGuiStyle& style = ImGui::GetStyle();
              style.WindowRounding = 12.0f;
              style.FrameRounding = 6.0f;
              style.Colors[ImGuiCol_WindowBg] = ImVec4(0.07f, 0.09f, 0.12f, 0.98f);
              style.Colors[ImGuiCol_Border] = ImVec4(0.00f, 0.90f, 1.00f, 0.30f);
              style.Colors[ImGuiCol_Header] = ImVec4(0.00f, 0.90f, 1.00f, 0.25f);
              style.Colors[ImGuiCol_HeaderHovered] = ImVec4(0.00f, 0.90f, 1.00f, 0.40f);
              style.Colors[ImGuiCol_HeaderActive] = ImVec4(0.00f, 0.90f, 1.00f, 0.60f);
              style.Colors[ImGuiCol_CheckMark] = ImVec4(0.00f, 1.00f, 0.60f, 1.00f);
              style.Colors[ImGuiCol_Button] = ImVec4(0.00f, 0.90f, 1.00f, 0.20f);
              style.Colors[ImGuiCol_ButtonHovered] = ImVec4(0.00f, 0.90f, 1.00f, 0.40f);
              style.Colors[ImGuiCol_ButtonActive] = ImVec4(0.00f, 0.90f, 1.00f, 0.60f);
          }

          void RenderDragonUI() {
              if(g_Maintenance) {
                  ImGui::SetNextWindowPos(ImVec2(0,0)); ImGui::SetNextWindowSize(ImGui::GetIO().DisplaySize);
                  ImGui::Begin("MNT", 0, ImGuiWindowFlags_NoDecoration);
                  ImGui::GetWindowDrawList()->AddRectFilled(ImVec2(0,0), ImGui::GetIO().DisplaySize, IM_COL32(0,0,0,255));
                  ImGui::SetCursorPos(ImVec2(ImGui::GetIO().DisplaySize.x/2 - 120, ImGui::GetIO().DisplaySize.y/2));
                  ImGui::TextColored(ImVec4(1,0,0,1), "SYSTEM FROZEN - MAINTENANCE BY AL-SHAMMARI");
                  ImGui::End(); return;
              }

              ApplyPremiumTheme();

              ImGui::SetNextWindowPos(ImVec2(0,0)); 
              ImGui::SetNextWindowSize(ImVec2(ImGui::GetIO().DisplaySize.x, 35));
              ImGui::Begin("HUD", 0, ImGuiWindowFlags_NoDecoration|ImGuiWindowFlags_NoBackground);
              
              if(ImGui::InvisibleButton("REFRESH_HUD", ImVec2(ImGui::GetIO().DisplaySize.x, 35))) {
                  g_Connected = false; 
                  g_Checking = true; 
              }
              
              float pulse = (sin(ImGui::GetTime() * 6.0f) + 1.0f) * 0.5f;
              ImU32 led_col;
              string status_text;
              
              if (g_Checking && !g_Connected) {
                  led_col = IM_COL32(255, 204, 0, (int)(150 + pulse * 105)); 
                  status_text = "جاري التحديث...";
              } else if (g_Connected) {
                  led_col = IM_COL32(0, 255, 102, (int)(150 + pulse * 105)); 
                  status_text = "متصل (Live)";
              } else {
                  led_col = IM_COL32(255, 51, 102, 255); 
                  status_text = "غير متصل (Offline)";
              }

              ImGui::GetWindowDrawList()->AddCircleFilled(ImVec2(20, 17), 5, led_col);
              ImGui::SetCursorPos(ImVec2(35, 8)); 
              ImGui::TextColored(g_Connected ? ImVec4(0,1,0.4f,1) : ImVec4(1,0.2f,0.4f,1), "%s", status_text.c_str());
              
              ImGui::SetCursorPos(ImVec2(ImGui::GetIO().DisplaySize.x/2 - 50, 8)); 
              ImGui::TextColored(ImVec4(0.5f,0.5f,0.5f,1), "W-MASTER ENGINE");
              ImGui::End();

              if(!g_MenuOpen) return;

              if (!g_IsLoggedIn) {
                  ImGui::SetNextWindowSize(ImVec2(320, 240), ImGuiCond_Always);
                  ImGui::Begin(u8"تسجيل الدخول | W-MASTER", &g_MenuOpen, ImGuiWindowFlags_NoCollapse|ImGuiWindowFlags_NoResize);
                  ImGui::Spacing();
                  ImGui::TextColored(ImVec4(0,1,1,1), u8"مفتاح الاشتراك (VIP Key):");
                  ImGui::InputText("##key", g_KeyInput, IM_ARRAYSIZE(g_KeyInput));
                  ImGui::Spacing();
                  
                  if (g_Checking) {
                      ImGui::TextColored(ImVec4(1,1,0,1), u8"جاري التحقق من الترخيص...");
                  } else {
                      if (ImGui::Button(u8"تفعيل النظام (Login)", ImVec2(-1, 40))) {
                          thread(SyncWithServer).detach();
                      }
                  }
                  ImGui::TextColored(ImVec4(0.5,0.5,0.5,1), u8"\nالمطور: المهندس محمد الشمري");
                  ImGui::End();
                  return;
              }

              ImGui::SetNextWindowSize(ImVec2(340, 560), ImGuiCond_FirstUseEver);
              ImGui::Begin(u8"🦅 حماية محمد الشمري", &g_MenuOpen);

              ImGui::BeginChild("SubFrame", ImVec2(0, 80), true);
              ImGui::TextColored(ImVec4(0,1,1,1), u8"المشترك: محمد الشمري (VIP)");
              ImGui::TextColored(ImVec4(0,1,0,1), u8"حالة الحماية بالسيرفر: %s", g_OnlineBypass ? "مفعلة 🟢" : "غير مفعلة 🔴");
              ImGui::EndChild();

              if (ImGui::CollapsingHeader(u8"🛡️ إعدادات الحماية والتبليك")) {
                  ImGui::Checkbox(u8"تفعيل حظر روابط الباند (URL Blocker)", &g_BypassEnabled);
                  ImGui::TextColored(ImVec4(0.5,0.5,0.5,1), u8"سيتم قطع الاتصال بسيرفرات الحماية المحددة");
              }

              if (ImGui::CollapsingHeader(u8"👁️ رادار كشف الأماكن (ESP)")) {
                  static bool esp_m = false;
                  ImGui::Checkbox(u8"تفعيل الرادار الرئيسي", &esp_m);
                  if(esp_m) {
                      ImGui::Indent();
                      static bool box, hp, name, skel;
                      ImGui::Checkbox(u8"صندوق اللاعب (2D Box)", &box);
                      ImGui::Checkbox(u8"شريط الصحة (HP)", &hp);
                      ImGui::Checkbox(u8"الأسماء والمسافة", &name);
                      ImGui::Checkbox(u8"الهيكل العظمي (Skeleton)", &skel);
                      ImGui::Separator();
                      static bool veh, loot;
                      ImGui::Checkbox(u8"رادار المركبات والعجلات", &veh);
                      ImGui::Checkbox(u8"رادار الأسلحة والموارد", &loot);
                      ImGui::Unindent();
                  }
              }

              if (ImGui::CollapsingHeader(u8"🎯 المميزات القتالية (Combat)")) {
                  static bool recoil=false, aim=false;
                  ImGui::Checkbox(u8"ثبات السلاح 100%", &recoil);
                  ImGui::Checkbox(u8"تثبيت الأيم (Aimbot)", &aim);
              }

              ImGui::Spacing(); ImGui::Separator();
              ImGui::TextColored(ImVec4(0.5,0.5,0.5,1), u8"المطور المعتمد: محمد الشمري © 2026");
              ImGui::End();
          }

          // ==========================================================
          // 7. محرك الرسم (Metal Overlay للأيفون) 
          // ==========================================================
          @interface WMasterOverlay : UIViewController <MTKViewDelegate>
          @property (nonatomic, strong) MTKView *mtkView;
          @property (nonatomic, strong) id <MTLDevice> device;
          @property (nonatomic, strong) id <MTLCommandQueue> commandQueue;
          @end

          @implementation WMasterOverlay
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              self.view.userInteractionEnabled = YES;

              self.device = MTLCreateSystemDefaultDevice();
              self.commandQueue = [self.device newCommandQueue];

              self.mtkView = [[MTKView alloc] initWithFrame:self.view.bounds device:self.device];
              self.mtkView.backgroundColor = [UIColor clearColor];
              self.mtkView.delegate = self;
              self.mtkView.framebufferOnly = NO;
              self.mtkView.clearColor = MTLClearColorMake(0, 0, 0, 0);
              [self.view addSubview:self.mtkView];

              IMGUI_CHECKVERSION();
              ImGui::CreateContext();
              ImGui_ImplMetal_Init(self.device);

              UITapGestureRecognizer *tap3 = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(toggleMenu)];
              tap3.numberOfTouchesRequired = 3;
              [self.view addGestureRecognizer:tap3];
          }

          - (void)toggleMenu { g_MenuOpen = !g_MenuOpen; }

          - (void)touchesBegan:(NSSet<UITouch *> *)touches withEvent:(UIEvent *)event {
              ImGuiIO& io = ImGui::GetIO();
              UITouch *touch = [touches anyObject];
              CGPoint point = [touch locationInView:self.view];
              io.MousePos = ImVec2(point.x, point.y);
              io.MouseDown[0] = true;
          }
          - (void)touchesMoved:(NSSet<UITouch *> *)touches withEvent:(UIEvent *)event {
              ImGuiIO& io = ImGui::GetIO();
              UITouch *touch = [touches anyObject];
              CGPoint point = [touch locationInView:self.view];
              io.MousePos = ImVec2(point.x, point.y);
          }
          - (void)touchesEnded:(NSSet<UITouch *> *)touches withEvent:(UIEvent *)event {
              ImGuiIO& io = ImGui::GetIO(); io.MouseDown[0] = false;
          }

          - (void)mtkView:(nonnull MTKView *)view drawableSizeWillChange:(CGSize)size { }

          - (void)drawInMTKView:(MTKView *)view {
              ImGuiIO& io = ImGui::GetIO();
              io.DisplaySize.x = view.bounds.size.width;
              io.DisplaySize.y = view.bounds.size.height;
              
              MTLRenderPassDescriptor *rpd = view.currentRenderPassDescriptor;
              if (rpd != nil) {
                  id <MTLCommandBuffer> cb = [self.commandQueue commandBuffer];
                  id <MTLRenderCommandEncoder> enc = [cb renderCommandEncoderWithDescriptor:rpd];
                  
                  ImGui_ImplMetal_NewFrame(rpd);
                  ImGui::NewFrame();
                  RenderDragonUI(); 
                  ImGui::Render();
                  ImGui_ImplMetal_RenderDrawData(ImGui::GetDrawData(), cb, enc);
                  
                  [enc endEncoding];
                  [cb presentDrawable:view.currentDrawable];
                  [cb commit];
              }
          }
          @end

          // ==========================================================
          // 8. الإقلاع الآمن (بدون جلبريك ESign Safe)
          // ==========================================================
          @interface WMasterLoader : NSObject
          + (void)startInjection;
          @end

          @implementation WMasterLoader
          + (void)startInjection {
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification * _Nonnull note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      
                      UIWindow *mainWindow = nil;
                      for (UIScene *scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive && [scene isKindOfClass:[UIWindowScene class]]) {
                              UIWindowScene *windowScene = (UIWindowScene *)scene;
                              for (UIWindow *window in windowScene.windows) {
                                  if (window.isKeyWindow) { mainWindow = window; break; }
                              }
                          }
                          if (mainWindow) break;
                      }
                      
                      if (!mainWindow) {
                          NSArray *windows = [[UIApplication sharedApplication] windows];
                          if (windows.count > 0) mainWindow = windows[0];
                      }

                      if (mainWindow) {
                          WMasterOverlay *overlayVC = [[WMasterOverlay alloc] init];
                          [mainWindow addSubview:overlayVC.view];
                          
                          InstallHooksSafe();
                          thread(BackgroundSyncLoop).detach();
                      }
                  });
              }];
          }
          @end

          __attribute__((constructor))
          void StartDragon() {
              [WMasterLoader startInjection];
          }
          EOF

      # ========================================================
      # 2. تجهيز بيئة البناء
      # ========================================================
      - name: 🛠️ تجهيز Xcode SDK
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ========================================================
      # 3. تحميل المكاتب (ImGui, Dobby, Json)
      # ========================================================
      - name: 🌐 تحميل المكاتب والمحركات
        run: |
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_src
          mkdir -p imgui
          cp imgui_src/*.h imgui_src/*.cpp imgui/
          cp imgui_src/backends/imgui_impl_metal.h imgui_src/backends/imgui_impl_metal.mm imgui/

          curl -sSL -o json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
          
          git clone --depth 1 https://github.com/jmpews/Dobby.git dobby_src
          cd dobby_src && mkdir build && cd build
          cmake .. -DDOBBY_GENERATE_SHARED=OFF -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_SYSTEM_PROCESSOR=arm64 -DCMAKE_OSX_SYSROOT=iphoneos
          make -j4 && cd ../..
          mkdir -p dobby/include dobby/lib
          cp dobby_src/include/dobby.h dobby/include/ && cp dobby_src/build/libdobby.a dobby/lib/

      # ========================================================
      # 4. عملية الصهر وإنشاء الـ Dylib الحقيقي
      # ========================================================
      - name: 🔥 عملية الصهر
        run: |
          mkdir -p out
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -dynamiclib -std=c++17 -O3 -fobjc-arc \
          -I./imgui -I./dobby/include -I. wsam.mm \
          imgui/*.cpp imgui/imgui_impl_metal.mm -L./dobby/lib -ldobby \
          -framework Foundation -framework UIKit -framework Metal -framework MetalKit -framework QuartzCore \
          -o out/WMASTER_Dragon.dylib

      # ========================================================
      # 5. إجبار السيرفر على ضغط الـ Dylib حتى لا يضيع
      # ========================================================
      - name: 📦 ضغط الملف للتحميل
        run: |
          cd out
          zip DRAGON-HACK.zip WMASTER_Dragon.dylib

      # ========================================================
      # 6. رفع الملف لاستخراجه
      # ========================================================
      - name: 📤 استخراج الهاك النهائي
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-SHAMMARI
          path: out/DRAGON-HACK.zip
          if-no-files-found: error
