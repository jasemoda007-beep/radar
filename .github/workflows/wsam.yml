name: 🐲 DRAGON HACK - RESIZABLE TRANSPARENT SYSTEM (ALI)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build_dragon_final:
    name: 🛠️ صهر منظومة محمد الشمري الملكية
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      - name: ⚙️ تجهيز بيئة البناء
        run: brew install ldid

      - name: 📝 توليد المحرك والواجهة الشفافة (engine.mm)
        run: |
          cat << 'EOF_MM' > engine.mm
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          #include <iostream>
          #include <vector>
          #include <cmath>
          #include <thread>
          #include <unistd.h>
          #include <mach-o/dyld.h>

          using namespace std;

          // ==========================================================
          // 1. [إعدادات المحرك]
          // ==========================================================
          struct HackConfig {
              bool radar = true;
              bool aimbot = false;
              bool norecoil = false;
          } Config;

          // ==========================================================
          // 2. [واجهة الويب الشفافة والقابلة للتحجيم] 🎨
          // ==========================================================
          const char* HTML_UI = R"HTML(
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <style>
                  :root { 
                      --yellow: #FFD700; 
                      --bg: rgba(10, 10, 10, 0.6); /* خلفية شفافة */
                      --red: #ff3333; 
                      --green: #39ff14; 
                      --base-scale: 1; /* متغير التحكم في حجم المحتويات */
                  }
                  
                  body { margin:0; padding:0; background:transparent; font-family:Tahoma; color:#fff; user-select:none; overflow:hidden; }
                  .interactive { pointer-events: auto; }
                  
                  /* عداد الأعداء العلوي */
                  .enemy-count { position:fixed; top:15px; left:50%; transform:translateX(-50%); color:var(--yellow); font-size:26px; font-weight:900; text-shadow:3px 3px 0 #000; z-index:5; }

                  /* المنيو الشفاف القابل للتحجيم */
                  #mod-menu { 
                      position:fixed; top:60px; left:25px; 
                      width:calc(340px * var(--base-scale)); 
                      background:var(--bg); 
                      backdrop-filter: blur(12px); /* تأثير الضباب */
                      border:1.2px solid var(--yellow); 
                      border-radius:10px; 
                      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
                      display:flex; flex-direction:column; z-index:100; 
                      overflow: hidden;
                  }

                  .header { 
                      background:rgba(0,0,0,0.4); 
                      padding:calc(10px * var(--base-scale)); 
                      display:flex; justify-content:space-between; align-items:center; 
                      border-bottom:1px solid var(--yellow); cursor:move; 
                  }
                  .header-title { font-size:calc(12px * var(--base-scale)); color:var(--yellow); font-weight:bold; }

                  .content { padding:calc(10px * var(--base-scale)); flex: 1; overflow-y: auto; }
                  
                  .section-title { 
                      color:var(--yellow); 
                      font-size:calc(11px * var(--base-scale)); 
                      font-weight:bold; text-align:center; 
                      padding:calc(10px * var(--base-scale)) 0; 
                      border-bottom:1px solid rgba(255,215,0,0.1); 
                      margin:0 calc(20px * var(--base-scale)); 
                  }

                  .item-row { 
                      display:flex; justify-content:space-between; align-items:center; 
                      padding:calc(10px * var(--base-scale)) calc(15px * var(--base-scale)); 
                      font-size:calc(12px * var(--base-scale));
                  }

                  .toggle { 
                      background:var(--yellow); color:#000; 
                      padding:calc(3px * var(--base-scale)) calc(10px * var(--base-scale)); 
                      font-size:calc(10px * var(--base-scale)); 
                      font-weight:900; border-radius:4px; min-width:calc(35px * var(--base-scale)); text-align:center; 
                  }
                  .off { background:var(--red); color:#fff; }

                  .footer { 
                      padding:calc(10px * var(--base-scale)); 
                      text-align:center; border-top:1px solid var(--yellow); 
                      background:rgba(0,0,0,0.3); position: relative;
                  }

                  /* مقبض التحجيم (Resize Handle) */
                  .resize-handle {
                      position: absolute; right: 0; bottom: 0; 
                      width: calc(25px * var(--base-scale)); height: calc(25px * var(--base-scale)); 
                      cursor: nwse-resize; 
                      background: linear-gradient(135deg, transparent 50%, var(--yellow) 50%);
                      opacity: 0.7;
                  }

                  #esp-canvas { position:fixed; inset:0; pointer-events:none; z-index:2; }
              </style>
          </head>
          <body>
              <div class="enemy-count">الاعـداء: 1</div>
              <canvas id="esp-canvas"></canvas>

              <div id="mod-menu" class="interactive">
                  <div class="header" id="drag">
                      <span style="color:var(--yellow); font-weight:bold; cursor:pointer;" onclick="toggleCollapse()">[-]</span>
                      <span class="header-title">دراكون شيتو | التحجيم الذكي</span>
                      <span style="font-size:8px; border:1px solid var(--yellow); padding:1px 3px;">PRO</span>
                  </div>

                  <div id="m-body" class="content">
                      <div class="section-title">إعدادات الرادار الملكي</div>
                      <div class="item-row" onclick="tgl('radar', this)"><span>تفعيل الرادار</span><span class="toggle">ON</span></div>
                      
                      <div class="section-title">التفعيلات (MODS)</div>
                      <div class="item-row" onclick="tgl('aim', this)"><span>ايمبوت (Aimbot)</span><span class="toggle off">OFF</span></div>
                      <div class="item-row" onclick="tgl('recoil', this)"><span>ثبات السلاح 100%</span><span class="toggle off">OFF</span></div>
                  </div>

                  <div class="footer">
                      <span style="color:#eee; font-size:10px; font-weight:bold;">اسحب من الزاوية للتحجيم ↘</span>
                      <div class="resize-handle" id="resizer"></div>
                  </div>
              </div>

              <script>
                  function tgl(feat, el) {
                      let btn = el.querySelector('.toggle');
                      let state = btn.innerText === 'ON' ? false : true;
                      btn.innerText = state ? 'ON' : 'OFF';
                      btn.className = state ? 'toggle' : 'toggle off';
                      window.webkit.messageHandlers.wmaster.postMessage({action:"tgl", feature:feat, state:state});
                  }

                  function toggleCollapse() {
                      let body = document.getElementById('m-body');
                      body.style.display = body.style.display === 'none' ? 'block' : 'none';
                  }

                  // --- نظام التحجيم باليد (Resize Logic) ---
                  const menu = document.getElementById('mod-menu');
                  const resizer = document.getElementById('resizer');
                  
                  resizer.addEventListener('touchstart', (e) => {
                      let startX = e.touches[0].clientX;
                      let startWidth = menu.offsetWidth;
                      
                      function onTouchMove(e) {
                          let newWidth = startWidth + (e.touches[0].clientX - startX);
                          if (newWidth > 240 && newWidth < 600) {
                              menu.style.width = newWidth + 'px';
                              // تحديث الـ Scale بناءً على العرض (العرض الأصلي 340)
                              let scale = newWidth / 340;
                              document.documentElement.style.setProperty('--base-scale', scale);
                          }
                      }
                      
                      function onTouchEnd() {
                          document.removeEventListener('touchmove', onTouchMove);
                          document.removeEventListener('touchend', onTouchEnd);
                      }
                      
                      document.addEventListener('touchmove', onTouchMove);
                      document.addEventListener('touchend', onTouchEnd);
                  });

                  // --- نظام الرسم ESP ---
                  const cvs = document.getElementById('esp-canvas');
                  const ctx = cvs.getContext('2d');
                  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
                  let enemies = [];

                  function updateESP(data) { enemies = JSON.parse(data); }

                  function draw() {
                      ctx.clearRect(0,0,cvs.width,cvs.height);
                      enemies.forEach(e => {
                          ctx.strokeStyle = "#FFD700"; ctx.fillStyle = "#FFD700";
                          ctx.lineWidth = 2.0;

                          // 1. الاسم (الأعلى)
                          ctx.font = "bold 13px Tahoma"; ctx.textAlign = "center";
                          ctx.fillText(e.name + " [" + e.dist + "m]", e.x, e.y - e.h/2 - 30);

                          // 2. الصندوق مربع الأضلاع
                          ctx.strokeRect(e.x - e.w/2, e.y - e.h/2, e.w, e.h);

                          // 3. الصحة (عريضة بالأسفل)
                          ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - e.w/2, e.y + e.h/2 + 5, e.w, 8);
                          ctx.fillStyle = "#39ff14"; ctx.fillRect(e.x - e.w/2, e.y + e.h/2 + 5, e.w * (e.hp/100), 8);

                          // 4. السلاح
                          ctx.fillStyle = "#fff"; ctx.font = "bold 10px Tahoma";
                          ctx.fillText(e.weapon, e.x, e.y + e.h/2 + 25);
                          
                          // خط اللاين من تحت كلمة الاعداء
                          ctx.strokeStyle = "#FFD700"; ctx.beginPath();
                          ctx.moveTo(cvs.width/2, 45); ctx.lineTo(e.x, e.y - e.h/2); ctx.stroke();
                      });
                      requestAnimationFrame(draw);
                  }
                  draw();
              </script>
          </body>
          </html>
          )HTML";

          // ==========================================================
          // 3. [جسر الربط والمحرك - Objective-C++]
          // ==========================================================
          @interface DragonMenu : UIViewController <WKScriptMessageHandler>
          @property (nonatomic, strong) WKWebView *webView;
          @end

          @implementation DragonMenu
          - (void)viewDidLoad {
              [super viewDidLoad];
              
              // جعل الخلفية شفافة تماماً في نظام iOS
              self.view.backgroundColor = [UIColor clearColor];
              
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              [config.userContentController addScriptMessageHandler:self name:@"wmaster"];
              
              self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
              self.webView.backgroundColor = [UIColor clearColor];
              self.webView.opaque = NO; // مهم جداً للشفافية
              self.webView.scrollView.backgroundColor = [UIColor clearColor];
              
              [self.view addSubview:self.webView];
              [self.webView loadHTMLString:[NSString stringWithUTF8String:HTML_UI] baseURL:nil];
              
              dispatch_async(dispatch_get_global_queue(0, 0), ^{ [self MainLoop]; });
          }

          - (void)userContentController:(WKUserContentController *)userContentController didReceiveScriptMessage:(WKScriptMessage *)message {
              NSDictionary *dict = message.body;
              NSString *feat = dict[@"feature"];
              bool state = [dict[@"state"] boolValue];
              if([feat isEqualToString:@"radar"]) Config.radar = state;
              if([feat isEqualToString:@"aim"]) Config.aimbot = state;
          }

          - (void)MainLoop {
              while(true) {
                  NSString *json = @"[{\"name\":\"بـوت_الشـمري\",\"dist\":\"120\",\"x\":500,\"y\":300,\"w\":80,\"h\":160,\"hp\":85,\"weapon\":\"M416 🔫\"}]";
                  dispatch_async(dispatch_get_main_queue(), ^{
                      [self.webView evaluateJavaScript:[NSString stringWithFormat:@"updateESP('%@')", json] completionHandler:nil];
                  });
                  usleep(16666); 
              }
          }
          @end

          __attribute__((constructor)) static void init() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5*NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                  UIWindow *win = [UIApplication sharedApplication].keyWindow;
                  DragonMenu *menu = [[DragonMenu alloc] init];
                  [win addSubview:menu.view];
                  menu.view.frame = win.bounds;
              });
          }
          EOF_MM

      - name: 🔥 صهر المنظومة إلى Dylib
        run: |
          xcrun -sdk iphoneos clang++ -arch arm64 -shared -std=c++17 -fPIC -framework Foundation -framework UIKit -framework WebKit engine.mm -o DragonCheeto.dylib

      - name: 🔏 توقيع ملف الدايلب (ldid)
        run: ldid -S DragonCheeto.dylib

      - name: 🚀 تصدير الملف النهائي
        uses: actions/upload-artifact@v4
        with:
          name: 🐲 Resizable_Transparent_Dylib
          path: DragonCheeto.dylib
