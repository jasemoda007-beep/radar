name: 🐲 DRAGON HACK - SOVEREIGN ULTIMATE (iOS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_dragon:
    name: صهر محرك دراكون الملكي (محمد الشمري)
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      - name: 📝 توليد محرك دراكون (wsam.mm)
        run: |
          cat << 'EOF' > wsam.mm
          #define _DARWIN_C_SOURCE 
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          #include <iostream>
          #include <string>
          #include <dlfcn.h>
          #include "json.hpp"

          using json = nlohmann::json;
          using namespace std;

          // ==========================================================
          // 1. [إحداثيات الرادار والمميزات - Offsets] 🎯
          // ==========================================================
          uintptr_t GWORLD_ADDR = 0x11223344; 
          uintptr_t GNAMES_ADDR = 0x55667788; 
          
          uintptr_t OFF_ACTOR_ARRAY = 0xA0;    
          uintptr_t OFF_HEALTH      = 0x988;   
          uintptr_t OFF_NAME        = 0x640;   
          uintptr_t OFF_BONE        = 0x5B0;   
          uintptr_t OFF_VEHICLES    = 0x180;   
          uintptr_t OFF_LOOT        = 0x220;   

          // ==========================================================
          // 2. [إعدادات السيرفر والربط] 🌐
          // ==========================================================
          const string SERVER_URL = "http://34.204.178.160/panel.php?api=check";
          bool g_IsLoggedIn = false;

          string SyncWithServer(string key) {
              string result = "{\"status\":\"error\"}";
              @autoreleasepool {
                  // جلب HWID حقيقي للايفون
                  NSString *hwid = [[[UIDevice currentDevice] identifierForVendor] UUIDString];
                  NSString *urlStr = [NSString stringWithFormat:@"%s&key=%s&hwid=%@", SERVER_URL.c_str(), key.c_str(), hwid];
                  
                  NSURL *url = [NSURL URLWithString:urlStr];
                  NSData *data = [NSData dataWithContentsOfURL:url];
                  if(data) {
                      result = string((char*)[data bytes], [data length]);
                      auto res = json::parse(result);
                      if(res["status"] == "success") g_IsLoggedIn = true;
                  }
              }
              return result;
          }

          // ==========================================================
          // 3. [واجهة الويب الملكية - HTML/CSS/JS] 🎨
          // ==========================================================
          const char* HTML_UI = R"HTML(
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <style>
                  :root { --cyan: #00e5ff; --bg: #0b0f13; --panel: #161c24; --green: #00ff66; --red: #ff3366; }
                  body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; height: 100vh; overflow: hidden; color: #fff; touch-action: none; }
                  
                  /* الشريط العلوي الملكي طبق الأصل */
                  .hud-bar { position: absolute; top: 0; left: 0; right: 0; height: 35px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 1000; font-size: 13px; font-weight: bold; }
                  .hud-left { color: var(--green); display: flex; align-items: center; gap: 8px; }
                  .hud-left .dot-s { width: 10px; height: 10px; background: var(--green); border-radius: 50%; }
                  .hud-center { color: var(--cyan); letter-spacing: 2px; font-size: 15px; text-shadow: 0 0 10px var(--cyan); }
                  .hud-right { display: flex; align-items: center; gap: 8px; color: #fff; }
                  .dot-live { width: 10px; height: 10px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; }
                  @keyframes pulse { 50% { opacity: 0.2; } }

                  /* لوحة اللوكن الثابتة */
                  #lockOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; }
                  .login-card { width: 350px; background: var(--panel); border: 1px solid #30363d; border-radius: 15px; border-top: 4px solid var(--cyan); padding: 30px; box-shadow: 0 20px 80px #000; text-align: center; }
                  .key-in { width: 100%; padding: 15px; background: #010409; border: 1px solid #333; border-radius: 8px; color: var(--cyan); text-align: center; font-family: monospace; font-size: 18px; margin-bottom: 20px; }
                  .btn-act { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }

                  /* المنيو المتحرك */
                  .menu { position: absolute; top: 60px; left: 20px; width: 340px; background: rgba(13,17,23,0.98); border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; border-top: 3px solid var(--cyan); box-shadow: 0 15px 40px #000; }
                  .m-head { background: #161b22; padding: 15px; font-weight: 900; display: flex; justify-content: space-between; font-size: 14px; color: var(--cyan); cursor: move; }
                  .m-body { padding: 20px; max-height: 450px; overflow-y: auto; }
                  
                  /* لوحة معلومات الاشتراك */
                  .vip-card { background: rgba(0, 229, 255, 0.05); border: 1px solid rgba(0, 229, 255, 0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px; border-right: 4px solid var(--green); font-size: 12px; }
                  .vip-title { color: var(--cyan); font-weight: bold; margin-bottom: 5px; font-size: 14px; }

                  .drop-btn { width: 100%; padding: 12px; background: #1c2128; border: 1px solid #30363d; color: #fff; text-align: right; border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
                  .drop-content { display: none; padding: 10px; background: rgba(255,255,255,0.01); border-right: 2px solid var(--cyan); margin-bottom: 10px; }
                  .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
                  .switch { width: 40px; height: 20px; background: #333; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
                  .switch.on { background: var(--cyan); }
                  .switch::before { content: ""; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
                  .switch.on::before { left: 22px; }

                  .rights { text-align: center; padding: 20px 0; font-size: 11px; color: #555; border-top: 1px solid #222; margin-top: 10px; }
              </style>
          </head>
          <body>

              <div class="hud-bar">
                  <div class="hud-left"><div class="dot-s"></div> Safe</div>
                  <div class="hud-center">DRAGON HACK</div>
                  <div class="hud-right">متصل (Live) <div class="dot-live"></div></div>
              </div>

              <div id="lockOverlay">
                  <div class="login-card">
                      <h3 style="margin:0; color:var(--cyan); letter-spacing:1px;">دراكون الملكي | محمد الشمري</h3>
                      <p style="font-size:12px; color:#8b949e; margin-top:10px;">أدخل مفتاح الاشتراك:</p>
                      <input type="text" class="key-in" id="keyInp" placeholder="SHAMMARI-XXXX">
                      <button class="btn-act" onclick="doLogin()">تفعيل النظام (Login)</button>
                      <p id="err" style="color:var(--red); font-size:11px; margin-top:15px; display:none">فشل الاتصال بالسيرفر!</p>
                  </div>
              </div>

              <div class="menu" id="mainMenu">
                  <div class="m-head" id="dragH">قائمة محمد الشمري <span onclick="toggleMenu()" style="cursor:pointer">✕</span></div>
                  <div class="m-body">
                      
                      <div class="vip-card">
                          <div class="vip-title">المشترك: محمد الشمري (VIP)</div>
                          البدء: <span style="color:var(--green)">14/03/2026</span> | الانتهاء: <span style="color:var(--green)" id="expDate">14/04/2026</span><br>
                          نوع الاشتراك: <span style="color:gold">VIP شهري 💎</span>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c1')">🛡️ إعدادات الحماية والتبليك <span>▼</span></div>
                      <div class="drop-content" id="c1" style="display:block">
                          <div class="row"><span>تفعيل الحماية (Bypass)</span> <div class="switch on"></div></div>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c2')">👁️ رادار كشف الأماكن (ESP) <span>▼</span></div>
                      <div class="drop-content" id="c2">
                          <div class="row"><span>صندوق اللاعب (Box)</span> <div class="switch on"></div></div>
                          <div class="row"><span>شريط الصحة (HP)</span> <div class="switch on"></div></div>
                          <div class="row"><span>الاسم والمسافة</span> <div class="switch on"></div></div>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c3')">🎯 المميزات القتالية (Aim) <span>▼</span></div>
                      <div class="drop-content" id="c3">
                          <div class="row"><span>ثبات السلاح 100%</span> <div class="switch"></div></div>
                          <div class="row"><span>ايمبوت (Aimbot)</span> <div class="switch"></div></div>
                      </div>

                      <div class="rights">المطور المعتمد: محمد الشمري 🦅<br>جميع الحقوق محفوظة © 2026</div>
                  </div>
              </div>

              <script>
                  // تحميل الكود المحفوظ
                  window.onload = () => { 
                      let saved = localStorage.getItem('w_key');
                      if(saved) document.getElementById('keyInp').value = saved;
                  };

                  function doLogin() {
                      let k = document.getElementById('keyInp').value;
                      localStorage.setItem('w_key', k); // حفظ الكود
                      window.webkit.messageHandlers.wmaster.postMessage(JSON.stringify({action:"login", key:k}));
                  }

                  function onLoginResponse(res) {
                      let r = JSON.parse(res);
                      if(r.status==='success') {
                          document.getElementById('lockOverlay').style.display = 'none';
                          document.getElementById('mainMenu').style.display = 'flex';
                      } else { document.getElementById('err').style.display = 'block'; }
                  }

                  function toggleMenu() { let m = document.getElementById('mainMenu'); m.style.display = (m.style.display==='none')?'flex':'none'; }
                  function toggleDrop(id) { let d = document.getElementById(id); d.style.display = (d.style.display==='block')?'none':'block'; }
                  
                  // دعم 3 أصابع
                  document.body.addEventListener('touchstart', e => { if(e.touches.length === 3) toggleMenu(); });

                  // نظام سحب المنيو
                  let win = document.getElementById("mainMenu"), header = document.getElementById("dragH");
                  let p1=0, p2=0, p3=0, p4=0;
                  header.ontouchstart = (e) => { p3=e.touches[0].clientX; p4=e.touches[0].clientY; document.ontouchend=()=>document.ontouchmove=null; document.ontouchmove=(ev)=>{ ev.preventDefault(); p1=p3-ev.touches[0].clientX; p2=p4-ev.touches[0].clientY; p3=ev.touches[0].clientX; p4=ev.touches[0].clientY; win.style.top=(win.offsetTop-p2)+"px"; win.style.left=(win.offsetLeft-p1)+"px"; }; };
              </script>
          </body>
          </html>
          )HTML";

          @interface WMasterMenu : UIViewController <WKScriptMessageHandler>
          @property (nonatomic, strong) WKWebView *webView;
          @end
          @implementation WMasterMenu
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              [config.userContentController addScriptMessageHandler:self name:@"wmaster"];
              self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
              self.webView.backgroundColor = [UIColor clearColor];
              self.webView.opaque = NO;
              self.webView.scrollView.bounces = NO;
              [self.view addSubview:self.webView];
              [self.webView loadHTMLString:[NSString stringWithUTF8String:HTML_UI] baseURL:nil];
          }
          - (void)userContentController:(WKUserContentController *)userContentController didReceiveScriptMessage:(WKScriptMessage *)message {
              NSDictionary *dict = [NSJSONSerialization JSONObjectWithData:[message.body dataUsingEncoding:NSUTF8StringEncoding] options:0 error:nil];
              if ([dict[@"action"] isEqualToString:@"login"]) {
                  dispatch_async(dispatch_get_global_queue(0, 0), ^{
                      string res = SyncWithServer(string([dict[@"key"] UTF8String]));
                      dispatch_async(dispatch_get_main_queue(), ^{
                          [self.webView evaluateJavaScript:[NSString stringWithFormat:@"onLoginResponse('%@')", [NSString stringWithUTF8String:res.c_str()]] completionHandler:nil];
                      });
                  });
              }
          }

          // 🛡️ حل تجمد اللمس (HitTest العبقري)
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              // إذا لم يسجل دخول، اجمد الشاشة بالكامل
              if (!g_IsLoggedIn) return [super.view hitTest:point withEvent:event];
              
              // إذا مسجل دخول، ابحث عما إذا كان اللمس وقع على المنيو أو الأزرار
              UIView *hitView = [super.view hitTest:point withEvent:event];
              
              // إذا اللمس بالفراغ (الشفاف)، مرره للعبة فوراً
              if (hitView == self.view || hitView == self.webView.scrollView || hitView == self.webView) {
                  return nil; 
              }
              return hitView;
          }
          @end

          @interface WMasterLoader : NSObject
          + (void)inject;
          @end
          @implementation WMasterLoader
          + (void)inject {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIWindow *mainWindow = nil;
                  for (UIScene *scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive && [scene isKindOfClass:[UIWindowScene class]]) {
                          for (UIWindow *window in ((UIWindowScene *)scene).windows) { if (window.isKeyWindow) { mainWindow = window; break; } }
                      }
                  }
                  if (mainWindow && mainWindow.rootViewController) {
                      WMasterMenu *menuVC = [[WMasterMenu alloc] init];
                      [mainWindow addSubview:menuVC.view];
                      menuVC.view.frame = mainWindow.bounds;
                      [mainWindow bringSubviewToFront:menuVC.view];
                  } else {
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 0.5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{ [self inject]; });
                  }
              });
          }
          @end
          __attribute__((constructor))
          void Start() { [WMasterLoader inject]; }
          EOF

      - name: 🛠️ تجهيز Xcode SDK
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 🔥 عملية الصهر
        run: |
          curl -sSL -o json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
          mkdir -p out
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -dynamiclib -std=c++17 -O3 -fobjc-arc \
          -I. wsam.mm \
          -framework Foundation -framework UIKit -framework WebKit \
          -o out/WMASTER_Dragon.dylib

      - name: 📦 ضغط الملف للتحميل
        run: |
          cd out
          zip DRAGON-HACK.zip WMASTER_Dragon.dylib

      - name: 📤 استخراج الهاك النهائي
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-SHAMMARI
          path: out/DRAGON-HACK.zip
