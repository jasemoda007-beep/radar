name: 🐲 DRAGON HACK - SOVEREIGN BUILDER (iOS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_dragon:
    name: صهر محرك دراكون (محمد الشمري)
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      - name: 📝 توليد محرك دراكون (wsam.mm)
        run: |
          cat << 'EOF' > wsam.mm
          #define _DARWIN_C_SOURCE 
          
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          #include <iostream>
          #include <string>
          #include <thread>
          #include <vector>
          #include <dlfcn.h>
          #include <netinet/in.h>
          #include <arpa/inet.h>
          #include "json.hpp"

          using json = nlohmann::json;
          using namespace std;

          // ==========================================================
          // 1. [إحداثيات الرادار والمميزات] 🎯
          // ==========================================================
          uintptr_t GWORLD_ADDR = 0x11223344; 
          uintptr_t GNAMES_ADDR = 0x55667788; 
          
          uintptr_t OFF_ACTOR_ARRAY = 0xA0;    
          uintptr_t OFF_HEALTH      = 0x988;   
          uintptr_t OFF_NAME        = 0x640;   
          uintptr_t OFF_BONE        = 0x5B0;   
          uintptr_t OFF_VEHICLES    = 0x180;   
          uintptr_t OFF_LOOT        = 0x220;   

          // ==========================================================
          // 2. [إعدادات السيرفر] 🌐
          // ==========================================================
          const string SERVER_URL = "http://34.204.178.160/panel.php?api=check&key=";
          bool g_IsLoggedIn = false;

          string SyncWithServer(string inputKey) {
              string resultJson = "{\"status\":\"error\", \"msg\":\"فشل الاتصال بالسيرفر\"}";
              @autoreleasepool {
                  NSURL *url = [NSURL URLWithString:[NSString stringWithUTF8String:(SERVER_URL + inputKey).c_str()]];
                  NSURLRequest *request = [NSURLRequest requestWithURL:url cachePolicy:NSURLRequestReloadIgnoringLocalCacheData timeoutInterval:5.0];
                  NSURLResponse *response = nullptr; NSError *error = nullptr;
                  NSData *data = [NSURLConnection sendSynchronousRequest:request returningResponse:&response error:&error];
                  if(data && !error) {
                      try {
                          string jsonString((char*)[data bytes], [data length]);
                          auto res = json::parse(jsonString);
                          if(res["status"] == "success") {
                              g_IsLoggedIn = true;
                              resultJson = "{\"status\":\"success\", \"expire\":\"14/04/2026\"}";
                          } else {
                              resultJson = "{\"status\":\"error\", \"msg\":\"الكود غير صحيح!\"}";
                          }
                      } catch(...) { resultJson = "{\"status\":\"error\", \"msg\":\"خطأ في السيرفر\"}"; }
                  }
              }
              return resultJson;
          }

          // ==========================================================
          // 3. [واجهة الويب الملكية - HTML/CSS] 🎨
          // ==========================================================
          const char* HTML_UI = R"HTML(
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <style>
                  :root { --cyan: #00e5ff; --bg: #0b0f13; --panel: #161c24; --green: #00ff66; --red: #ff3366; }
                  body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; height: 100vh; overflow: hidden; color: #fff; touch-action: none; }
                  
                  /* تجميد اللعبة (Backdrop) */
                  #lockOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; }

                  /* الشريط العلوي الملكي ( HUD ) */
                  .hud-bar { position: absolute; top: 0; left: 0; right: 0; height: 32px; background: #000; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; z-index: 1000; font-size: 13px; font-weight: bold; }
                  .hud-left { color: var(--green); display: flex; align-items: center; gap: 5px; }
                  .hud-center { color: var(--cyan); letter-spacing: 1px; font-size: 14px; text-shadow: 0 0 5px var(--cyan); }
                  .hud-right { display: flex; align-items: center; gap: 5px; color: #fff; }
                  .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
                  @keyframes pulse { 50% { opacity: 0.2; } }

                  /* لوحة اللوكن ( ثابتة بنصف الشاشة ) */
                  .login-card { width: 340px; background: var(--panel); border: 1px solid #30363d; border-radius: 12px; border-top: 3px solid var(--cyan); padding: 25px; box-shadow: 0 20px 60px #000; text-align: center; }
                  .key-in { width: 100%; padding: 14px; background: #010409; border: 1px solid #30363d; border-radius: 8px; color: var(--cyan); text-align: center; font-family: monospace; font-size: 18px; margin-bottom: 15px; }
                  .btn-act { width: 100%; padding: 14px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; }

                  /* المنيو الرئيسي */
                  .menu { position: absolute; top: 50px; left: 20px; width: 340px; background: rgba(13,17,23,0.98); border: 1px solid #30363d; border-radius: 12px; display: none; flex-direction: column; overflow: hidden; border-top: 2px solid var(--cyan); box-shadow: 0 10px 30px #000; }
                  .m-head { background: #161b22; padding: 12px; font-weight: bold; display: flex; justify-content: space-between; font-size: 14px; color: var(--cyan); }
                  .m-body { padding: 15px; max-height: 400px; overflow-y: auto; }
                  
                  .drop-btn { width: 100%; padding: 10px; background: #1c2128; border: 1px solid #30363d; color: #fff; text-align: right; border-radius: 4px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
                  .drop-content { display: none; padding: 10px; background: rgba(255,255,255,0.01); border-right: 2px solid var(--cyan); margin-bottom: 10px; }
                  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
                  .switch { width: 36px; height: 18px; background: #333; border-radius: 20px; position: relative; cursor: pointer; }
                  .switch.on { background: var(--cyan); }
                  .switch::before { content: ""; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
                  .switch.on::before { left: 20px; }
              </style>
          </head>
          <body>

              <!-- شاشة HUD الثابتة -->
              <div class="hud-bar" id="hudBar">
                  <div class="hud-left">🟢 Safe</div>
                  <div class="hud-center">DRAGON HACK</div>
                  <div class="hud-right">متصل (Live) <div class="dot"></div></div>
              </div>

              <!-- شاشة التجميد واللوكن -->
              <div id="lockOverlay">
                  <div class="login-card">
                      <h3 style="margin-top:0; color:var(--cyan)">دراكون الملكي | محمد الشمري</h3>
                      <p style="font-size:12px; color:#8b949e">أدخل مفتاح الاشتراك:</p>
                      <input type="text" class="key-in" id="keyInp" value="SHAMMARI-VIP-16X">
                      <button class="btn-act" onclick="doLogin()">تسجيل الدخول للسيرفر</button>
                      <p id="err" style="color:var(--red); font-size:11px; margin-top:10px; display:none">فشل الاتصال!</p>
                  </div>
              </div>

              <!-- المنيو الرئيسي -->
              <div class="menu" id="mainMenu">
                  <div class="m-head" id="dragH">قائمة محمد الشمري <span onclick="toggleMenu()">✕</span></div>
                  <div class="m-body">
                      <div class="drop-btn" onclick="toggleDrop('c1')">🛡️ إعدادات الحماية والتبليك <span>▼</span></div>
                      <div class="drop-content" id="c1" style="display:block">
                          <div class="row"><span>تفعيل الحماية</span> <div class="switch on"></div></div>
                      </div>
                      <div class="drop-btn" onclick="toggleDrop('c2')">👁️ رادار كشف الأماكن (ESP) <span>▼</span></div>
                      <div class="drop-content" id="c2">
                          <div class="row"><span>صندوق اللاعب</span> <div class="switch on"></div></div>
                          <div class="row"><span>شريط الصحة</span> <div class="switch on"></div></div>
                      </div>
                  </div>
              </div>

              <script>
                  function doLogin() {
                      let k = document.getElementById('keyInp').value;
                      window.webkit.messageHandlers.wmaster.postMessage(JSON.stringify({action:"login", key:k}));
                  }
                  function onLoginResponse(res) {
                      let r = JSON.parse(res);
                      if(r.status==='success') {
                          document.getElementById('lockOverlay').style.display = 'none';
                          document.getElementById('mainMenu').style.display = 'flex';
                      } else {
                          document.getElementById('err').style.display = 'block';
                      }
                  }
                  function toggleMenu() { let m = document.getElementById('mainMenu'); m.style.display = (m.style.display==='none')?'flex':'none'; }
                  function toggleDrop(id) { let d = document.getElementById(id); d.style.display = (d.style.display==='block')?'none':'block'; }
                  document.body.addEventListener('touchstart', e => { if(e.touches.length === 3) toggleMenu(); });
              </script>
          </body>
          </html>
          )HTML";

          // ==========================================================
          // 4. [المحرك المرئي ونظام التباع] ⚙️
          // ==========================================================
          @interface WMasterMenu : UIViewController <WKScriptMessageHandler>
          @property (nonatomic, strong) WKWebView *webView;
          @end

          @implementation WMasterMenu
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              [config.userContentController addScriptMessageHandler:self name:@"wmaster"];
              self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
              self.webView.backgroundColor = [UIColor clearColor];
              self.webView.opaque = NO;
              self.webView.scrollView.bounces = NO;
              [self.view addSubview:self.webView];
              [self.webView loadHTMLString:[NSString stringWithUTF8String:HTML_UI] baseURL:nil];
          }

          - (void)userContentController:(WKUserContentController *)userContentController didReceiveScriptMessage:(WKScriptMessage *)message {
              NSDictionary *dict = [NSJSONSerialization JSONObjectWithData:[message.body dataUsingEncoding:NSUTF8StringEncoding] options:0 error:nil];
              if ([dict[@"action"] isEqualToString:@"login"]) {
                  dispatch_async(dispatch_get_global_queue(0, 0), ^{
                      string res = SyncWithServer(string([dict[@"key"] UTF8String]));
                      dispatch_async(dispatch_get_main_queue(), ^{
                          [self.webView evaluateJavaScript:[NSString stringWithFormat:@"onLoginResponse('%@')", [NSString stringWithUTF8String:res.c_str()]] completionHandler:nil];
                      });
                  });
              }
          }

          // 🛡️ السحر هنا: التحكم بمنع اللمس أو تمريره للعبة
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              // إذا اللوكن طالع (غير مسجل دخول)، احجب اللمس عن كل اللعبة (تجميد)
              if (!g_IsLoggedIn) return [super.view hitTest:point withEvent:event];

              // إذا مسجل دخول، اسمح للمس بالمرور للعبة إلا إذا ضغط على المنيو نفسه
              UIView *hitView = [super.view hitTest:point withEvent:event];
              if (hitView == self.view || hitView == self.webView.scrollView) return nil;
              return hitView;
          }
          @end

          @interface WMasterLoader : NSObject
          + (void)inject;
          @end

          @implementation WMasterLoader
          + (void)inject {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIWindow *mainWindow = nil;
                  for (UIScene *scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive && [scene isKindOfClass:[UIWindowScene class]]) {
                          for (UIWindow *window in ((UIWindowScene *)scene).windows) {
                              if (window.isKeyWindow) { mainWindow = window; break; }
                          }
                      }
                  }
                  if (mainWindow && mainWindow.rootViewController) {
                      WMasterMenu *menuVC = [[WMasterMenu alloc] init];
                      [mainWindow addSubview:menuVC.view];
                      menuVC.view.frame = mainWindow.bounds;
                      [mainWindow bringSubviewToFront:menuVC.view];
                  } else {
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 0.5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{ [self inject]; });
                  }
              });
          }
          @end

          __attribute__((constructor))
          void Start() { [WMasterLoader inject]; }
          EOF

      - name: 🛠️ تجهيز Xcode SDK
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 🔥 عملية الصهر
        run: |
          curl -sSL -o json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
          mkdir -p out
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -dynamiclib -std=c++17 -O3 -fobjc-arc \
          -I. wsam.mm \
          -framework Foundation -framework UIKit -framework WebKit \
          -o out/WMASTER_Dragon.dylib

      - name: 📦 ضغط الملف للتحميل
        run: |
          cd out
          zip DRAGON-HACK.zip WMASTER_Dragon.dylib

      - name: 📤 استخراج الهاك النهائي
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-SHAMMARI
          path: out/DRAGON-HACK.zip
