// ==========================================================
// [🎨] SOVEREIGN PRO MENU - List UI with Checkboxes
// ==========================================================
@interface SovereignModMenu : UIView <UITableViewDelegate, UITableViewDataSource>
@property (nonatomic, strong) UITableView *tableView;
@property (nonatomic, strong) NSArray *features;
@property (nonatomic, strong) UIVisualEffectView *blurView;
@property (nonatomic, strong) UIView *header;
@end

@implementation SovereignModMenu

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        self.alpha = 0;
        self.features = @[@"تشغيل الرادار (Master ESP)", 
                         @"كشف الخطوط (Line)", 
                         @"كشف البوكس (Box)", 
                         @"كشف العظام (Skeleton)", 
                         @"كشف الصحة (HP Bar)", 
                         @"كشف الاسم (Name)", 
                         @"ثبات سلاح 100% (No Recoil)",
                         @"منظور الآيباد (iPad View)"];

        // تأثير الزجاج المضبب
        UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
        self.blurView = [[UIVisualEffectView alloc] initWithEffect:blur];
        self.blurView.frame = self.bounds;
        self.blurView.layer.cornerRadius = 20;
        self.blurView.layer.masksToBounds = YES;
        self.blurView.layer.borderColor = [[UIColor whiteColor] colorWithAlphaComponent:0.2].CGColor;
        self.blurView.layer.borderWidth = 1.2;
        [self addSubview:self.blurView];

        // شريط القيادة (Header)
        self.header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 45)];
        self.header.backgroundColor = [[UIColor colorWithRed:0.8 green:0.1 blue:0.1 alpha:0.3] colorWithAlphaComponent:0.3];
        [self addSubview:self.header];

        UILabel *title = [[UILabel alloc] initWithFrame:self.header.bounds];
        title.text = @"SOVEREIGN ELITE X v25";
        title.textColor = [UIColor cyanColor];
        title.textAlignment = NSTextAlignmentCenter;
        title.font = [UIFont fontWithName:@"AvenirNext-Heavy" size:14];
        [self.header addSubview:title];

        // القائمة الرئيسية (Table View)
        self.tableView = [[UITableView alloc] initWithFrame:CGRectMake(0, 45, frame.size.width, frame.size.height - 45)];
        self.tableView.backgroundColor = [UIColor clearColor];
        self.tableView.delegate = self;
        self.tableView.dataSource = self;
        self.tableView.separatorColor = [[UIColor whiteColor] colorWithAlphaComponent:0.1];
        self.tableView.scrollEnabled = YES;
        [self addSubview:self.tableView];

        UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleDrag:)];
        [self.header addGestureRecognizer:pan];
    }
    return self;
}

#pragma mark - TableView Methods
- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section { return self.features.count; }

- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
    UITableViewCell *cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1 reuseIdentifier:@"Cell"];
    cell.backgroundColor = [UIColor clearColor];
    cell.textLabel.font = [UIFont boldSystemFontOfSize:13];
    cell.selectionStyle = UITableViewCellSelectionStyleNone;

    BOOL active = [self getFeatureState:indexPath.row];
    cell.textLabel.text = self.features[indexPath.row];
    
    // [نظام الألوان]: أصفر للنشط، أحمر للمغلق
    cell.textLabel.textColor = active ? [UIColor yellowColor] : [UIColor redColor];
    cell.detailTextLabel.text = active ? @"[✔]" : @"[  ]";
    cell.detailTextLabel.textColor = active ? [UIColor yellowColor] : [UIColor redColor];
    cell.detailTextLabel.font = [UIFont fontWithName:@"Courier-Bold" size:16];

    return cell;
}

- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {
    [self toggleFeature:indexPath.row];
    [tableView reloadRowsAtIndexPaths:@[indexPath] withRowAnimation:UITableViewRowAnimationFade];
    UIImpactFeedbackGenerator *gen = [[UIImpactFeedbackGenerator alloc] initWithStyle:UIImpactFeedbackStyleMedium];
    [gen impactOccurred];
}

- (BOOL)getFeatureState:(NSInteger)idx {
    switch (idx) {
        case 0: return SovereignConfig.esp_active;
        case 1: return SovereignConfig.esp_line;
        case 2: return SovereignConfig.esp_box;
        case 3: return SovereignConfig.esp_skeleton;
        case 4: return SovereignConfig.esp_hp;
        case 5: return SovereignConfig.esp_name;
        case 6: return SovereignConfig.no_recoil;
        case 7: return SovereignConfig.ipad_view;
        default: return NO;
    }
}

- (void)toggleFeature:(NSInteger)idx {
    switch (idx) {
        case 0: SovereignConfig.esp_active = !SovereignConfig.esp_active; break;
        case 1: SovereignConfig.esp_line = !SovereignConfig.esp_line; break;
        case 2: SovereignConfig.esp_box = !SovereignConfig.esp_box; break;
        case 3: SovereignConfig.esp_skeleton = !SovereignConfig.esp_skeleton; break;
        case 4: SovereignConfig.esp_hp = !SovereignConfig.esp_hp; break;
        case 5: SovereignConfig.esp_name = !SovereignConfig.esp_name; break;
        case 6: SovereignConfig.no_recoil = !SovereignConfig.no_recoil; break;
        case 7: SovereignConfig.ipad_view = !SovereignConfig.ipad_view; break;
    }
}

- (void)handleDrag:(UIPanGestureRecognizer *)p {
    CGPoint t = [p translationInView:self.superview];
    self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
    [p setTranslation:CGPointZero inView:self.superview];
}
@end

// ==========================================================
// [👁️] SOVEREIGN RADAR SDK - ESP Overlay Logic
// ==========================================================
@interface SovereignRadarOverlay : UIView
@end

@implementation SovereignRadarOverlay
- (void)drawRect:(CGRect)rect {
    if (!SovereignConfig.esp_active) return;
    CGContextRef ctx = UIGraphicsGetCurrentContext();
    if (!ctx) return;

    // [رصد تجريبي للنخاع البصري]
    [self drawElitePlayer:ctx x:200 y:350 w:90 h:210 hp:95 name:@"WSAM_GENERAL" dist:45 visible:YES];
    [self drawElitePlayer:ctx x:550 y:250 w:75 h:170 hp:35 name:@"ENEMY" dist:142 visible:NO];
}

- (void)drawElitePlayer:(CGContextRef)ctx x:(float)x y:(float)y w:(float)w h:(float)h hp:(int)hp name:(NSString *)name dist:(int)dist visible:(BOOL)visible {
    UIColor *mainCol = visible ? [UIColor yellowColor] : [UIColor redColor];
    
    // 1. [الخطوط]: خط من أعلى منتصف الشاشة إلى رأس العدو
    if (SovereignConfig.esp_line) {
        CGContextSetStrokeColorWithColor(ctx, mainCol.CGColor);
        CGContextSetLineWidth(ctx, 1.0);
        CGContextMoveToPoint(ctx, self.bounds.size.width / 2, 0);
        CGContextAddLineToPoint(ctx, x + w/2, y);
        CGContextStrokePath(ctx);
    }

    // 2. [الأسهم العريضة]: سهم الشيتو الاحترافي
    [self drawSovereignArrow:ctx atX:x+w/2 atY:y-45 color:mainCol];

    // 3. [البوكس]: المربع المحيط بالعدو
    if (SovereignConfig.esp_box) {
        CGContextSetStrokeColorWithColor(ctx, mainCol.CGColor);
        CGContextSetLineWidth(ctx, 1.8);
        CGContextStrokeRect(ctx, CGRectMake(x, y, w, h));
    }

    // 4. [شريط الدم الأصفر العريض]: بسمك 10 بكسل
    if (SovereignConfig.esp_hp) {
        float hpLen = (h * hp) / 100;
        CGContextSetFillColorWithColor(ctx, [[UIColor blackColor] colorWithAlphaComponent:0.6].CGColor);
        CGContextFillRect(ctx, CGRectMake(x-15, y, 10, h)); // شريط عريض
        CGContextSetFillColorWithColor(ctx, [UIColor yellowColor].CGColor);
        CGContextFillRect(ctx, CGRectMake(x-15, y + (h-hpLen), 10, hpLen));
    }

    // 5. [الاسم والمسافة]
    if (SovereignConfig.esp_name) {
        NSString *info = [NSString stringWithFormat:@"%@ [%dm]", name, dist];
        [info drawAtPoint:CGPointMake(x, y-20) withAttributes:@{NSFontAttributeName:[UIFont boldSystemFontOfSize:10], NSForegroundColorAttributeName:[UIColor whiteColor]}];
    }
}

- (void)drawSovereignArrow:(CGContextRef)ctx atX:(float)x atY:(float)y color:(UIColor *)color {
    CGContextSetFillColorWithColor(ctx, color.CGColor);
    CGContextMoveToPoint(ctx, x, y);
    CGContextAddLineToPoint(ctx, x-15, y-20); // قاعدة السهم عريضة
    CGContextAddLineToPoint(ctx, x+15, y-20);
    CGContextClosePath(ctx);
    CGContextFillPath(ctx);
}
@end

// ==========================================================
// [🚀] صاعق الانطلاق الموحد (Injection Point)
// ==========================================================
static SovereignModMenu *wsamMenu = nil;
static SovereignRadarOverlay *wsamRadar = nil;

void __attribute__((constructor)) ignite_wsam_sdk_v25() {
    sovereign_marrow_bloat[0] = 0x57; 
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(15 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        UIWindow *win = [[UIApplication sharedApplication] keyWindow];
        if (win) {
            wsamRadar = [[SovereignRadarOverlay alloc] initWithFrame:win.bounds];
            wsamRadar.backgroundColor = [UIColor clearColor];
            wsamRadar.userInteractionEnabled = NO;
            [win addSubview:wsamRadar];

            wsamMenu = [[SovereignModMenu alloc] initWithFrame:CGRectMake(win.bounds.size.width/2 - 140, win.bounds.size.height/2 - 180, 280, 360)];
            [win addSubview:wsamMenu];

            // [🎯] التفعيل: نقر مزدوج في الزاوية العليا اليمنى فقط
            UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:[SovereignModMenu class] action:@selector(handleGlobalTap:)];
            tap.numberOfTapsRequired = 2;
            [win addGestureRecognizer:tap];

            [NSTimer scheduledTimerWithTimeInterval:0.016 repeats:YES block:^(NSTimer *t){ [wsamRadar setNeedsDisplay]; }];
        }
    });
}

@implementation SovereignModMenu (Global)
+ (void)handleGlobalTap:(UITapGestureRecognizer *)sender {
    CGPoint loc = [sender locationInView:sender.view];
    CGFloat sw = [UIScreen mainScreen].bounds.size.width;
    // إذا كان النقر في الـ 30% اليمنى من الأعلى
    if (loc.x > sw * 0.7 && loc.y < 180) {
        [UIView animateWithDuration:0.3 animations:^{
            wsamMenu.alpha = (wsamMenu.alpha == 0) ? 1.0 : 0;
            wsamMenu.transform = (wsamMenu.alpha == 0) ? CGAffineTransformMakeScale(0.8, 0.8) : CGAffineTransformIdentity;
        }];
    }
}
@end
