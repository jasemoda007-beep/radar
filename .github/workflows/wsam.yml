// ==========================================================
// 3. [واجهة المود الأصلية - Native View] 🎨
// ==========================================================
@interface DragonMenu : UIView
@property (nonatomic, strong) UIVisualEffectView *blurView;
@property (nonatomic, strong) UIView *container;
@property (nonatomic, strong) UIView *pageMain;
@property (nonatomic, strong) UIView *pageSettings;
@property (nonatomic, strong) UILabel *scaleLabel;
@end

@implementation DragonMenu

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        self.layer.cornerRadius = 20;
        self.layer.borderWidth = 1.2;
        self.layer.borderColor = [UIColor colorWithRed:1.0 green:0.84 blue:0.0 alpha:0.6].CGColor;
        self.clipsToBounds = YES;

        // تطبيق تأثير الزجاج الضبابي الحقيقي
        UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
        self.blurView = [[UIVisualEffectView alloc] initWithEffect:blur];
        self.blurView.frame = self.bounds;
        self.blurView.autoresizingMask = UIViewAutoresizingFlexibleWidth | UIViewAutoresizingFlexibleHeight;
        [self addSubview:self.blurView];

        self.container = [[UIView alloc] initWithFrame:self.bounds];
        self.container.autoresizingMask = UIViewAutoresizingFlexibleWidth | UIViewAutoresizingFlexibleHeight;
        [self addSubview:self.container];

        [self setupHeader];
        [self setupPages];
    }
    return self;
}

- (void)setupHeader {
    UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, self.frame.size.width, 50)];
    header.backgroundColor = [UIColor colorWithWhite:0 alpha:0.5];
    [self.container addSubview:header];

    UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
    title.text = @"عين الصقر | الإصدار الإمبراطوري PRO";
    title.textColor = [UIColor yellowColor];
    title.textAlignment = NSTextAlignmentCenter;
    title.font = [UIFont boldSystemFontOfSize:14];
    [header addSubview:title];
}

- (void)setupPages {
    // 1. الصفحة الرئيسية (التفعيلات)
    self.pageMain = [[UIView alloc] initWithFrame:CGRectMake(0, 50, self.frame.size.width, self.frame.size.height-50)];
    [self.container addSubview:self.pageMain];

    // إضافة قسم الايمبوت (اختيارات)
    UILabel *aimLabel = [[UILabel alloc] initWithFrame:CGRectMake(20, 10, 200, 20)];
    aimLabel.text = @"محرك الايمبوت (AIMBOT)";
    aimLabel.textColor = [UIColor yellowColor];
    aimLabel.font = [UIFont boldSystemFontOfSize:10];
    [self.pageMain addSubview:aimLabel];

    UISegmentedControl *boneSelect = [[UISegmentedControl alloc] initWithItems:@[@"رأس", @"صدر", @"قدم"]];
    boneSelect.frame = CGRectMake(15, 35, self.frame.size.width-30, 35);
    boneSelect.selectedSegmentIndex = 0;
    boneSelect.selectedSegmentTintColor = [UIColor yellowColor];
    [self.pageMain addSubview:boneSelect];

    // زر الإعدادات العريض
    UIButton *navBtn = [UIButton buttonWithType:UIButtonTypeCustom];
    navBtn.frame = CGRectMake(15, self.pageMain.frame.size.height - 70, self.frame.size.width-30, 45);
    navBtn.backgroundColor = [UIColor colorWithRed:1 green:0.84 blue:0 alpha:0.1];
    navBtn.layer.borderColor = [UIColor yellowColor].CGColor;
    navBtn.layer.borderWidth = 1;
    navBtn.layer.cornerRadius = 12;
    [navBtn setTitle:@"⚙️ إعدادات أحجام الرادار (سلايدرات) ↘" forState:UIControlStateNormal];
    [navBtn setTitleColor:[UIColor yellowColor] forState:UIControlStateNormal];
    navBtn.titleLabel.font = [UIFont boldSystemFontOfSize:11];
    [navBtn addTarget:self action:@selector(switchPage) forControlEvents:UIControlEventTouchUpInside];
    [self.pageMain addSubview:navBtn];

    // 2. صفحة الإعدادات (السلايدرات)
    self.pageSettings = [[UIView alloc] initWithFrame:self.pageMain.frame];
    self.pageSettings.hidden = YES;
    [self.container addSubview:self.pageSettings];

    [self addSlider:@"سمك البوكس" y:20 configVal:&Config.boxThickness];
    [self addSlider:@"حجم الخط" y:80 configVal:&Config.nameFontSize];
    
    UIButton *backBtn = [UIButton buttonWithType:UIButtonTypeSystem];
    backBtn.frame = CGRectMake(15, self.pageSettings.frame.size.height - 60, self.frame.size.width-30, 40);
    [backBtn setTitle:@"← العودة للقائمة" forState:UIControlStateNormal];
    [backBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
    [backBtn addTarget:self action:@selector(switchPage) forControlEvents:UIControlEventTouchUpInside];
    [self.pageSettings addSubview:backBtn];
}

- (void)addSlider:(NSString *)title y:(CGFloat)y configVal:(float *)val {
    UILabel *lbl = [[UILabel alloc] initWithFrame:CGRectMake(20, y, 200, 20)];
    lbl.text = title; lbl.textColor = [UIColor lightGrayColor]; lbl.font = [UIFont systemFontOfSize:10];
    [self.pageSettings addSubview:lbl];

    UISlider *slider = [[UISlider alloc] initWithFrame:CGRectMake(20, y+25, self.frame.size.width-40, 20)];
    slider.minimumValue = 1.0; slider.maximumValue = 20.0;
    slider.value = *val;
    slider.tintColor = [UIColor yellowColor];
    [self.pageSettings addSubview:slider];
}

- (void)switchPage {
    self.pageMain.hidden = !self.pageMain.hidden;
    self.pageSettings.hidden = !self.pageSettings.hidden;
}

// نظام التحريك والتحجيم باللمس
- (void)touchesMoved:(NSSet<UITouch *> *)touches withEvent:(UIEvent *)event {
    UITouch *touch = [touches anyObject];
    CGPoint loc = [touch locationInView:self.superview];
    CGPoint prev = [touch previousLocationInView:self.superview];
    
    CGRect rect = self.frame;
    // إذا كان اللمس في الزاوية السفلى اليمنى -> تحجيم
    if (prev.x > rect.origin.x + rect.size.width - 40 && prev.y > rect.origin.y + rect.size.height - 40) {
        rect.size.width += loc.x - prev.x;
        rect.size.height += loc.y - prev.y;
    } else { // تحريك
        rect.origin.x += loc.x - prev.x;
        rect.origin.y += loc.y - prev.y;
    }
    self.frame = rect;
}

@end

// ==========================================================
// 4. [نظام الإخفاء بـ 3 أصابع] ☝️☝️☝️
// ==========================================================
@interface OverlayWindow : UIViewController
@property (nonatomic, strong) DragonMenu *menu;
@end

@implementation OverlayWindow
- (void)viewDidLoad {
    [super viewDidLoad];
    self.view.backgroundColor = [UIColor clearColor];
    
    self.menu = [[DragonMenu alloc] initWithFrame:CGRectMake(50, 100, 350, 500)];
    [self.view addSubview:self.menu];

    // إضافة مستشعر 3 أصابع (Double Tap) لإخفاء المود
    UITapGestureRecognizer *hideTap = [[UITapGestureRecognizer alloc] initWithTarget:self action:@selector(toggleMenuVisibility)];
    hideTap.numberOfTapsRequired = 2;
    hideTap.numberOfTouchesRequired = 3;
    [self.view addGestureRecognizer:hideTap];
}

- (void)toggleMenuVisibility {
    self.menu.hidden = !self.menu.hidden;
}
@end

// ==========================================================
// 5. [نقطة حقن الـ Dylib في اللعبة] 🚀
// ==========================================================
__attribute__((constructor)) static void dragon_imperial_init() {
    // تأخير بسيط لضمان استقرار اللعبة قبل حقن الواجهة
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{
        UIWindow *keyWindow = [UIApplication sharedApplication].keyWindow;
        if (keyWindow) {
            OverlayWindow *ov = [[OverlayWindow alloc] init];
            [keyWindow addSubview:ov.view];
            ov.view.frame = keyWindow.bounds;
            NSLog(@"🐲 Dragon Imperial Native UI Loaded Successfully!");
        }
    });
}
