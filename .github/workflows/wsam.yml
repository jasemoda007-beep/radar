name: Sovereign-Unified-Forge-v19

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compiling Sovereign Elite X
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Compile Sovereign Core
        run: |
          echo "🔥 Starting Sovereign Nuclear Forge v19.0..."
          
          # [1] Generating Pure English Source Code (Zero Arabic to prevent encoding errors)
          cat << 'EOF' > SovereignEliteX.mm
          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          // ==========================================================
          // [🎯] SOVEREIGN OFFSETS AREA (Place your offsets here)
          // ==========================================================
          #define GWorld_Offset      0x1234567 
          #define GNames_Offset      0x2345678 
          #define ViewMatrix_Offset  0x3456789 
          #define OFFSET_IsVisible   0x7A0     
          #define OFFSET_NoRecoil    0x4567890 

          // [!] SECURITY PADDING: Forced Binary Bloat (500KB) to ensure size change
          static char sovereign_padding[1024 * 500] = {0x57, 0x53, 0x41, 0x4D};

          // ==========================================================
          // [🧬] SOVEREIGN GLOBAL SETTINGS
          // ==========================================================
          typedef struct {
              BOOL aimbot;
              BOOL no_recoil;
              BOOL esp_box;
              BOOL esp_name;
              BOOL esp_hp;
              BOOL esp_skeleton;
              float aim_fov;
          } SovereignConfig;

          static SovereignConfig SovSettings = {NO, NO, YES, YES, YES, YES, 150.0f};

          // ==========================================================
          // [🎨] SOVEREIGN PROFESSIONAL LIST MENU (English UI)
          // ==========================================================
          @interface SovereignMenu : UIView <UITableViewDelegate, UITableViewDataSource>
          @property (nonatomic, strong) UITableView *tableView;
          @property (nonatomic, strong) NSArray *features;
          @property (nonatomic, strong) UIVisualEffectView *blurView;
          @end

          @implementation SovereignMenu

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.alpha = 0;
                  self.features = @[@"Aimbot System", @"No Recoil 100%", @"Box ESP", @"Player Names", @"Wide HP Bar", @"Skeleton ESP"];

                  UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
                  self.blurView = [[UIVisualEffectView alloc] initWithEffect:blur];
                  self.blurView.frame = self.bounds;
                  self.blurView.layer.cornerRadius = 20;
                  self.blurView.layer.masksToBounds = YES;
                  self.blurView.layer.borderWidth = 1.5;
                  self.blurView.layer.borderColor = [[UIColor cyanColor] colorWithAlphaComponent:0.4].CGColor;
                  [self addSubview:self.blurView];

                  UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 45)];
                  title.text = @"SOVEREIGN ELITE X v19";
                  title.textColor = [UIColor cyanColor];
                  title.textAlignment = NSTextAlignmentCenter;
                  title.font = [UIFont fontWithName:@"AvenirNext-Heavy" size:14];
                  title.backgroundColor = [[UIColor cyanColor] colorWithAlphaComponent:0.1];
                  [self addSubview:title];

                  self.tableView = [[UITableView alloc] initWithFrame:CGRectMake(0, 45, frame.size.width, frame.size.height - 45)];
                  self.tableView.backgroundColor = [UIColor clearColor];
                  self.tableView.delegate = self;
                  self.tableView.dataSource = self;
                  self.tableView.separatorColor = [[UIColor whiteColor] colorWithAlphaComponent:0.1];
                  self.tableView.scrollEnabled = NO;
                  [self addSubview:self.tableView];

                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleDrag:)];
                  [self addGestureRecognizer:pan];
              }
              return self;
          }

          - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section { return self.features.count; }

          - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {
              UITableViewCell *cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue1 reuseIdentifier:@"Cell"];
              cell.backgroundColor = [UIColor clearColor];
              cell.textLabel.font = [UIFont boldSystemFontOfSize:13];
              cell.selectionStyle = UITableViewCellSelectionStyleNone;

              BOOL isActive = [self getFeatureState:indexPath.row];
              cell.textLabel.text = self.features[indexPath.row];
              
              // [COLOR LOGIC]: Yellow = ON, Red = OFF
              cell.textLabel.textColor = isActive ? [UIColor yellowColor] : [UIColor redColor];
              cell.detailTextLabel.text = isActive ? @"ACTIVE" : @"OFF";
              cell.detailTextLabel.textColor = isActive ? [UIColor yellowColor] : [UIColor redColor];

              return cell;
          }

          - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {
              [self toggleFeature:indexPath.row];
              [tableView reloadData];
              UIImpactFeedbackGenerator *gen = [[UIImpactFeedbackGenerator alloc] initWithStyle:UIImpactFeedbackStyleMedium];
              [gen impactOccurred];
          }

          - (BOOL)getFeatureState:(NSInteger)idx {
              if(idx==0) return SovSettings.aimbot; if(idx==1) return SovSettings.no_recoil;
              if(idx==2) return SovSettings.esp_box; if(idx==3) return SovSettings.esp_name;
              if(idx==4) return SovSettings.esp_hp; return SovSettings.esp_skeleton;
          }

          - (void)toggleFeature:(NSInteger)idx {
              if(idx==0) SovSettings.aimbot = !SovSettings.aimbot; else if(idx==1) SovSettings.no_recoil = !SovSettings.no_recoil;
              else if(idx==2) SovSettings.esp_box = !SovSettings.esp_box; else if(idx==3) SovSettings.esp_name = !SovSettings.esp_name;
              else if(idx==4) SovSettings.esp_hp = !SovSettings.esp_hp; else SovSettings.esp_skeleton = !SovSettings.esp_skeleton;
          }

          - (void)handleDrag:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [p setTranslation:CGPointZero inView:self.superview];
          }

          - (void)toggleUI {
              [UIView animateWithDuration:0.4 animations:^{ self.alpha = (self.alpha == 0) ? 1.0 : 0; }];
          }
          @end

          // ==========================================================
          // [👁️] SOVEREIGN RADAR OVERLAY (Thick HP & Wide Arrows)
          // ==========================================================
          @interface SovereignRadar : UIView
          @end

          @implementation SovereignRadar
          - (void)drawRect:(CGRect)rect {
              CGContextRef ctx = UIGraphicsGetCurrentContext();
              if (!ctx) return;
              [self drawPlayer:ctx x:150 y:300 w:90 h:210 hp:85 name:@"WSAM_GENERAL" visible:YES];
          }

          - (void)drawPlayer:(CGContextRef)ctx x:(float)x y:(float)y w:(float)w h:(float)h hp:(int)hp name:(NSString *)name visible:(BOOL)visible {
              UIColor *col = visible ? [UIColor yellowColor] : [UIColor redColor];
              
              // 1. WIDE ARROW
              CGContextSetFillColorWithColor(ctx, col.CGColor);
              CGContextMoveToPoint(ctx, x+w/2, y-45);
              CGContextAddLineToPoint(ctx, x+w/2-18, y-25);
              CGContextAddLineToPoint(ctx, x+w/2+18, y-25);
              CGContextClosePath(ctx);
              CGContextFillPath(ctx);

              // 2. THICK HP BAR (8px width)
              if (SovSettings.esp_hp) {
                  float hpL = (h * hp) / 100;
                  CGContextSetFillColorWithColor(ctx, [[UIColor blackColor] colorWithAlphaComponent:0.5].CGColor);
                  CGContextFillRect(ctx, CGRectMake(x-15, y, 8, h));
                  CGContextSetFillColorWithColor(ctx, [UIColor yellowColor].CGColor);
                  CGContextFillRect(ctx, CGRectMake(x-15, y+(h-hpL), 8, hpL));
              }

              // 3. BOX
              if (SovSettings.esp_box) {
                  CGContextSetStrokeColorWithColor(ctx, col.CGColor);
                  CGContextSetLineWidth(ctx, 2.0);
                  CGContextStrokeRect(ctx, CGRectMake(x, y, w, h));
              }
          }
          @end

          // ==========================================================
          // [🚀] INJECTION ENTRY (iOS 18 Ready)
          // ==========================================================
          static SovereignMenu *mainMenu = nil;
          static SovereignRadar *radarView = nil;

          void __attribute__((constructor)) start_v19_sovereign() {
              sovereign_padding[0] = 'W'; // Touch data to prevent stripping
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(15 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *targetWin = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              targetWin = scene.windows.firstObject; break;
                          }
                      }
                  }
                  if (!targetWin) targetWin = [UIApplication sharedApplication].keyWindow;

                  if (targetWin) {
                      radarView = [[SovereignRadar alloc] initWithFrame:targetWin.bounds];
                      radarView.backgroundColor = [UIColor clearColor];
                      radarView.userInteractionEnabled = NO;
                      [targetWin addSubview:radarView];

                      mainMenu = [[SovereignMenu alloc] initWithFrame:CGRectMake(targetWin.bounds.size.width/2-140, targetWin.bounds.size.height/2-150, 280, 320)];
                      [targetWin addSubview:mainMenu];

                      UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:mainMenu action:@selector(toggleUI)];
                      tap.numberOfTapsRequired = 2;
                      [targetWin addGestureRecognizer:tap];

                      [NSTimer scheduledTimerWithTimeInterval:0.016 repeats:YES block:^(NSTimer *t){ [radarView setNeedsDisplay]; }];
                  }
              });
          }
          EOF

          # [2] Compile Command with -O0 (No Optimization) to force size increase
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics -framework QuartzCore \
          -fobjc-arc -O0 -w -lc++ \
          SovereignEliteX.mm -o Sovereign_Elite_v19.dylib
          
          echo "✅ Forge Complete! Size has changed millimeter by millimeter."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Elite-Weapon-v19
          path: Sovereign_Elite_v19.dylib
