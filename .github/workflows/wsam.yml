// ==========================================================
// [🎨] SOVEREIGN CHETO UI (Grid & Tabs)
// ==========================================================
@interface SovereignChetoMenu : UIView
@property (nonatomic, strong) UIView *contentArea;
@property (nonatomic, strong) NSMutableArray *tabButtons;
@end

@implementation SovereignChetoMenu

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        self.alpha = 0; // مخفي عند البداية
        self.backgroundColor = [[UIColor colorWithRed:0.08 green:0.09 blue:0.13 alpha:0.95] colorWithAlphaComponent:0.98];
        self.layer.cornerRadius = 8;
        self.layer.borderColor = [[UIColor whiteColor] colorWithAlphaComponent:0.1].CGColor;
        self.layer.borderWidth = 1.0;
        self.clipsToBounds = YES;

        // 1. شريط التبويبات العلوي (Top Tab Bar)
        UIView *tabBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 40)];
        tabBar.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.08 alpha:1.0];
        [self addSubview:tabBar];

        // زر الإغلاق (X) الأحمر
        UIButton *closeBtn = [[UIButton alloc] initWithFrame:CGRectMake(5, 5, 30, 30)];
        [closeBtn setTitle:@"X" forState:UIControlStateNormal];
        [closeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
        closeBtn.backgroundColor = [UIColor colorWithRed:0.8 green:0.1 blue:0.1 alpha:1.0];
        closeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:14];
        closeBtn.layer.cornerRadius = 15;
        [closeBtn addTarget:self action:@selector(hideMenu) forControlEvents:UIControlEventTouchUpInside];
        [tabBar addSubview:closeBtn];

        // التبويبات (رادار، موارد، بولت، تفعيلات)
        NSArray *tabs = @[@"تفعيلات", @"بولت", @"موارد", @"رادار"];
        self.tabButtons = [NSMutableArray array];
        float tabWidth = (frame.size.width - 45) / 4;
        
        for (int i = 0; i < tabs.count; i++) {
            UIButton *btn = [[UIButton alloc] initWithFrame:CGRectMake(40 + (i * tabWidth), 0, tabWidth, 40)];
            [btn setTitle:tabs[i] forState:UIControlStateNormal];
            btn.titleLabel.font = [UIFont boldSystemFontOfSize:12];
            [btn setTitleColor:[UIColor lightGrayColor] forState:UIControlStateNormal];
            btn.tag = i;
            
            // جعل "رادار" مفعل افتراضياً (التبويب الأيمن)
            if (i == 3) {
                [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                btn.backgroundColor = [UIColor colorWithRed:0.8 green:0.1 blue:0.1 alpha:1.0];
            } else {
                btn.backgroundColor = [UIColor clearColor];
            }
            [tabBar addSubview:btn];
            [self.tabButtons addObject:btn];
        }

        // 2. منطقة المحتوى (Content Area)
        self.contentArea = [[UIView alloc] initWithFrame:CGRectMake(0, 40, frame.size.width, frame.size.height - 40)];
        [self addSubview:self.contentArea];

        [self buildRadarGrid];

        // نص سفلي
        UILabel *footer = [[UILabel alloc] initWithFrame:CGRectMake(10, self.contentArea.frame.size.height - 25, frame.size.width - 20, 20)];
        footer.text = @"بيانات الكيم | General Wsam";
        footer.textColor = [UIColor grayColor];
        footer.font = [UIFont systemFontOfSize:10];
        footer.textAlignment = NSTextAlignmentRight;
        [self.contentArea addSubview:footer];

        // نظام السحب (Draggable)
        UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handleDrag:)];
        [tabBar addGestureRecognizer:pan];
    }
    return self;
}

// بناء الشبكة كما في الصورة (Grid Layout)
- (void)buildRadarGrid {
    // الزر الرئيسي (تشغيل الكشف)
    UIButton *masterBtn = [self createGridButton:@"تشغيل الكشف" frame:CGRectMake(10, 10, self.contentArea.frame.size.width - 20, 40) tag:200];
    [self.contentArea addSubview:masterBtn];

    // شبكة الأزرار (3 أعمدة × 3 صفوف)
    float btnW = (self.contentArea.frame.size.width - 40) / 3;
    float btnH = 40;
    float startY = 60;
    
    // الصف الأول (يمين إلى يسار)
    [self.contentArea addSubview:[self createGridButton:@"كشف الخط" frame:CGRectMake(10 + (btnW+10)*2, startY, btnW, btnH) tag:101]];
    [self.contentArea addSubview:[self createGridButton:@"كشف البوكس" frame:CGRectMake(10 + (btnW+10)*1, startY, btnW, btnH) tag:102]];
    [self.contentArea addSubview:[self createGridButton:@"كشف العظام" frame:CGRectMake(10, startY, btnW, btnH) tag:103]];

    // الصف الثاني
    [self.contentArea addSubview:[self createGridButton:@"كشف القنابل" frame:CGRectMake(10 + (btnW+10)*2, startY + 50, btnW, btnH) tag:104]];
    [self.contentArea addSubview:[self createGridButton:@"كشف المسافه" frame:CGRectMake(10 + (btnW+10)*1, startY + 50, btnW, btnH) tag:105]];
    [self.contentArea addSubview:[self createGridButton:@"كشف الصحه" frame:CGRectMake(10, startY + 50, btnW, btnH) tag:106]];

    // الصف الثالث
    [self.contentArea addSubview:[self createGridButton:@"كشف الاسم" frame:CGRectMake(10 + (btnW+10)*2, startY + 100, btnW, btnH) tag:107]];
    [self.contentArea addSubview:[self createGridButton:@"التحذير" frame:CGRectMake(10 + (btnW+10)*1, startY + 100, btnW, btnH) tag:108]];
    [self.contentArea addSubview:[self createGridButton:@"كشف الرأس" frame:CGRectMake(10, startY + 100, btnW, btnH) tag:109]];
}

- (UIButton *)createGridButton:(NSString *)title frame:(CGRect)frame tag:(int)tag {
    UIButton *btn = [[UIButton alloc] initWithFrame:frame];
    [btn setTitle:title forState:UIControlStateNormal];
    btn.titleLabel.font = [UIFont boldSystemFontOfSize:11];
    [btn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
    btn.backgroundColor = [UIColor colorWithRed:0.12 green:0.12 blue:0.15 alpha:1.0];
    btn.layer.cornerRadius = 6;
    btn.layer.borderWidth = 1.2;
    btn.tag = tag;
    
    // اللون الافتراضي (غير مفعل) رمادي
    btn.layer.borderColor = [UIColor darkGrayColor].CGColor;
    
    [btn addTarget:self action:@selector(toggleFeature:) forControlEvents:UIControlEventTouchUpInside];
    return btn;
}

- (void)toggleFeature:(UIButton *)sender {
    BOOL isActive = NO;
    
    // تحديث الحالة المليمتريّة
    switch (sender.tag) {
        case 200: SovConfig.master_esp = !SovConfig.master_esp; isActive = SovConfig.master_esp; break;
        case 101: SovConfig.esp_line = !SovConfig.esp_line; isActive = SovConfig.esp_line; break;
        case 102: SovConfig.esp_box = !SovConfig.esp_box; isActive = SovConfig.esp_box; break;
        case 103: SovConfig.esp_skeleton = !SovConfig.esp_skeleton; isActive = SovConfig.esp_skeleton; break;
        case 104: SovConfig.esp_grenade = !SovConfig.esp_grenade; isActive = SovConfig.esp_grenade; break;
        case 105: SovConfig.esp_dist = !SovConfig.esp_dist; isActive = SovConfig.esp_dist; break;
        case 106: SovConfig.esp_hp = !SovConfig.esp_hp; isActive = SovConfig.esp_hp; break;
        case 107: SovConfig.esp_name = !SovConfig.esp_name; isActive = SovConfig.esp_name; break;
        case 108: SovConfig.esp_warning = !SovConfig.esp_warning; isActive = SovConfig.esp_warning; break;
        case 109: SovConfig.esp_head = !SovConfig.esp_head; isActive = SovConfig.esp_head; break;
    }

    // [تكتيك الألوان]: تغيير حدود الزر للون الأحمر عند التفعيل كما في الصورة
    [UIView animateWithDuration:0.2 animations:^{
        if (isActive) {
            sender.layer.borderColor = [UIColor redColor].CGColor;
            // يمكن إضافة ظل خفيف للزر المفعل
        } else {
            sender.layer.borderColor = [UIColor darkGrayColor].CGColor;
        }
    }];
    
    UIImpactFeedbackGenerator *gen = [[UIImpactFeedbackGenerator alloc] initWithStyle:UIImpactFeedbackStyleLight];
    [gen impactOccurred];
}

- (void)hideMenu {
    [UIView animateWithDuration:0.3 animations:^{
        self.alpha = 0;
        self.transform = CGAffineTransformMakeScale(0.8, 0.8);
    }];
}

- (void)handleDrag:(UIPanGestureRecognizer *)p {
    CGPoint t = [p translationInView:self.superview];
    self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
    [p setTranslation:CGPointZero inView:self.superview];
}
@end

// ==========================================================
// [👁️] SOVEREIGN ESP ENGINE (Lines, Box, Thick HP)
// ==========================================================
@interface SovereignRadarOverlay : UIView
@end

@implementation SovereignRadarOverlay
- (void)drawRect:(CGRect)rect {
    if (!SovConfig.master_esp) return;
    
    CGContextRef ctx = UIGraphicsGetCurrentContext();
    if (!ctx) return;

    // [محاكاة رصد الأعداء]: سيتم ربطها لاحقاً بحلقة قراءة الذاكرة (Entity Loop)
    [self drawTarget:ctx x:150 y:300 w:80 h:190 hp:90 name:@"Sovereign_Wsam" dist:45 visible:YES];
    [self drawTarget:ctx x:500 y:250 w:60 h:150 hp:30 name:@"Target_Lock" dist:180 visible:NO];
}

- (void)drawTarget:(CGContextRef)ctx x:(float)x y:(float)y w:(float)w h:(float)h hp:(int)hp name:(NSString *)name dist:(int)dist visible:(BOOL)visible {
    
    UIColor *mainColor = visible ? [UIColor greenColor] : [UIColor redColor];

    // 1. [كشف الخط]: خط من أعلى منتصف الشاشة إلى اللاعب
    if (SovConfig.esp_line) {
        CGContextSetStrokeColorWithColor(ctx, mainColor.CGColor);
        CGContextSetLineWidth(ctx, 1.0);
        CGContextMoveToPoint(ctx, self.bounds.size.width / 2, 40); // نقطة البداية أعلى الشاشة
        CGContextAddLineToPoint(ctx, x + w/2, y); // نقطة النهاية (رأس اللاعب)
        CGContextStrokePath(ctx);
    }

    // 2. [كشف البوكس]
    if (SovConfig.esp_box) {
        CGContextSetStrokeColorWithColor(ctx, mainColor.CGColor);
        CGContextSetLineWidth(ctx, 1.5);
        CGContextStrokeRect(ctx, CGRectMake(x, y, w, h));
    }

    // 3. [كشف الصحة]: شريط عريض كما طلبت
    if (SovConfig.esp_hp) {
        float hpLen = (h * hp) / 100;
        CGContextSetFillColorWithColor(ctx, [[UIColor blackColor] colorWithAlphaComponent:0.6].CGColor);
        CGContextFillRect(ctx, CGRectMake(x - 12, y, 6, h)); 
        CGContextSetFillColorWithColor(ctx, (hp > 50 ? [UIColor greenColor] : [UIColor redColor]).CGColor);
        CGContextFillRect(ctx, CGRectMake(x - 12, y + (h - hpLen), 6, hpLen));
    }

    // 4. [كشف الاسم والمسافة]
    if (SovConfig.esp_name || SovConfig.esp_dist) {
        NSString *info = @"";
        if (SovConfig.esp_name) info = [info stringByAppendingString:name];
        if (SovConfig.esp_dist) info = [info stringByAppendingFormat:@" [%dm]", dist];
        
        [info drawAtPoint:CGPointMake(x, y - 20) withAttributes:@{NSFontAttributeName:[UIFont boldSystemFontOfSize:10], NSForegroundColorAttributeName:[UIColor whiteColor]}];
    }
}
@end

// ==========================================================
// [🚀] صاعق الانطلاق (Top-Right Double Tap Logic)
// ==========================================================
static SovereignChetoMenu *wsamMenu = nil;
static SovereignRadarOverlay *radarView = nil;

void __attribute__((constructor)) start_sovereign_v26() {
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        UIWindow *targetWin = nil;
        if (@available(iOS 13.0, *)) {
            for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                if (scene.activationState == UISceneActivationStateForegroundActive) {
                    targetWin = scene.windows.firstObject; break;
                }
            }
        }
        if (!targetWin) targetWin = [UIApplication sharedApplication].keyWindow;

        if (targetWin) {
            radarView = [[SovereignRadarOverlay alloc] initWithFrame:targetWin.bounds];
            radarView.backgroundColor = [UIColor clearColor];
            radarView.userInteractionEnabled = NO;
            [targetWin addSubview:radarView];

            // مقاس المنيو المأخوذ من الصورة
            wsamMenu = [[SovereignChetoMenu alloc] initWithFrame:CGRectMake(targetWin.bounds.size.width/2 - 170, targetWin.bounds.size.height/2 - 140, 340, 280)];
            [targetWin addSubview:wsamMenu];

            // [🎯] إيماءة النقر المزدوج للركن الأيمن العلوي فقط
            UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:[SovereignChetoMenu class] action:@selector(handleTopRightTap:)];
            tap.numberOfTapsRequired = 2;
            [targetWin addGestureRecognizer:tap];

            [NSTimer scheduledTimerWithTimeInterval:0.016 repeats:YES block:^(NSTimer *t){ [radarView setNeedsDisplay]; }];
        }
    });
}

@implementation SovereignChetoMenu (GlobalTap)
+ (void)handleTopRightTap:(UITapGestureRecognizer *)sender {
    CGPoint loc = [sender locationInView:sender.view];
    CGFloat sw = [UIScreen mainScreen].bounds.size.width;
    
    // [قاعدة الاشتباك]: فتح المنيو فقط إذا كان النقر في الـ 30% اليمنى من الأعلى
    if (loc.x > sw * 0.7 && loc.y < 150) {
        [UIView animateWithDuration:0.3 animations:^{
            wsamMenu.alpha = (wsamMenu.alpha == 0) ? 1.0 : 0;
            wsamMenu.transform = (wsamMenu.alpha == 0) ? CGAffineTransformMakeScale(0.8, 0.8) : CGAffineTransformIdentity;
        }];
    }
}
@end
