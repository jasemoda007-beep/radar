name: Sovereign-Safe-Terminal-v101

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Safe Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Safe Terminal Core
        run: |
          cat << 'EOF' > Sovereign_Safe_Terminal.mm
          /**
           * Project: Sovereign Live Terminal v101k (Micro & Real-Time)
           * Architect: General Wsam Al-Safi
           * Feature: Fixed Visibility Toggle, Micro UI, Real File Tracing.
           * Tech: Objective-C Swizzling (100% ESign Safe)
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <mach-o/dyld.h>

          // =========================================================
          // [1] محرك الترمنال البصري (Micro UI Engine)
          // =========================================================
          @interface SovereignTerminal : UIView
          @property (nonatomic, strong) UITextView *logView;
          @property (nonatomic, strong) UIButton *pauseBtn;
          @property (nonatomic, assign) BOOL isPaused;

          + (instancetype)sharedTerminal;
          - (void)printLog:(NSString *)message type:(int)type;
          - (void)toggleVisibility;
          @end

          @implementation SovereignTerminal

          + (instancetype)sharedTerminal {
              static SovereignTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  // تصغير الحجم بنسبة 40% ليكون أنيقاً ولا يزعج اللعب
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 120, 50, 240, 160)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.9];
                  self.layer.cornerRadius = 8;
                  self.layer.borderColor = [UIColor darkGrayColor].CGColor;
                  self.layer.borderWidth = 1.0;
                  self.clipsToBounds = YES;
                  self.isPaused = NO;

                  // شريط القيادة (Header)
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 25)];
                  header.backgroundColor = [UIColor colorWithRed:0.1 green:0.1 blue:0.1 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"SOVEREIGN TERMINAL v101";
                  title.textColor = [UIColor whiteColor];
                  title.font = [UIFont boldSystemFontOfSize:9];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // شاشة السجلات (Logs)
                  self.logView = [[UITextView alloc] initWithFrame:CGRectMake(2, 27, frame.size.width - 4, frame.size.height - 54)];
                  self.logView.backgroundColor = [UIColor clearColor];
                  self.logView.font = [UIFont fontWithName:@"Courier-Bold" size:7.5]; // تصغير الخط ليحتوي بيانات أكثر
                  self.logView.editable = NO;
                  self.logView.selectable = NO;
                  self.logView.showsVerticalScrollIndicator = YES;
                  [self addSubview:self.logView];

                  // الأزرار السفلية
                  UIView *footer = [[UIView alloc] initWithFrame:CGRectMake(0, frame.size.height - 25, frame.size.width, 25)];
                  [self addSubview:footer];

                  UIButton *closeBtn = [self createBtn:@"Hide" x:5 color:[UIColor systemRedColor]];
                  [closeBtn addTarget:self action:@selector(hideTerminal) forControlEvents:UIControlEventTouchUpInside];
                  [footer addSubview:closeBtn];

                  self.pauseBtn = [self createBtn:@"Pause" x:85 color:[UIColor systemBlueColor]];
                  [self.pauseBtn addTarget:self action:@selector(togglePause) forControlEvents:UIControlEventTouchUpInside];
                  [footer addSubview:self.pauseBtn];

                  UIButton *clearBtn = [self createBtn:@"Clear" x:165 color:[UIColor darkGrayColor]];
                  [clearBtn addTarget:self action:@selector(clearLogs) forControlEvents:UIControlEventTouchUpInside];
                  [footer addSubview:clearBtn];

                  // تفعيل السحب (Drag)
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
                  self.userInteractionEnabled = YES;
              }
              return self;
          }

          - (UIButton *)createBtn:(NSString *)title x:(float)x color:(UIColor *)color {
              UIButton *btn = [[UIButton alloc] initWithFrame:CGRectMake(x, 2, 70, 20)];
              [btn setTitle:title forState:UIControlStateNormal];
              [btn setBackgroundColor:color];
              btn.layer.cornerRadius = 4;
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:9];
              return btn;
          }

          - (void)printLog:(NSString *)message type:(int)type {
              if (self.isPaused) return;

              dispatch_async(dispatch_get_main_queue(), ^{
                  NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
                  [fmt setDateFormat:@"HH:mm:ss"];
                  NSString *timestamp = [fmt stringFromDate:[NSDate date]];
                  
                  NSString *icon = @"->";
                  UIColor *textColor = [UIColor whiteColor];
                  
                  if (type == 1) { icon = @"[+]"; textColor = [UIColor greenColor]; }
                  else if (type == 2) { icon = @"[OFFSET]"; textColor = [UIColor yellowColor]; }
                  else if (type == 3) { icon = @"[FILE]"; textColor = [UIColor cyanColor]; }
                  
                  NSString *newLine = [NSString stringWithFormat:@"[%@] %@ %@\n", timestamp, icon, message];
                  
                  NSMutableAttributedString *attrStr = [[NSMutableAttributedString alloc] initWithAttributedString:self.logView.attributedText];
                  NSAttributedString *newAttrStr = [[NSAttributedString alloc] initWithString:newLine attributes:@{NSForegroundColorAttributeName: textColor, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:7.5]}];
                  [attrStr appendAttributedString:newAttrStr];
                  self.logView.attributedText = attrStr;

                  if (self.logView.text.length > 0) {
                      NSRange range = NSMakeRange(self.logView.text.length - 1, 1);
                      [self.logView scrollRangeToVisible:range];
                  }
              });
          }

          - (void)clearLogs { self.logView.text = @""; }
          
          - (void)togglePause {
              self.isPaused = !self.isPaused;
              [self.pauseBtn setTitle:(self.isPaused ? @"Resume" : @"Pause") forState:UIControlStateNormal];
              [self.pauseBtn setBackgroundColor:(self.isPaused ? [UIColor systemGreenColor] : [UIColor systemBlueColor])];
          }
          
          - (void)hideTerminal { self.hidden = YES; }
          
          // الدالة السحرية لإصلاح مشكلة عدم الظهور عند النقر المزدوج
          - (void)toggleVisibility {
              self.hidden = !self.hidden;
              if (!self.hidden) {
                  [self.superview bringSubviewToFront:self]; // إجباره على الظهور فوق اللعبة
              }
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // إصلاح الماكرو المليمتري لضمان طباعة المسارات الحقيقية
          #define SOV_LOG(fmt, ...) [[SovereignTerminal sharedTerminal] printLog:[NSString stringWithFormat:fmt, ##__VA_ARGS__] type:0]
          #define SOV_SUCCESS(fmt, ...) [[SovereignTerminal sharedTerminal] printLog:[NSString stringWithFormat:fmt, ##__VA_ARGS__] type:1]
          #define SOV_OFFSET(fmt, ...) [[SovereignTerminal sharedTerminal] printLog:[NSString stringWithFormat:fmt, ##__VA_ARGS__] type:2]
          #define SOV_TRACE(fmt, ...) [[SovereignTerminal sharedTerminal] printLog:[NSString stringWithFormat:fmt, ##__VA_ARGS__] type:3]

          // =========================================================
          // [🕵️] مستشعر الأوفستات الحية (Real ASLR Bases)
          // =========================================================
          void ScanForBaseOffsets() {
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const char *name = _dyld_get_image_name(i);
                  if (name) {
                      NSString *path = [NSString stringWithUTF8String:name];
                      uintptr_t slide = _dyld_get_image_vmaddr_slide(i);
                      
                      if ([path containsString:@"ShadowTrackerExtra"]) {
                          SOV_OFFSET(@"ShadowBase: 0x%lx", slide);
                      } else if ([path containsString:@"anogs"]) {
                          SOV_OFFSET(@"AnogsBase: 0x%lx", slide);
                      }
                  }
              }
          }

          // =========================================================
          // [🧬] التتبع المباشر للملفات (Real-Time File Tracing)
          // =========================================================
          @interface SovereignFileTracer : NSObject @end
          @implementation SovereignFileTracer

          + (void)load {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  @try {
                      Method orig = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
                      Method swiz = class_getInstanceMethod([self class], @selector(sov_fileExistsAtPath:));
                      method_exchangeImplementations(orig, swiz);
                  } @catch (NSException *e) {}
              });
          }

          // الدالة التي تلتقط مسارات اللعبة أثناء عملها الحقيقي
          - (BOOL)sov_fileExistsAtPath:(NSString *)path {
              if ([path containsString:@"anogs"] || [path containsString:@"ShadowTracker"]) {
                  // نطبع فقط اسم الملف لكي لا نمتلئ الشاشة بمسارات طويلة
                  SOV_TRACE(@"Scan: %@", [path lastPathComponent]);
              }
              return [self sov_fileExistsAtPath:path]; // استدعاء الدالة الأصلية
          }
          @end

          // =========================================================
          // [🚀] صاعق الانطلاق
          // =========================================================
          void __attribute__((constructor)) start_safe_terminal() {
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  
                  UIWindow *win = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                      }
                  }
                  #pragma clang diagnostic push
                  #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  #pragma clang diagnostic pop

                  if (win) {
                      SovereignTerminal *terminal = [SovereignTerminal sharedTerminal];
                      [win addSubview:terminal];
                      
                      // نقر مزدوج بإصبعين (Two Fingers, Two Taps) أسهل بكثير في الميدان
                      UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:terminal action:@selector(toggleVisibility)];
                      tap.numberOfTapsRequired = 2;
                      tap.numberOfTouchesRequired = 2; 
                      [win addGestureRecognizer:tap];
                      
                      SOV_SUCCESS(@"Terminal v101k Activated.");
                      ScanForBaseOffsets(); // عرض الإحداثيات الحقيقية
                  }
              });
          }
          EOF

          # صهر الدايلب بدون الحاجة لـ Substrate
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Safe_Terminal.mm -o Sovereign_Safe_Terminal.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Safe-Terminal-v101
          path: Sovereign_Safe_Terminal.dylib
