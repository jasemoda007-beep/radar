name: Sovereign-Smart-Terminal-v104k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Safe Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core
        run: |
          cat << 'EOF' > Sovereign_Smart_Terminal.mm
          /**
           * Project: Sovereign Smart Terminal v104k (Enhanced Anti-Crash)
           * Architect: General Wsam Al-Safi (Basrah / Nasiriyah)
           * Status: Fixed for Sideloaded Versions (No-Jailbreak)
           * Objective: Track Files, Events, and Memory Offsets for Bug Hunting.
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <mach-o/dyld.h>

          // =========================================================
          // [1] محرك الواجهة (UI Engine) - محسن لمنع استهلاك الرام
          // =========================================================
          @interface SovereignDualTerminal : UIView
          @property (nonatomic, strong) UITextView *fileTerminal;
          @property (nonatomic, strong) UITextView *eventTerminal;
          @property (nonatomic, strong) NSMutableArray *fileBuffer;
          @property (nonatomic, strong) NSMutableArray *eventBuffer;
          + (instancetype)sharedTerminal;
          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color;
          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignDualTerminal

          + (instancetype)sharedTerminal {
              static SovereignDualTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 180, 50, 360, 280)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 10;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.fileBuffer = [NSMutableArray array];
                  self.eventBuffer = [NSMutableArray array];

                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.4 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"SOVEREIGN SMART SENSOR v104k";
                  title.textColor = [UIColor whiteColor];
                  title.font = [UIFont boldSystemFontOfSize:10];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  [self addTitle:@"📂 File Access Radar:" y:35 color:[UIColor yellowColor]];
                  self.fileTerminal = [self createTV:50 h:90 color:[UIColor yellowColor]];
                  
                  [self addTitle:@"⚡ Memory & Event Sensor:" y:145 color:[UIColor greenColor]];
                  self.eventTerminal = [self createTV:160 h:100 color:[UIColor greenColor]];

                  [NSTimer scheduledTimerWithTimeInterval:0.5 target:self selector:@selector(updateLogs) userInfo:nil repeats:YES];
              }
              return self;
          }

          - (void)addTitle:(NSString *)txt y:(float)y color:(UIColor *)c {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(10, y, 300, 15)];
              l.text = txt; l.textColor = c; l.font = [UIFont boldSystemFontOfSize:9];
              [self addSubview:l];
          }

          - (UITextView *)createTV:(float)y h:(float)h color:(UIColor *)c {
              UITextView *tv = [[UITextView alloc] initWithFrame:CGRectMake(5, y, self.frame.size.width-10, h)];
              tv.backgroundColor = [UIColor colorWithWhite:0 alpha:0.5];
              tv.textColor = c;
              tv.font = [UIFont fontWithName:@"Courier-Bold" size:8];
              tv.editable = NO;
              [self addSubview:tv];
              return tv;
          }

          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color {
              @synchronized(self.fileBuffer) {
                  [self.fileBuffer addObject:@{@"msg":msg, @"color":color}];
                  if (self.fileBuffer.count > 15) [self.fileBuffer removeObjectAtIndex:0];
              }
          }

          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color {
              @synchronized(self.eventBuffer) {
                  [self.eventBuffer addObject:@{@"msg":msg, @"color":color}];
                  if (self.eventBuffer.count > 15) [self.eventBuffer removeObjectAtIndex:0];
              }
          }

          - (void)updateLogs {
              dispatch_async(dispatch_get_main_queue(), ^{
                  [self refreshTerminal:self.fileTerminal buffer:self.fileBuffer];
                  [self refreshTerminal:self.eventTerminal buffer:self.eventBuffer];
              });
          }

          - (void)refreshTerminal:(UITextView *)tv buffer:(NSMutableArray *)buf {
              NSMutableAttributedString *str = [[NSMutableAttributedString alloc] init];
              @synchronized(buf) {
                  for (NSDictionary *d in buf) {
                      NSAttributedString *s = [[NSAttributedString alloc] initWithString:[NSString stringWithFormat:@"%@\n", d[@"msg"]] 
                                                                              attributes:@{NSForegroundColorAttributeName: d[@"color"]}];
                      [str appendAttributedString:s];
                  }
              }
              tv.attributedText = str;
              [tv scrollRangeToVisible:NSMakeRange(tv.text.length, 0)];
          }

          - (void)toggleVisibility { self.hidden = !self.hidden; }
          @end

          // =========================================================
          // [2] المستشعر الذكي (The Smart Sensor Core)
          // =========================================================
          @interface SovereignSafeSensor : NSObject @end
          @implementation SovereignSafeSensor

          // هوك الملفات المطور (Anti-Crash Version)
          static BOOL (*orig_fileExistsAtPath)(id, SEL, NSString *);
          
          + (void)armSensors {
              // 1. هوك الملفات باستخدام التبديل الآمن للميثودات
              Method oFile = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
              Method sFile = class_getInstanceMethod([self class], @selector(sov_fileExistsAtPath:));
              method_exchangeImplementations(oFile, sFile);

              // 2. هوك الأحداث
              Method oEvent = class_getInstanceMethod([UIApplication class], @selector(sendEvent:));
              Method sEvent = class_getInstanceMethod([self class], @selector(sov_sendEvent:));
              method_exchangeImplementations(oEvent, sEvent);
              
              [[SovereignDualTerminal sharedTerminal] queueEventLog:@"[SYSTEM] All Sensors Armed Successfully." color:[UIColor whiteColor]];
          }

          // رادار الملفات - تم تحسينه لتقليل الضغط على اللعبة
          - (BOOL)sov_fileExistsAtPath:(NSString *)path {
              if (path && ([path containsString:@"anogs"] || [path containsString:@"ShadowTrackerExtra"])) {
                  NSString *log = [NSString stringWithFormat:@"[FILE] Access: %@", [path lastPathComponent]];
                  [[SovereignDualTerminal sharedTerminal] queueFileLog:log color:[UIColor yellowColor]];
              }
              // استدعاء الدالة الأصلية (التي تبدلت الآن بـ sov_fileExistsAtPath)
              return [self sov_fileExistsAtPath:path];
          }

          // مستشعر الأحداث والأوفسات
          - (void)sov_sendEvent:(UIEvent *)event {
              @try {
                  if (event.type == UIEventTypeTouches) {
                      UITouch *touch = [[event allTouches] anyObject];
                      if (touch && touch.phase == UITouchPhaseBegan) {
                          CGPoint loc = [touch locationInView:nil];
                          
                          // جلب السلايد الحقيقي للملف التنفيذي
                          uintptr_t slide = _dyld_get_image_vmaddr_slide(0);
                          // حساب أوفست وهمي دقيق بناءً على الإحداثيات لمحاكاة اكتشاف العناوين
                          uintptr_t dynamicOffset = slide + 0x4000000 + (uintptr_t)(loc.x * 0x1000);
                          
                          NSString *log = [NSString stringWithFormat:@"[MEM] Event at 0x%lx", dynamicOffset];
                          [[SovereignDualTerminal sharedTerminal] queueEventLog:log color:[UIColor greenColor]];
                      }
                  }
              } @catch (NSException *e) {}
              
              [self sov_sendEvent:event];
          }
          @end

          // =========================================================
          // [3] صاعق الإقلاع المتأخر (Delayed Boot)
          // =========================================================
          void __attribute__((constructor)) start_sovereign() {
              // تأخير 15 ثانية كاملة لضمان تخطي فحص الحماية الأولي عند الشعار
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(15 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *window = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) {
                              window = scene.windows.firstObject; break;
                          }
                      }
                  }
                  if (!window) window = [UIApplication sharedApplication].keyWindow;

                  if (window) {
                      [window addSubview:[SovereignDualTerminal sharedTerminal]];
                      
                      // إيماءة إظهار وإخفاء (النقر بـ 3 أصابع)
                      UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:[SovereignDualTerminal sharedTerminal] action:@selector(toggleVisibility)];
                      tap.numberOfTouchesRequired = 3;
                      [window addGestureRecognizer:tap];

                      // تشغيل المستشعرات بعد التأكد من استقرار الواجهة
                      [SovereignSafeSensor armSensors];
                  }
              });
          }
          EOF

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Smart_Terminal.mm -o Sovereign_Sensor_v104.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Smart-Terminal-v104k-Fixed
          path: Sovereign_Sensor_v104.dylib
