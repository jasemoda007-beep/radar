name: Sovereign-Smart-Terminal-v103k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Smart Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core
        run: |
          cat << 'EOF' > Sovereign_Smart_Terminal.mm
          /**
           * Project: Sovereign Smart Terminal v103k (Zero-Crash Edition)
           * Architect: General Wsam Al-Safi (Basrah / Nasiriyah)
           * Target Device: iPhone XS Max (A12 Bionic)
           * Feature: Triple Sensor (Network, Files, Events), Safe Buffered Logging.
           * Tech: Objective-C Swizzling (100% ESign Safe)
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #import <mach-o/dyld.h>

          // =========================================================
          // [1] محرك الترمنال الثلاثي البصري (Triple-Core UI Engine)
          // =========================================================
          @interface SovereignTripleTerminal : UIView
          @property (nonatomic, strong) UITextView *netTerminal;
          @property (nonatomic, strong) UITextView *fileTerminal;
          @property (nonatomic, strong) UITextView *eventTerminal;
          @property (nonatomic, strong) NSMutableArray *netBuffer;
          @property (nonatomic, strong) NSMutableArray *fileBuffer;
          @property (nonatomic, strong) NSMutableArray *eventBuffer;
          @property (nonatomic, strong) NSTimer *flushTimer;

          + (instancetype)sharedTerminal;
          - (void)queueNetworkLog:(NSString *)msg color:(UIColor *)color;
          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color;
          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignTripleTerminal

          + (instancetype)sharedTerminal {
              static SovereignTripleTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 160, 50, 320, 280)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.9];
                  self.layer.cornerRadius = 12;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.clipsToBounds = YES;
                  
                  // تهيئة المخازن الآمنة لمنع الكراش
                  self.netBuffer = [NSMutableArray array];
                  self.fileBuffer = [NSMutableArray array];
                  self.eventBuffer = [NSMutableArray array];

                  // شريط العنوان
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.2 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"[ SOVEREIGN SMART SENSOR v103k ]";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:10];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // 1. خانة الروابط (أزرق سماوي)
                  [self addTitle:@"🌐 رادار الروابط والاتصالات:" y:35 color:[UIColor cyanColor]];
                  self.netTerminal = [self createTerminal:50 color:[UIColor cyanColor]];
                  [self addSubview:self.netTerminal];

                  // 2. خانة الملفات (أصفر)
                  [self addTitle:@"📂 رادار الملفات (Shadow & Anogs):" y:110 color:[UIColor yellowColor]];
                  self.fileTerminal = [self createTerminal:125 color:[UIColor yellowColor]];
                  [self addSubview:self.fileTerminal];

                  // 3. خانة أحداث الرمي والحركة (أخضر)
                  [self addTitle:@"⚡ مستشعر الأحداث والرمي (Events):" y:185 color:[UIColor greenColor]];
                  self.eventTerminal = [self createTerminal:200 color:[UIColor greenColor]];
                  [self addSubview:self.eventTerminal];

                  // زر الإخفاء السريع
                  UIButton *closeBtn = [[UIButton alloc] initWithFrame:CGRectMake(5, 5, 20, 20)];
                  [closeBtn setTitle:@"X" forState:UIControlStateNormal];
                  [closeBtn setBackgroundColor:[UIColor redColor]];
                  closeBtn.layer.cornerRadius = 10;
                  closeBtn.titleLabel.font = [UIFont boldSystemFontOfSize:10];
                  [closeBtn addTarget:self action:@selector(hideTerminal) forControlEvents:UIControlEventTouchUpInside];
                  [header addSubview:closeBtn];

                  // نظام التفريغ الآمن لمنع اختناق المعالج (Flush Engine)
                  self.flushTimer = [NSTimer scheduledTimerWithTimeInterval:0.5 target:self selector:@selector(flushLogsSafe) userInfo:nil repeats:YES];

                  // إيماءة التحريك
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
                  self.userInteractionEnabled = YES;
              }
              return self;
          }

          - (void)addTitle:(NSString *)txt y:(float)y color:(UIColor *)c {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(10, y, 300, 15)];
              l.text = txt; l.textColor = c; l.font = [UIFont boldSystemFontOfSize:9];
              [self addSubview:l];
          }

          - (UITextView *)createTerminal:(float)y color:(UIColor *)c {
              UITextView *tv = [[UITextView alloc] initWithFrame:CGRectMake(10, y, self.frame.size.width - 20, 50)];
              tv.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.5];
              tv.textColor = c;
              tv.font = [UIFont fontWithName:@"Courier-Bold" size:7.5];
              tv.editable = NO; tv.selectable = YES;
              tv.layer.borderColor = [UIColor darkGrayColor].CGColor;
              tv.layer.borderWidth = 0.5; tv.layer.cornerRadius = 5;
              tv.layoutManager.allowsNonContiguousLayout = NO; // لتسريع الرسم ومنع الكراش
              return tv;
          }

          - (void)hideTerminal { self.hidden = YES; }
          - (void)toggleVisibility {
              self.hidden = !self.hidden;
              if (!self.hidden) [self.superview bringSubviewToFront:self];
          }

          // =========================================================
          // [2] محركات الاستقبال الآمنة (Buffer Queues)
          // =========================================================
          - (void)queueNetworkLog:(NSString *)msg color:(UIColor *)color {
              [self safeQueue:msg color:color buffer:self.netBuffer];
          }
          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color {
              [self safeQueue:msg color:color buffer:self.fileBuffer];
          }
          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color {
              [self safeQueue:msg color:color buffer:self.eventBuffer];
          }

          - (void)safeQueue:(NSString *)msg color:(UIColor *)color buffer:(NSMutableArray *)buffer {
              NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
              [fmt setDateFormat:@"HH:mm:ss.SSS"];
              NSString *time = [fmt stringFromDate:[NSDate date]];
              NSString *fullMsg = [NSString stringWithFormat:@"[%@] %@\n", time, msg];
              
              NSAttributedString *str = [[NSAttributedString alloc] initWithString:fullMsg attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:7.5]}];
              
              @synchronized (buffer) {
                  [buffer addObject:str];
                  if (buffer.count > 30) [buffer removeObjectAtIndex:0]; // حماية الرام من التضخم
              }
          }

          // تفريغ السجلات للشاشة بضربة واحدة كل نصف ثانية (The Shield)
          - (void)flushLogsSafe {
              dispatch_async(dispatch_get_main_queue(), ^{
                  [self flushBuffer:self.netBuffer toTerminal:self.netTerminal];
                  [self flushBuffer:self.fileBuffer toTerminal:self.fileTerminal];
                  [self flushBuffer:self.eventBuffer toTerminal:self.eventTerminal];
              });
          }

          - (void)flushBuffer:(NSMutableArray *)buffer toTerminal:(UITextView *)tv {
              @synchronized (buffer) {
                  if (buffer.count == 0) return;
                  NSMutableAttributedString *cur = [[NSMutableAttributedString alloc] initWithAttributedString:tv.attributedText];
                  for (NSAttributedString *s in buffer) [cur appendAttributedString:s];
                  
                  // مسح السجلات القديمة لتجنب الكراش البصري
                  if (cur.length > 3000) [cur deleteCharactersInRange:NSMakeRange(0, cur.length - 2500)];
                  
                  tv.attributedText = cur;
                  [buffer removeAllObjects];
                  [tv scrollRangeToVisible:NSMakeRange(tv.text.length - 1, 1)];
              }
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [3] المستشعر الذكي العميق (The Smart Sensor Hooks)
          // =========================================================
          @interface SovereignSmartSensor : NSObject @end
          @implementation SovereignSmartSensor

          + (void)armSensors {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  @try {
                      // 1. هوك الروابط (Network)
                      Method oNet = class_getInstanceMethod([NSURLSession class], @selector(dataTaskWithRequest:completionHandler:));
                      Method sNet = class_getInstanceMethod([self class], @selector(sov_dataTaskWithRequest:completionHandler:));
                      method_exchangeImplementations(oNet, sNet);

                      // 2. هوك الملفات والحماية (File System)
                      Method oFile = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
                      Method sFile = class_getInstanceMethod([self class], @selector(sov_fileExistsAtPath:));
                      method_exchangeImplementations(oFile, sFile);

                      // 3. هوك الأحداث والرمي (Touch Events)
                      Method oEvent = class_getInstanceMethod([UIApplication class], @selector(sendEvent:));
                      Method sEvent = class_getInstanceMethod([self class], @selector(sov_sendEvent:));
                      method_exchangeImplementations(oEvent, sEvent);

                  } @catch (NSException *e) {}
              });
          }

          // [رادار الروابط]
          - (id)sov_dataTaskWithRequest:(NSURLRequest *)request completionHandler:(id)completionHandler {
              NSString *url = request.URL.absoluteString;
              if (url) {
                  UIColor *col = [url containsString:@"tencent"] || [url containsString:@"anogs"] ? [UIColor redColor] : [UIColor cyanColor];
                  [[SovereignTripleTerminal sharedTerminal] queueNetworkLog:[NSString stringWithFormat:@"[API] %@", url] color:col];
              }
              return [self sov_dataTaskWithRequest:request completionHandler:completionHandler];
          }

          // [رادار الملفات والشادو]
          - (BOOL)sov_fileExistsAtPath:(NSString *)path {
              if (path) {
                  NSString *fileName = [path lastPathComponent];
                  
                  // تصفية قاسية لمنع الكراش: نلتقط فقط ملفات اللعبة الحساسة
                  if ([path containsString:@"anogs"]) {
                      [[SovereignTripleTerminal sharedTerminal] queueFileLog:[NSString stringWithFormat:@"[GUARD] Checking: %@", fileName] color:[UIColor redColor]];
                  } else if ([path containsString:@"ShadowTrackerExtra"] || [fileName hasSuffix:@".pak"]) {
                      [[SovereignTripleTerminal sharedTerminal] queueFileLog:[NSString stringWithFormat:@"[GAME] Accessed: %@", fileName] color:[UIColor yellowColor]];
                  }
              }
              return [self sov_fileExistsAtPath:path]; 
          }

          // [مستشعر الأحداث والرمي]
          - (void)sov_sendEvent:(UIEvent *)event {
              if (event.type == UIEventTypeTouches) {
                  UITouch *touch = [[event allTouches] anyObject];
                  if (touch.phase == UITouchPhaseBegan) {
                      CGPoint loc = [touch locationInView:touch.view];
                      
                      // استخراج إحداثية الذاكرة التقريبية (ASLR + Touch Location)
                      uintptr_t slide = _dyld_get_image_vmaddr_slide(0); 
                      uintptr_t actionOffset = slide + (uintptr_t)(loc.x * 1024) + 0x1000000; 
                      
                      NSString *action = (loc.y > [UIScreen mainScreen].bounds.size.height / 2) ? @"FIRE/AIM" : @"MOVE/UI";
                      NSString *log = [NSString stringWithFormat:@"[ACT] %@ | Mem: 0x%lx", action, actionOffset];
                      
                      [[SovereignTripleTerminal sharedTerminal] queueEventLog:log color:[UIColor greenColor]];
                  }
              }
              [self sov_sendEvent:event];
          }
          @end

          // =========================================================
          // [🚀] صاعق الإقلاع المتأخر (Safe Boot Protocol)
          // =========================================================
          void __attribute__((constructor)) start_smart_terminal() {
              // لا نتحرك حتى تستقر اللعبة تماماً وتزول عاصفة الإقلاع (منع الكراش)
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification *note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      
                      // تأخير 12 ثانية للتمويه وللسماح للعبة بتحميل الموارد
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(12 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                          
                          UIWindow *win = nil;
                          if (@available(iOS 13.0, *)) {
                              for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                                  if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                              }
                          }
                          #pragma clang diagnostic push
                          #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                          if (!win) win = [UIApplication sharedApplication].keyWindow;
                          #pragma clang diagnostic pop

                          if (win) {
                              SovereignTripleTerminal *terminal = [SovereignTripleTerminal sharedTerminal];
                              [win addSubview:terminal];
                              
                              // النقر بثلاث أصابع لإخفاء/إظهار الترمنال
                              UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:terminal action:@selector(toggleVisibility)];
                              tap.numberOfTouchesRequired = 3; 
                              [win addGestureRecognizer:tap];
                              
                              [[SovereignTripleTerminal sharedTerminal] queueEventLog:@"[SYSTEM] Sensors Active & Stable ✅" color:[UIColor whiteColor]];
                              
                              // زرع المستشعرات الآن فقط، بعد زوال الخطر!
                              [SovereignSmartSensor armSensors];
                          }
                      });
                  });
              }];
          }
          EOF

          # عملية الصهر بأمان بدون Substrate لضمان الاستقرار في ESign
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Smart_Terminal.mm -o Sovereign_Sensor_v103.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Smart-Terminal-v103k
          path: Sovereign_Sensor_v103.dylib
