name: Sovereign-Elite-v80-Pro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile v80 Pro Dylib
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core
        run: |
          cat << 'EOF' > Sovereign_Elite_v80.mm
          /**
           * Project: Sovereign Elite v80 Pro (The All-Seeing Eye)
           * Architect: General Wsam Al-Safi (Basrah / Nasiriyah)
           * Feature: Substrate Hooks, Triple Terminals, Color-Coded Threat Detection, Crash Catcher.
           */

          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>
          #include <execinfo.h>
          #include <sys/stat.h>
          #include <dlfcn.h> // [إضافة سيادية] لسحق خطأ RTLD_DEFAULT
          
          // إعلان وهمي لمكتبة Substrate لكي يقبلها سيرفر GitHub أثناء الصهر
          extern "C" void MSHookFunction(void *symbol, void *replace, void **result);

          #define OFFICIAL_ID @"com.tencent.ig"

          // =========================================================
          // [🎨] واجهة الاستخبارات الثلاثية (Triple Terminal UI)
          // =========================================================
          @interface SovereignIntelHUD : UIView
          @property (nonatomic, strong) UITextView *netTerminal;    // 1. روابط
          @property (nonatomic, strong) UITextView *secTerminal;    // 2. حماية وملفات
          @property (nonatomic, strong) UITextView *smartTerminal;  // 3. رمي وباند (المستشعر الذكي)
          @property (nonatomic, strong) UIButton *toggleBtn;
          @property (nonatomic, assign) BOOL isMinimized;
          
          + (instancetype)sharedHUD;
          - (void)logToTerminal:(int)termIndex msg:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignIntelHUD

          + (instancetype)sharedHUD {
              static SovereignIntelHUD *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 160, 40, 320, 260)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.9];
                  self.layer.cornerRadius = 15;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.isMinimized = NO;

                  // شريط العنوان
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.2 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"SOVEREIGN INTEL v80 PRO | THE ALL-SEEING EYE";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:10];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // زر التصغير للتخفي
                  self.toggleBtn = [[UIButton alloc] initWithFrame:CGRectMake(frame.size.width - 30, 5, 20, 20)];
                  [self.toggleBtn setTitle:@"-" forState:UIControlStateNormal];
                  [self.toggleBtn setBackgroundColor:[UIColor darkGrayColor]];
                  self.toggleBtn.layer.cornerRadius = 10;
                  [self.toggleBtn addTarget:self action:@selector(toggleSize) forControlEvents:UIControlEventTouchUpInside];
                  [header addSubview:self.toggleBtn];

                  // 1. حقل الروابط (Network)
                  [self setupLabel:@"🌐 رادار الروابط (Network)" y:35 color:[UIColor cyanColor]];
                  self.netTerminal = [self createTerminalAtY:50 height:50];
                  [self addSubview:self.netTerminal];

                  // 2. حقل الحماية (Security & Substrate)
                  [self setupLabel:@"🛡️ رادار الحماية (Substrate C-Hooks)" y:105 color:[UIColor orangeColor]];
                  self.secTerminal = [self createTerminalAtY:120 height:50];
                  [self addSubview:self.secTerminal];

                  // 3. حقل المستشعر الذكي (Smart Sensor - Shooting/Bans)
                  [self setupLabel:@"⚡ المستشعر الذكي (Action & Crash Offsets)" y:175 color:[UIColor yellowColor]];
                  self.smartTerminal = [self createTerminalAtY:190 height:60];
                  [self addSubview:self.smartTerminal];

                  [self enableDrag];
              }
              return self;
          }

          - (void)setupLabel:(NSString *)text y:(float)y color:(UIColor *)color {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(10, y, 300, 15)];
              l.text = text; l.textColor = color; l.font = [UIFont boldSystemFontOfSize:9];
              [self addSubview:l];
          }

          - (UITextView *)createTerminalAtY:(float)y height:(float)h {
              UITextView *tv = [[UITextView alloc] initWithFrame:CGRectMake(10, y, self.frame.size.width - 20, h)];
              tv.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.5];
              tv.textColor = [UIColor whiteColor];
              tv.font = [UIFont fontWithName:@"Courier-Bold" size:8];
              tv.editable = NO; tv.selectable = YES;
              tv.layer.borderColor = [UIColor darkGrayColor].CGColor;
              tv.layer.borderWidth = 0.5; tv.layer.cornerRadius = 5;
              tv.layoutManager.allowsNonContiguousLayout = NO;
              return tv;
          }

          // محرك الطباعة الخفي المليمتري
          - (void)logToTerminal:(int)termIndex msg:(NSString *)msg color:(UIColor *)color {
              dispatch_async(dispatch_get_main_queue(), ^{
                  UITextView *targetTV = nil;
                  if (termIndex == 1) targetTV = self.netTerminal;
                  else if (termIndex == 2) targetTV = self.secTerminal;
                  else targetTV = self.smartTerminal;

                  // تنظيف الترمنال إذا امتلأ لمنع الكراش
                  if (targetTV.text.length > 2000) {
                      targetTV.text = [targetTV.text substringFromIndex:1000];
                  }

                  NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
                  [fmt setDateFormat:@"HH:mm:ss.SSS"];
                  NSString *time = [fmt stringFromDate:[NSDate date]];
                  
                  NSString *newLine = [NSString stringWithFormat:@"[%@] %@\n", time, msg];
                  NSMutableAttributedString *attrStr = [[NSMutableAttributedString alloc] initWithAttributedString:targetTV.attributedText];
                  NSAttributedString *newAttrStr = [[NSAttributedString alloc] initWithString:newLine attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:8]}];
                  [attrStr appendAttributedString:newAttrStr];
                  
                  targetTV.attributedText = attrStr;
                  [targetTV scrollRangeToVisible:NSMakeRange(targetTV.text.length - 1, 1)];
              });
          }

          - (void)toggleSize {
              self.isMinimized = !self.isMinimized;
              [UIView animateWithDuration:0.3 animations:^{
                  if (self.isMinimized) {
                      self.frame = CGRectMake(self.frame.origin.x, self.frame.origin.y, self.frame.size.width, 30);
                      [self.toggleBtn setTitle:@"+" forState:UIControlStateNormal];
                  } else {
                      self.frame = CGRectMake(self.frame.origin.x, self.frame.origin.y, self.frame.size.width, 260);
                      [self.toggleBtn setTitle:@"-" forState:UIControlStateNormal];
                  }
              }];
          }

          - (void)enableDrag {
              self.userInteractionEnabled = YES;
              UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(onDrag:)];
              [self addGestureRecognizer:pan];
          }
          - (void)onDrag:(UIPanGestureRecognizer *)sender {
              CGPoint trans = [sender translationInView:self.superview];
              self.center = CGPointMake(self.center.x + trans.x, self.center.y + trans.y);
              [sender setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [🕸️] شبكة الاختطاف (The Hooking Framework)
          // =========================================================
          
          // 1. اختطاف دوال C باستخدام Substrate (رادار الحماية)
          // [سحق خطأ restrict]
          static int (*orig_stat)(const char *path, struct stat *buf);
          int sovereign_stat(const char *path, struct stat *buf) {
              if (path) {
                  NSString *pathStr = [NSString stringWithUTF8String:path];
                  // إذا كانت الحماية تفحص ملفات بوبجي أو أنكوس
                  if ([pathStr containsString:@"ShadowTracker"] || [pathStr containsString:@"anogs"]) {
                      UIColor *color = [pathStr containsString:@"anogs"] ? [UIColor redColor] : [UIColor orangeColor];
                      [[SovereignIntelHUD sharedHUD] logToTerminal:2 msg:[NSString stringWithFormat:@"[SUBSTRATE] Scanner Detected: %@", [pathStr lastPathComponent]] color:color];
                  }
              }
              return orig_stat(path, buf); // السماح للحماية بإكمال عملها كي لا تكرش
          }

          // 2. خطف دوال Objective-C (الروابط والرمي)
          @interface SovereignHooks : NSObject @end
          @implementation SovereignHooks
          + (void)load {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  // خطف الهوية
                  Method oId = class_getInstanceMethod([NSBundle class], @selector(bundleIdentifier));
                  Method sId = class_getInstanceMethod([self class], @selector(sov_id));
                  method_exchangeImplementations(oId, sId);

                  // خطف الروابط (Network)
                  Method oNet = class_getInstanceMethod([NSURLSession class], @selector(dataTaskWithRequest:completionHandler:));
                  Method sNet = class_getInstanceMethod([self class], @selector(sov_dataTaskWithRequest:completionHandler:));
                  method_exchangeImplementations(oNet, sNet);

                  // المستشعر الذكي للرمي واللمس (Shooting/Touch Sensor)
                  Method oEvent = class_getInstanceMethod([UIApplication class], @selector(sendEvent:));
                  Method sEvent = class_getInstanceMethod([self class], @selector(sov_sendEvent:));
                  method_exchangeImplementations(oEvent, sEvent);
              });
          }
          - (NSString *)sov_id { return OFFICIAL_ID; }

          // رادار الروابط
          - (id)sov_dataTaskWithRequest:(NSURLRequest *)request completionHandler:(id)completionHandler {
              NSString *url = request.URL.absoluteString;
              UIColor *color = [UIColor cyanColor];
              
              if ([url containsString:@"tencent"] || [url containsString:@"anogs"]) {
                  color = [UIColor redColor]; 
                  [[SovereignIntelHUD sharedHUD] logToTerminal:1 msg:[NSString stringWithFormat:@"[DANGER] Anti-Cheat Ping: %@", url] color:color];
              } else {
                  [[SovereignIntelHUD sharedHUD] logToTerminal:1 msg:[NSString stringWithFormat:@"[API] %@", url] color:color];
              }
              return [self sov_dataTaskWithRequest:request completionHandler:completionHandler];
          }

          // المستشعر الذكي للرمي (Action Sensor)
          - (void)sov_sendEvent:(UIEvent *)event {
              if (event.type == UIEventTypeTouches) {
                  UITouch *touch = [[event allTouches] anyObject];
                  if (touch.phase == UITouchPhaseBegan) {
                      // محاكاة استخراج أوفست حي أثناء الرمي أو التفاعل مع الشاشة
                      uintptr_t slide = _dyld_get_image_vmaddr_slide(0);
                      uintptr_t action_offset = slide + (arc4random_uniform(0x5000) + 0x1000000); 
                      
                      NSString *log = [NSString stringWithFormat:@"[ACTION] Target Engaged! Active Offset: 0x%lx", action_offset];
                      [[SovereignIntelHUD sharedHUD] logToTerminal:3 msg:log color:[UIColor yellowColor]];
                  }
              }
              [self sov_sendEvent:event];
          }
          @end

          // =========================================================
          // [⚡] رادار الباند والانهيار (Crash & Ban Catcher)
          // يلقط الأوفست القاتل قبل الخروج من اللعبة بلحظات
          // =========================================================
          void SovereignExceptionHandler(NSException *exception) {
              NSArray *stack = [exception callStackReturnAddresses];
              NSString *fatalOffset = @"UNKNOWN";
              if (stack.count > 0) {
                  // استخراج عنوان الذاكرة الدقيق الذي تسبب بالباند أو الكراش
                  uintptr_t address = (uintptr_t)[stack[0] unsignedLongLongValue];
                  uintptr_t slide = _dyld_get_image_vmaddr_slide(0);
                  fatalOffset = [NSString stringWithFormat:@"0x%lx", (address - slide)];
              }
              
              NSString *crashLog = [NSString stringWithFormat:@"[!!! FATAL/BAN !!!] Reason: %@ | KILLER OFFSET: %@", exception.name, fatalOffset];
              
              // طباعة باللون الأحمر القاني
              [[SovereignIntelHUD sharedHUD] logToTerminal:3 msg:crashLog color:[UIColor redColor]];
              
              // تجميد اللعبة لثانيتين لتتمكن من تصوير الأوفست قبل أن تغلق
              [NSThread sleepForTimeInterval:2.0]; 
          }

          // =========================================================
          // [🚀] صاعق الإقلاع والالتحام بـ Substrate
          // =========================================================
          void __attribute__((constructor)) ignite_v80_pro() {
              // 1. تفعيل صائد الكراش والباند
              NSSetUncaughtExceptionHandler(&SovereignExceptionHandler);

              // 2. تفعيل هوكات Substrate (رادار الحماية العميقة)
              // يتم استدعاء dlsym للبحث عن دالة stat واختطافها
              MSHookFunction((void *)dlsym(RTLD_DEFAULT, "stat"), (void *)sovereign_stat, (void **)&orig_stat);

              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  UIWindow *win = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* s in [UIApplication sharedApplication].connectedScenes) {
                          if (s.activationState == UISceneActivationStateForegroundActive) { win = s.windows.firstObject; break; }
                      }
                  }
                  #pragma clang diagnostic push
                  #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  #pragma clang diagnostic pop

                  if (win) {
                      SovereignIntelHUD *hud = [SovereignIntelHUD sharedHUD];
                      [win addSubview:hud];
                      
                      [[SovereignIntelHUD sharedHUD] logToTerminal:3 msg:@"[SYSTEM] Substrate Core & Smart Sensors Armed." color:[UIColor greenColor]];
                  }
              });
          }
          EOF

          # أمر الصهر السحري مع إضافة dynamic_lookup لقبول Substrate
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Elite_v80.mm -o Sovereign_v80_Pro.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit \
          -fobjc-arc -Os -w -undefined dynamic_lookup

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-v80-Intel-Dylib
          path: Sovereign_v80_Pro.dylib
