#import <UIKit/UIKit.h>
#import <mach-o/dyld.h>
#import <Foundation/Foundation.h>

// [🎯] إحداثيات العقل المدبر (ضع رابط ملف api.php الخاص بك هنا)
#define BRAIN_API_URL @"http://16.171.230.58/api.php"
#define SECRET_KEY @"WSAM_COMMAND_2026"

@interface SovereignTerminalUI : UIView
@property (nonatomic, strong) UITextView *logView;
+ (instancetype)shared;
- (void)logMessage:(NSString *)msg color:(UIColor *)color;
- (void)sendIntelToBrain:(NSString *)moduleName baseAddress:(uintptr_t)base type:(NSString*)type;
@end

@implementation SovereignTerminalUI
+ (instancetype)shared {
    static SovereignTerminalUI *shared = nil;
    static dispatch_once_t onceToken;
    dispatch_once(&onceToken, ^{
        CGFloat sw = [UIScreen mainScreen].bounds.size.width;
        shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 160, 50, 320, 200)];
    });
    return shared;
}

- (instancetype)initWithFrame:(CGRect)frame {
    self = [super initWithFrame:frame];
    if (self) {
        self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.9];
        self.layer.cornerRadius = 10;
        self.layer.borderColor = [UIColor cyanColor].CGColor;
        self.layer.borderWidth = 1.5;

        UILabel *title = [[UILabel alloc] initWithFrame:CGRectMake(0, 5, frame.size.width, 20)];
        title.text = @"[ SOVEREIGN LIVE TRACER ]";
        title.textColor = [UIColor cyanColor];
        title.textAlignment = NSTextAlignmentCenter;
        title.font = [UIFont boldSystemFontOfSize:11];
        [self addSubview:title];

        self.logView = [[UITextView alloc] initWithFrame:CGRectMake(5, 30, frame.size.width - 10, frame.size.height - 35)];
        self.logView.backgroundColor = [UIColor clearColor];
        self.logView.editable = NO;
        self.logView.selectable = NO;
        [self addSubview:self.logView];

        // تفعيل التحريك
        UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
        [self addGestureRecognizer:pan];
        self.userInteractionEnabled = YES;
    }
    return self;
}

- (void)handlePan:(UIPanGestureRecognizer *)p {
    CGPoint t = [p translationInView:self.superview];
    self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
    [p setTranslation:CGPointZero inView:self.superview];
}

- (void)logMessage:(NSString *)msg color:(UIColor *)color {
    dispatch_async(dispatch_get_main_queue(), ^{
        NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
        [fmt setDateFormat:@"HH:mm:ss"];
        NSString *time = [fmt stringFromDate:[NSDate date]];
        
        NSString *line = [NSString stringWithFormat:@"[%@] %@\n", time, msg];
        NSAttributedString *attr = [[NSAttributedString alloc] initWithString:line attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:9]}];
        
        NSMutableAttributedString *current = [[NSMutableAttributedString alloc] initWithAttributedString:self.logView.attributedText];
        [current appendAttributedString:attr];
        self.logView.attributedText = current;
        
        NSRange range = NSMakeRange(self.logView.text.length - 1, 1);
        [self.logView scrollRangeToVisible:range];
    });
}

// دالة إرسال تقرير التشريح للعقل المدبر (api.php)
- (void)sendIntelToBrain:(NSString *)moduleName baseAddress:(uintptr_t)base type:(NSString*)type {
    NSDictionary *payload = @{
        @"event_type": type,
        @"module": moduleName,
        @"base_address": [NSString stringWithFormat:@"0x%lx", base],
        @"device": @"General_Wsam_iOS"
    };

    NSData *jsonData = [NSJSONSerialization dataWithJSONObject:payload options:0 error:nil];
    NSMutableURLRequest *request = [NSMutableURLRequest requestWithURL:[NSURL URLWithString:BRAIN_API_URL]];
    [request setHTTPMethod:@"POST"];
    [request setValue:@"application/json" forHTTPHeaderField:@"Content-Type"];
    [request setValue:SECRET_KEY forHTTPHeaderField:@"X-Sovereign-Key"];
    [request setHTTPBody:jsonData];

    [[[NSURLSession sharedSession] dataTaskWithRequest:request] resume];
}
@end

// =========================================================
// [🛡️] رادار كشف الحماية والملفات التي تنزل حياً
// =========================================================
void on_image_loaded(const struct mach_header* mh, intptr_t vmaddr_slide) {
    const char *image_name = _dyld_get_image_name_by_header(mh);
    if (!image_name) return;

    NSString *fullPath = [NSString stringWithUTF8String:image_name];
    NSString *shortName = [fullPath lastPathComponent];

    // فلترة الملفات الحساسة (Anti-Cheats & Game Engine)
    if ([shortName containsString:@"anogs"] || [shortName containsString:@"Tersafe"] || [shortName containsString:@"ShadowTracker"]) {
        NSString *msg = [NSString stringWithFormat:@"Detected: %@ at 0x%lx", shortName, (uintptr_t)mh];
        [[SovereignTerminalUI shared] logMessage:msg color:[UIColor redColor]];
        
        // إرسال الإحداثيات لـ IDA Pro عبر العقل المدبر
        [[SovereignTerminalUI shared] sendIntelToBrain:shortName baseAddress:(uintptr_t)mh type:@"ANTI_CHEAT_LOADED"];
    } else {
        // طباعة الملفات العادية باللون الأخضر داخل الهاتف فقط
        NSString *msg = [NSString stringWithFormat:@"Loaded: %@", shortName];
        [[SovereignTerminalUI shared] logMessage:msg color:[UIColor greenColor]];
    }
}

void __attribute__((constructor)) start_real_tracer() {
    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(5 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
        UIWindow *win = [UIApplication sharedApplication].keyWindow;
        if (win) {
            [win addSubview:[SovereignTerminalUI shared]];
            [[SovereignTerminalUI shared] logMessage:@"Sovereign Brain Link Active..." color:[UIColor yellowColor]];
            
            // تسجيل الرادار ليعمل تلقائياً عند نزول أي ملف في الذاكرة
            _dyld_register_func_for_add_image(on_image_loaded);
        }
    });
}
