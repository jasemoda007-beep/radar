name: Sovereign-Stealth-Terminal-V109k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Stealth Terminal Pro
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core V109k
        run: |
          cat << 'EOF' > Sovereign_Stealth_Terminal.m
          /**
           * Project: Sovereign Stealth Terminal V109k PRO
           * Architect: General Wsam Al-Safi
           * Features: Copyable Text, Module ID, Anti-Cheat Detection, GWorld, Recoil, ZERO-Crash.
           * Fix: Using officially declared vm_read_overwrite to pass Xcode 16.4 build.
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>
          #import <mach/mach.h>
          #import <mach/vm_map.h> // تم إضافة هذه المكتبة لحل مشكلة الترمنال

          // =========================================================
          // [1] محرك القراءة الآمن وتحديد الملفات (Safe Engine & Module ID)
          // =========================================================
          
          // دالة قراءة الذاكرة بدون كراش (النسخة المعتمدة من آبل)
          BOOL safeReadMemory(uintptr_t address, void *buffer, size_t size) {
              vm_size_t outSize = 0;
              kern_return_t kr = vm_read_overwrite(mach_task_self(), 
                                                   (vm_address_t)address, 
                                                   (vm_size_t)size, 
                                                   (vm_address_t)buffer, 
                                                   &outSize);
              return (kr == KERN_SUCCESS);
          }

          // دالة لمعرفة هذا الأوفست تابع لأي ملف (مثال: UnityFramework)
          NSString* getModuleForAddress(uintptr_t address) {
              uint32_t count = _dyld_image_count();
              for (uint32_t i = 0; i < count; i++) {
                  const struct mach_header *header = _dyld_get_image_header(i);
                  uintptr_t base = (uintptr_t)header;
                  // نفترض أن حجم الملف التقريبي 100MB للبحث السريع
                  if (address >= base && address < (base + 0x05F5E100)) { 
                      const char *path = _dyld_get_image_name(i);
                      NSString *fullPath = [NSString stringWithUTF8String:path];
                      return [fullPath lastPathComponent]; // يرجع اسم الملف فقط
                  }
              }
              return @"Unknown_Module";
          }

          // =========================================================
          // [2] المستشعر الفائق (High-Sensitivity Sensor)
          // =========================================================
          @interface SovereignGlassSensor : UIView
          @property (nonatomic, strong) NSString *lastTouchData;
          @end

          @implementation SovereignGlassSensor
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              if (event.type == UIEventTypeTouches) {
                  self.lastTouchData = [NSString stringWithFormat:@"[SENSOR] Touch X:%.1f Y:%.1f", point.x, point.y];
              }
              return nil; // تمرير اللمسة للعبة لكي لا نعيق اللعب
          }
          @end

          // =========================================================
          // [3] شاشة الترمنال الاحترافية (Pro Terminal UI)
          // =========================================================
          @interface SovereignStealthTerminal : UIView
          @property (nonatomic, strong) UITextView *logTerminal;
          @property (nonatomic, strong) SovereignGlassSensor *glassSensor;
          @property (nonatomic, strong) NSTimer *scannerTimer;
          @property (nonatomic, strong) NSMutableArray *logBuffer;
          
          + (instancetype)sharedTerminal;
          - (void)addLog:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignStealthTerminal

          + (instancetype)sharedTerminal {
              static SovereignStealthTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 180, 40, 360, 260)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // 7. واجهة نيون شفافة واحترافية
                  UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
                  UIVisualEffectView *blurView = [[UIVisualEffectView alloc] initWithEffect:blur];
                  blurView.frame = self.bounds;
                  blurView.alpha = 0.9;
                  [self addSubview:blurView];

                  self.layer.cornerRadius = 12;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.clipsToBounds = YES;
                  
                  self.logBuffer = [NSMutableArray array];

                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithWhite:0.1 alpha:0.8];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"☢️ SOVEREIGN V109k PRO ☢️";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:12];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  UIButton *clearBtn = [[UIButton alloc] initWithFrame:CGRectMake(5, 5, 40, 20)];
                  [clearBtn setTitle:@"CLR" forState:UIControlStateNormal];
                  clearBtn.titleLabel.font = [UIFont systemFontOfSize:10];
                  [clearBtn setTitleColor:[UIColor yellowColor] forState:UIControlStateNormal];
                  [clearBtn addTarget:self action:@selector(clearLogs) forControlEvents:UIControlEventTouchUpInside];
                  [header addSubview:clearBtn];

                  // 1. الترمنال يقبل النسخ والتحديد
                  self.logTerminal = [[UITextView alloc] initWithFrame:CGRectMake(5, 35, frame.size.width - 10, frame.size.height - 40)];
                  self.logTerminal.backgroundColor = [UIColor clearColor];
                  self.logTerminal.editable = NO;
                  self.logTerminal.selectable = YES; // تفعيل خاصية النسخ
                  self.logTerminal.indicatorStyle = UIScrollViewIndicatorStyleWhite;
                  [self addSubview:self.logTerminal];

                  // 8. مؤقت كل 5 ثواني لمنع الكراش
                  self.scannerTimer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self selector:@selector(runMasterScanner) userInfo:nil repeats:YES];

                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
              }
              return self;
          }

          - (void)clearLogs {
              @synchronized (self.logBuffer) { [self.logBuffer removeAllObjects]; }
              self.logTerminal.attributedText = [[NSAttributedString alloc] initWithString:@""];
          }

          - (void)addLog:(NSString *)msg color:(UIColor *)color {
              NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
              [fmt setDateFormat:@"HH:mm:ss"];
              NSString *fullMsg = [NSString stringWithFormat:@"[%@] %@\n", [fmt stringFromDate:[NSDate date]], msg];
              
              NSAttributedString *str = [[NSAttributedString alloc] initWithString:fullMsg attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Menlo-Bold" size:10]}];
              
              @synchronized (self.logBuffer) {
                  [self.logBuffer addObject:str];
                  // حفظ آخر 60 سطر لكي تتمكن من نسخها براحتك دون أن تختفي بسرعة
                  if (self.logBuffer.count > 60) [self.logBuffer removeObjectAtIndex:0];
              }
              
              dispatch_async(dispatch_get_main_queue(), ^{
                  NSMutableAttributedString *cur = [[NSMutableAttributedString alloc] init];
                  for (NSAttributedString *s in self.logBuffer) { [cur appendAttributedString:s]; }
                  self.logTerminal.attributedText = cur;
                  [self.logTerminal scrollRangeToVisible:NSMakeRange(self.logTerminal.text.length - 1, 1)];
              });
          }

          // =========================================================
          // [4] الرادار المتقدم (GWorld & Weapon Scanner)
          // =========================================================
          - (void)runMasterScanner {
              uintptr_t baseAddress = (uintptr_t)_dyld_get_image_header(0);
              NSString *mainModule = getModuleForAddress(baseAddress);
              
              // عرض معلومات اللمس والمستشعر
              if (self.glassSensor && self.glassSensor.lastTouchData) {
                  [self addLog:self.glassSensor.lastTouchData color:[UIColor purpleColor]];
                  self.glassSensor.lastTouchData = nil;
              }

              // 4. قراءة إحداثيات اللاعب (GWorld مثال)
              uintptr_t gWorldOffset = baseAddress + 0x4A00000; 
              uintptr_t playerCoordsOffset = gWorldOffset + 0x120;
              float coords[3] = {0}; 
              
              // 2 + 3. تحديد الملف وتحديد الحماية باللون الأحمر
              if (safeReadMemory(playerCoordsOffset, &coords, sizeof(coords))) {
                  NSString *gWorldLog = [NSString stringWithFormat:@"[GWorld] %@ | X:%.1f Y:%.1f Z:%.1f", mainModule, coords[0], coords[1], coords[2]];
                  [self addLog:gWorldLog color:[UIColor greenColor]];
              } else {
                  NSString *gWorldWarn = [NSString stringWithFormat:@"[PROTECTED 🔴] GWorld Hook Blocked!"];
                  [self addLog:gWorldWarn color:[UIColor redColor]];
              }

              // 5. فحص بيانات السلاح (الثبات والإيمبوت وإعادة التذخير)
              uintptr_t weaponBase = baseAddress + 0x5B00000; 
              uintptr_t recoilOffset = weaponBase + 0x40; // الثبات
              uintptr_t ammoOffset = weaponBase + 0x80;   // الشاجور
              
              float recoilValue = 0;
              int ammoCount = 0;
              
              BOOL recoilSafe = safeReadMemory(recoilOffset, &recoilValue, sizeof(recoilValue));
              BOOL ammoSafe = safeReadMemory(ammoOffset, &ammoCount, sizeof(ammoCount));
              
              if (recoilSafe && ammoSafe) {
                  NSString *weaponLog = [NSString stringWithFormat:@"[WEAPON] %@ | Recoil: %.2f | Ammo: %d", mainModule, recoilValue, ammoCount];
                  [self addLog:weaponLog color:[UIColor cyanColor]];
              } else {
                  NSString *weaponWarn = [NSString stringWithFormat:@"[PROTECTED 🔴] Weapon Read Failed!"];
                  [self addLog:weaponWarn color:[UIColor redColor]];
              }
              
              [self addLog:@"---------------------------------" color:[UIColor darkGrayColor]];
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          - (void)toggleVisibility {
              self.hidden = !self.hidden;
              if (!self.hidden) [self.superview bringSubviewToFront:self];
          }
          @end

          // =========================================================
          // [5] الإقلاع (Boot)
          // =========================================================
          void __attribute__((constructor)) start_stealth_protocol() {
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification *note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                          UIWindow *win = [UIApplication sharedApplication].keyWindow;
                          if (win) {
                              SovereignGlassSensor *sensor = [[SovereignGlassSensor alloc] initWithFrame:win.bounds];
                              sensor.backgroundColor = [UIColor clearColor];
                              sensor.userInteractionEnabled = YES;
                              [win addSubview:sensor];
                              
                              SovereignStealthTerminal *terminal = [SovereignStealthTerminal sharedTerminal];
                              terminal.glassSensor = sensor;
                              [win addSubview:terminal];
                              
                              UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:terminal action:@selector(toggleVisibility)];
                              tap.numberOfTouchesRequired = 3; 
                              [win addGestureRecognizer:tap];
                          }
                      });
                  });
              }];
          }
          EOF

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Stealth_Terminal.m -o Sovereign_Stealth_V109.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Stealth-Terminal-V109k-PRO
          path: Sovereign_Stealth_V109.dylib
