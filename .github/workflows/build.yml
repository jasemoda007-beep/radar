name: Sovereign-Dolphin-Forge-v20

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # يمكن تشغيله يدويًا من GitHub

jobs:
  build:
    name: Compiling Sovereign Elite X v20
    runs-on: macos-latest  # يعمل على بيئة macOS

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # سحب الكود من مستودع GitHub

      - name: Generate and Compile Sovereign Core
        run: |
          echo "🔥 Starting Sovereign Dolphin Forge v20.0 (Version 4.2.0)..."
          
          # إعداد بيئة البناء باستخدام CMake أو Makefile حسب الحاجة
          echo "🔧 Building with CMake..."
          cmake .
          make

      - name: Run the Game Monitor executable
        run: |
          ./file_monitor  # يشغل السكربت الذي تم بناؤه بعد CMake أو Makefile

      - name: Clean up build files
        run: |
          make clean  # تنظيف الملفات المترجمة بعد الانتهاء من البناء (اختياري)
          
---

#include <iostream>
#include <fstream>
#include <string>
#include <unistd.h>
#include <dirent.h>
#include <sys/types.h>
#include <sys/stat.h>

using namespace std;

// دالة لعرض الرسائل مع تمييز الألوان
void printWithColor(const string& msg, const string& color) {
    if (color == "blue") {
        cout << "\033[34m" << msg << "\033[0m" << endl;
    } else if (color == "green") {
        cout << "\033[32m" << msg << "\033[0m" << endl;
    } else if (color == "red") {
        cout << "\033[31m" << msg << "\033[0m" << endl;
    } else if (color == "yellow") {
        cout << "\033[33m" << msg << "\033[0m" << endl;
    } else {
        cout << msg << endl;
    }
}

// دالة للبحث في المسار ومراقبة الملفات
void monitorFilePath(const string& searchDir, const string& targetFile) {
    DIR* dir;
    struct dirent* entry;

    // فتح الدليل (المسار)
    if ((dir = opendir(searchDir.c_str())) != NULL) {
        // مسح جميع الملفات والمجلدات في الدليل
        while ((entry = readdir(dir)) != NULL) {
            // تخطي . و ..
            if (string(entry->d_name) == "." || string(entry->d_name) == "..") {
                continue;
            }

            string filePath = searchDir + "/" + entry->d_name;
            struct stat statBuf;

            // التحقق من نوع الملف (إذا كان ملفًا عاديًا أو مجلدًا)
            if (stat(filePath.c_str(), &statBuf) == 0) {
                if (S_ISREG(statBuf.st_mode)) {
                    // إذا كان الملف عاديًا، قم بمراقبته
                    if (filePath.find(targetFile) != string::npos) {
                        printWithColor("تم العثور على الملف: " + filePath, "green");
                        
                        // هنا يمكنك إضافة الكود لقراءة الملف أو تنفيذ عمليات أخرى
                        ifstream file(filePath);
                        if (file.is_open()) {
                            string line;
                            while (getline(file, line)) {
                                printWithColor("البيانات في الملف: " + line, "yellow");
                            }
                            file.close();
                        }
                    }
                } else if (S_ISDIR(statBuf.st_mode)) {
                    // إذا كان المجلد، قم بالبحث فيه
                    monitorFilePath(filePath, targetFile);  // استدعاء دالة البحث بشكل متكرر للمجلدات
                }
            }
        }
        closedir(dir);
    } else {
        // في حالة فشل فتح الدليل
        printWithColor("فشل في فتح المسار: " + searchDir, "red");
    }
}

int main() {
    // تحديد المسار الذي تريد البحث فيه (يمكنك تخصيص المسار الخاص بك هنا)
    string searchDir = "/var/mobile/Containers/Data/Application";  // المسار الذي يحتوي على التطبيقات في جهاز iOS

    // اسم الملف الذي نبحث عنه
    string targetFile = "ShadowTrackerExtra";

    // البدء بمراقبة المسار
    printWithColor("ابدأ البحث عن الملف: " + targetFile, "blue");
    monitorFilePath(searchDir, targetFile);  // بدء البحث في المجلد

    return 0;
}
