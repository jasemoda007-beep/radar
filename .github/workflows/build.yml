name: Sovereign-Stealth-Terminal-v106k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Stealth Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core
        run: |
          cat << 'EOF' > Sovereign_Stealth_Terminal.m
          /**
           * Project: Sovereign Stealth Terminal v106k (Absolute Zero-Crash)
           * Architect: General Wsam Al-Safi
           * Technology: 5-Second Polling & Native HitTest (NO HOOKING)
           * Feature: Single Log Window, In-Game Events Only.
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>

          // =========================================================
          // [1] المستشعر الزجاجي الشفاف (Passive Touch Sensor)
          // لا يوجد أي تدخل في ملفات النظام (No Swizzling) = صفر كراش
          // =========================================================
          @interface SovereignGlassSensor : UIView
          @property (nonatomic, strong) NSString *lastActionData;
          @end

          @implementation SovereignGlassSensor
          // هذه الدالة تلتقط اللمسة، تسجلها في الذاكرة، ثم تختفي لتدع اللعبة تعمل
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              if (event.type == UIEventTypeTouches) {
                  // حساب إحداثيات الرمي/الحركة
                  BOOL isFiring = (point.y > [UIScreen mainScreen].bounds.size.height * 0.4);
                  NSString *actionType = isFiring ? @"[FIRE]" : @"[MOVE]";
                  
                  // حساب أوفست الذاكرة الوهمي/التقريبي للحدث
                  uintptr_t slide = _dyld_get_image_vmaddr_slide(0);
                  uintptr_t offset = slide + (uintptr_t)(point.x * point.y);
                  
                  self.lastActionData = [NSString stringWithFormat:@"%@ X:%.0f Y:%.0f | Mem: 0x%lx", actionType, point.x, point.y, offset];
              }
              return nil; // نعيد nil لكي تعبر اللمسة إلى اللعبة بدون أي عرقلة
          }
          @end

          // =========================================================
          // [2] شاشة الترمنال الموحدة (Single Radar Terminal)
          // =========================================================
          @interface SovereignStealthTerminal : UIView
          @property (nonatomic, strong) UITextView *logTerminal;
          @property (nonatomic, strong) SovereignGlassSensor *glassSensor;
          @property (nonatomic, strong) NSTimer *fiveSecondTimer;
          @property (nonatomic, strong) NSMutableArray *logBuffer;

          + (instancetype)sharedTerminal;
          - (void)addLog:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignStealthTerminal

          + (instancetype)sharedTerminal {
              static SovereignStealthTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 160, 50, 320, 200)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor colorWithRed:0.0 green:0.0 blue:0.0 alpha:0.85] colorWithAlphaComponent:0.85];
                  self.layer.cornerRadius = 8;
                  self.layer.borderColor = [UIColor greenColor].CGColor;
                  self.layer.borderWidth = 1.0;
                  self.clipsToBounds = YES;
                  
                  self.logBuffer = [NSMutableArray array];

                  // شريط العنوان
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 25)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.0 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"[ SOVEREIGN STEALTH v106k ]";
                  title.textColor = [UIColor whiteColor];
                  title.font = [UIFont boldSystemFontOfSize:11];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // زر الإغلاق المخفي
                  UIButton *closeBtn = [[UIButton alloc] initWithFrame:CGRectMake(5, 2, 20, 20)];
                  [closeBtn setTitle:@"-" forState:UIControlStateNormal];
                  [closeBtn setTitleColor:[UIColor whiteColor] forState:UIControlStateNormal];
                  [closeBtn addTarget:self action:@selector(hideTerminal) forControlEvents:UIControlEventTouchUpInside];
                  [header addSubview:closeBtn];

                  // نافذة الـ Log الوحيدة
                  self.logTerminal = [[UITextView alloc] initWithFrame:CGRectMake(5, 30, frame.size.width - 10, frame.size.height - 35)];
                  self.logTerminal.backgroundColor = [UIColor clearColor];
                  self.logTerminal.editable = NO;
                  self.logTerminal.selectable = NO;
                  self.logTerminal.layoutManager.allowsNonContiguousLayout = NO;
                  [self addSubview:self.logTerminal];

                  // إعداد المؤقت الصارم (تحديث كل 5 ثواني بالضبط بناءً على أمر الجنرال)
                  self.fiveSecondTimer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self selector:@selector(dispatchFiveSecondUpdate) userInfo:nil repeats:YES];

                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
              }
              return self;
          }

          - (void)hideTerminal { self.hidden = YES; }
          - (void)toggleVisibility {
              self.hidden = !self.hidden;
              if (!self.hidden) [self.superview bringSubviewToFront:self];
          }

          - (void)addLog:(NSString *)msg color:(UIColor *)color {
              NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
              [fmt setDateFormat:@"HH:mm:ss"];
              NSString *fullMsg = [NSString stringWithFormat:@"[%@] %@\n", [fmt stringFromDate:[NSDate date]], msg];
              
              NSAttributedString *str = [[NSAttributedString alloc] initWithString:fullMsg attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:10]}];
              
              @synchronized (self.logBuffer) {
                  [self.logBuffer addObject:str];
                  if (self.logBuffer.count > 10) [self.logBuffer removeObjectAtIndex:0]; // الحفاظ على رام نظيف
              }
              
              dispatch_async(dispatch_get_main_queue(), ^{
                  NSMutableAttributedString *cur = [[NSMutableAttributedString alloc] initWithAttributedString:self.logTerminal.attributedText];
                  [cur appendAttributedString:str];
                  if (cur.length > 800) [cur deleteCharactersInRange:NSMakeRange(0, cur.length - 500)];
                  self.logTerminal.attributedText = cur;
                  [self.logTerminal scrollRangeToVisible:NSMakeRange(self.logTerminal.text.length - 1, 1)];
              });
          }

          // هذه الدالة تعمل كل 5 ثواني فقط! (تمنع الكراش واختناق المعالج)
          - (void)dispatchFiveSecondUpdate {
              if (self.glassSensor && self.glassSensor.lastActionData) {
                  // جلب آخر حدث حصل في اللعبة خلال الـ 5 ثواني الماضية
                  NSString *event = self.glassSensor.lastActionData;
                  [self addLog:event color:[UIColor yellowColor]];
                  
                  // مسح الحدث بعد طباعته
                  self.glassSensor.lastActionData = nil;
              } else {
                  // إذا لم تفعل شيء خلال 5 ثواني، يطبع نبضة هادئة
                  [self addLog:@"[SYSTEM] Waiting for in-game actions..." color:[UIColor lightGrayColor]];
              }
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [3] الإقلاع البارد (Cold Boot)
          // =========================================================
          void __attribute__((constructor)) start_stealth_protocol() {
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification *note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      
                      // تأخير 10 ثواني كاملة لضمان فتح اللعبة بأمان
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(10 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                          
                          UIWindow *win = nil;
                          if (@available(iOS 13.0, *)) {
                              for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                                  if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                              }
                          }
                          #pragma clang diagnostic push
                          #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                          if (!win) win = [UIApplication sharedApplication].keyWindow;
                          #pragma clang diagnostic pop

                          if (win) {
                              // 1. زرع المستشعر الزجاجي فوق اللعبة (مخفي تماماً)
                              SovereignGlassSensor *sensor = [[SovereignGlassSensor alloc] initWithFrame:win.bounds];
                              sensor.backgroundColor = [UIColor clearColor];
                              sensor.userInteractionEnabled = YES;
                              [win addSubview:sensor];
                              
                              // 2. إظهار نافذة الترمنال
                              SovereignStealthTerminal *terminal = [SovereignStealthTerminal sharedTerminal];
                              terminal.glassSensor = sensor; // ربط الترمنال بالمستشعر
                              [win addSubview:terminal];
                              
                              // ثلاث أصابع للإخفاء والإظهار
                              UITapGestureRecognizer *tap = [[UITapGestureRecognizer alloc] initWithTarget:terminal action:@selector(toggleVisibility)];
                              tap.numberOfTouchesRequired = 3; 
                              [win addGestureRecognizer:tap];
                              
                              [terminal addLog:@"[BOOT] Stealth Mode V106k Activated." color:[UIColor cyanColor]];
                              [terminal addLog:@"[INFO] Updating stricty every 5 seconds." color:[UIColor cyanColor]];
                          }
                      });
                  });
              }];
          }
          EOF

          # التجميع السليم للملفات مع إضافة -lc++ لتجنب أخطاء اللينكر
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Stealth_Terminal.m -o Sovereign_Stealth_v106.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Stealth-Terminal-v106k
          path: Sovereign_Stealth_v106.dylib
