name: Sovereign-Ghost-Terminal-v105k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Ghost Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core
        run: |
          cat << 'EOF' > Sovereign_Ghost_Terminal.mm
          /**
           * Project: Sovereign Ghost Terminal v105k (Zero-Crash Edition)
           * Architect: General Wsam Al-Safi
           * Technology: Thread-Locked Swizzling & Independent UIWindow
           * Feature: Safe Anogs/Shadow File Radar & Passive Event Sensor
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <objc/runtime.h>

          // =========================================================
          // [1] النافذة المستقلة (Independent Airspace Window)
          // تمنع الكراش الناتج عن تضارب الواجهات مع محرك اللعبة
          // =========================================================
          @interface SovereignWindow : UIWindow @end
          @implementation SovereignWindow
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              UIView *hitView = [super hitTest:point withEvent:event];
              // إذا كان اللمس على النافذة الشفافة نفسها، تجاهله ليمر للعبة
              if (hitView == self.rootViewController.view) return nil;
              return hitView;
          }
          @end

          // =========================================================
          // [2] محرك الترمنال المزدوج (Dual-Core UI Engine)
          // =========================================================
          @interface SovereignDualTerminal : UIView
          @property (nonatomic, strong) UITextView *fileTerminal;
          @property (nonatomic, strong) UITextView *eventTerminal;
          @property (nonatomic, strong) NSMutableArray *fileBuffer;
          @property (nonatomic, strong) NSMutableArray *eventBuffer;
          @property (nonatomic, strong) NSTimer *flushTimer;

          + (instancetype)sharedTerminal;
          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color;
          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color;
          @end

          @implementation SovereignDualTerminal

          + (instancetype)sharedTerminal {
              static SovereignDualTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 175, 60, 350, 240)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.backgroundColor = [[UIColor colorWithRed:0.05 green:0.05 blue:0.08 alpha:1.0] colorWithAlphaComponent:0.95];
                  self.layer.cornerRadius = 10;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.clipsToBounds = YES;
                  
                  self.fileBuffer = [NSMutableArray array];
                  self.eventBuffer = [NSMutableArray array];

                  // شريط العنوان السيادي
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.15 blue:0.15 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"[ SOVEREIGN GHOST SENSOR v105k ]";
                  title.textColor = [UIColor whiteColor];
                  title.font = [UIFont boldSystemFontOfSize:11];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // 1. خانة الملفات (أصفر)
                  [self addTitle:@"📂 رادار الملفات (Shadow & Anogs):" y:35 color:[UIColor yellowColor]];
                  self.fileTerminal = [self createTerminal:50 height:75 color:[UIColor yellowColor]];
                  [self addSubview:self.fileTerminal];

                  // 2. خانة الأحداث والرمي (أخضر)
                  [self addTitle:@"⚡ مستشعر الأحداث (الرمي / الحركة):" y:130 color:[UIColor greenColor]];
                  self.eventTerminal = [self createTerminal:145 height:85 color:[UIColor greenColor]];
                  [self addSubview:self.eventTerminal];

                  // زر الإغلاق المخفي (يصغر النافذة)
                  UIButton *minBtn = [[UIButton alloc] initWithFrame:CGRectMake(10, 5, 20, 20)];
                  [minBtn setTitle:@"-" forState:UIControlStateNormal];
                  [minBtn setBackgroundColor:[UIColor darkGrayColor]];
                  minBtn.layer.cornerRadius = 4;
                  [minBtn addTarget:self action:@selector(hideTerminal) forControlEvents:UIControlEventTouchUpInside];
                  [header addSubview:minBtn];

                  self.flushTimer = [NSTimer scheduledTimerWithTimeInterval:0.4 target:self selector:@selector(flushLogsSafe) userInfo:nil repeats:YES];

                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
                  self.userInteractionEnabled = YES;
              }
              return self;
          }

          - (void)addTitle:(NSString *)txt y:(float)y color:(UIColor *)c {
              UILabel *l = [[UILabel alloc] initWithFrame:CGRectMake(15, y, 300, 15)];
              l.text = txt; l.textColor = c; l.font = [UIFont boldSystemFontOfSize:10];
              [self addSubview:l];
          }

          - (UITextView *)createTerminal:(float)y height:(float)h color:(UIColor *)c {
              UITextView *tv = [[UITextView alloc] initWithFrame:CGRectMake(10, y, self.frame.size.width - 20, h)];
              tv.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.7];
              tv.textColor = c;
              tv.font = [UIFont fontWithName:@"Courier-Bold" size:8.5];
              tv.editable = NO; tv.selectable = YES;
              tv.layer.borderColor = [UIColor darkGrayColor].CGColor;
              tv.layer.borderWidth = 0.5; tv.layer.cornerRadius = 6;
              tv.layoutManager.allowsNonContiguousLayout = NO; 
              return tv;
          }

          - (void)hideTerminal { self.hidden = YES; }
          
          // =========================================================
          // [3] نظام الـ Buffer لمنع الكراش
          // =========================================================
          - (void)queueFileLog:(NSString *)msg color:(UIColor *)color { [self safeQueue:msg color:color buffer:self.fileBuffer]; }
          - (void)queueEventLog:(NSString *)msg color:(UIColor *)color { [self safeQueue:msg color:color buffer:self.eventBuffer]; }

          - (void)safeQueue:(NSString *)msg color:(UIColor *)color buffer:(NSMutableArray *)buffer {
              NSDateFormatter *fmt = [[NSDateFormatter alloc] init];
              [fmt setDateFormat:@"HH:mm:ss.SS"];
              NSString *fullMsg = [NSString stringWithFormat:@"[%@] %@\n", [fmt stringFromDate:[NSDate date]], msg];
              NSAttributedString *str = [[NSAttributedString alloc] initWithString:fullMsg attributes:@{NSForegroundColorAttributeName: color, NSFontAttributeName: [UIFont fontWithName:@"Courier-Bold" size:8.5]}];
              
              @synchronized (buffer) {
                  [buffer addObject:str];
                  if (buffer.count > 15) [buffer removeObjectAtIndex:0]; // حماية صارمة للذاكرة
              }
          }

          - (void)flushLogsSafe {
              dispatch_async(dispatch_get_main_queue(), ^{
                  [self flushBuffer:self.fileBuffer toTerminal:self.fileTerminal];
                  [self flushBuffer:self.eventBuffer toTerminal:self.eventTerminal];
              });
          }

          - (void)flushBuffer:(NSMutableArray *)buffer toTerminal:(UITextView *)tv {
              @synchronized (buffer) {
                  if (buffer.count == 0) return;
                  NSMutableAttributedString *cur = [[NSMutableAttributedString alloc] initWithAttributedString:tv.attributedText];
                  for (NSAttributedString *s in buffer) [cur appendAttributedString:s];
                  if (cur.length > 1500) [cur deleteCharactersInRange:NSMakeRange(0, cur.length - 1000)];
                  tv.attributedText = cur;
                  [buffer removeAllObjects];
                  [tv scrollRangeToVisible:NSMakeRange(tv.text.length - 1, 1)];
              }
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [4] المستشعرات الآمنة جداً (Anti-Recursion Sensors)
          // =========================================================
          @interface SovereignSafeSensor : NSObject @end
          @implementation SovereignSafeSensor

          + (void)armSensors {
              @try {
                  // 1. هوك الملفات مع (Thread Lock) لمنع الدوامة اللانهائية
                  Method oFile = class_getInstanceMethod([NSFileManager class], @selector(fileExistsAtPath:));
                  Method sFile = class_getInstanceMethod([self class], @selector(sov_fileExistsAtPath:));
                  method_exchangeImplementations(oFile, sFile);

                  // 2. هوك الأحداث مع (Thread Lock) لمنع اختناق المعالج
                  Method oEvent = class_getInstanceMethod([UIApplication class], @selector(sendEvent:));
                  Method sEvent = class_getInstanceMethod([self class], @selector(sov_sendEvent:));
                  method_exchangeImplementations(oEvent, sEvent);

              } @catch (NSException *e) {}
          }

          // هوك الملفات السري (محمي بقفل Thread Lock لمنع الكراش)
          - (BOOL)sov_fileExistsAtPath:(NSString *)path {
              // *** سر منع الكراش هنا: إذا كنا نطبع حالياً، لا تقم بالبحث عن الملف لكي لا ندخل في دوامة ***
              NSMutableDictionary *threadDict = [[NSThread currentThread] threadDictionary];
              if ([threadDict objectForKey:@"sov_file_lock"]) {
                  return [self sov_fileExistsAtPath:path]; 
              }
              
              [threadDict setObject:@YES forKey:@"sov_file_lock"]; // قفلنا الباب
              
              if (path) {
                  NSString *lowerPath = [path lowercaseString];
                  if ([lowerPath containsString:@"anogs"]) {
                      [[SovereignDualTerminal sharedTerminal] queueFileLog:[NSString stringWithFormat:@"[ANOGS] Reading: %@", [path lastPathComponent]] color:[UIColor redColor]];
                  } else if ([lowerPath containsString:@"shadowtrackerextra"]) {
                      [[SovereignDualTerminal sharedTerminal] queueFileLog:[NSString stringWithFormat:@"[GAME] Access: %@", [path lastPathComponent]] color:[UIColor yellowColor]];
                  }
              }
              
              [threadDict removeObjectForKey:@"sov_file_lock"]; // فتحنا الباب
              return [self sov_fileExistsAtPath:path]; 
          }

          // مستشعر الأحداث (محمي بقفل Thread Lock لتجنب اختناق المعالج)
          - (void)sov_sendEvent:(UIEvent *)event {
              NSMutableDictionary *threadDict = [[NSThread currentThread] threadDictionary];
              if ([threadDict objectForKey:@"sov_event_lock"]) {
                  [self sov_sendEvent:event]; return;
              }
              
              [threadDict setObject:@YES forKey:@"sov_event_lock"];
              
              @try {
                  if (event.type == UIEventTypeTouches) {
                      UITouch *touch = [[event allTouches] anyObject];
                      if (touch.phase == UITouchPhaseBegan) {
                          CGPoint loc = [touch locationInView:nil];
                          // تقسيم الشاشة لمعرفة الرمي من الحركة
                          BOOL isFiring = (loc.y > [UIScreen mainScreen].bounds.size.height * 0.4);
                          NSString *action = isFiring ? @"🔥 FIRE/AIM" : @"🕹️ MOVE/UI";
                          UIColor *col = isFiring ? [UIColor redColor] : [UIColor greenColor];
                          
                          NSString *log = [NSString stringWithFormat:@"[%@] X:%.0f Y:%.0f", action, loc.x, loc.y];
                          [[SovereignDualTerminal sharedTerminal] queueEventLog:log color:col];
                      }
                  }
              } @catch (NSException *e) {}
              
              [threadDict removeObjectForKey:@"sov_event_lock"];
              [self sov_sendEvent:event];
          }
          @end

          // =========================================================
          // [5] بروتوكول الإقلاع الآمن (Safe Window Initialization)
          // =========================================================
          static SovereignWindow *sovWindow = nil;

          void __attribute__((constructor)) start_ghost_protocol() {
              // ننتظر حتى تفتح اللعبة تماماً (Notification)
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification *note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      
                      // تأخير 8 ثواني لضمان استقرار محرك رسوميات اللعبة
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                          
                          // إنشاء نافذة مستقلة للترمنال لكي لا يسبب كراش لواجهة اللعبة
                          sovWindow = [[SovereignWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
                          sovWindow.windowLevel = UIWindowLevelAlert + 1;
                          sovWindow.hidden = NO;
                          sovWindow.backgroundColor = [UIColor clearColor];
                          
                          UIViewController *vc = [[UIViewController alloc] init];
                          vc.view.backgroundColor = [UIColor clearColor];
                          sovWindow.rootViewController = vc;
                          
                          SovereignDualTerminal *terminal = [SovereignDualTerminal sharedTerminal];
                          [vc.view addSubview:terminal];
                          
                          [[SovereignDualTerminal sharedTerminal] queueEventLog:@"[SYSTEM] Ghost Window Active 🛸" color:[UIColor whiteColor]];
                          
                          // تسليح المستشعرات الآمنة
                          [SovereignSafeSensor armSensors];
                      });
                  });
              }];
          }
          EOF

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Ghost_Terminal.mm -o Sovereign_Ghost_v105.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Ghost-Terminal-v105k
          path: Sovereign_Ghost_v105.dylib
