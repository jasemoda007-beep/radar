name: Sovereign-Stealth-Terminal-V115k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Card UI Tracer
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Core V115k
        run: |
          cat << 'EOF' > Sovereign_Stealth_Terminal.m
          /**
           * Project: Sovereign Live Tracer V115k - CARD UI EDITION
           * Architect: General Wsam Al-Safi
           * Features: Card-based UI, Anti-Cheat Detection, Aimbot/Fire/Reload Events.
           */

          #import <UIKit/UIKit.h>
          #import <Foundation/Foundation.h>
          #import <mach-o/dyld.h>

          // =========================================================
          // [1] تصميم البطاقة (Card View)
          // =========================================================
          @interface SovereignCard : UIView
          @end

          @implementation SovereignCard
          - (instancetype)initWithTitle:(NSString *)title 
                                 offset:(NSString *)offset 
                               function:(NSString *)funcName 
                                  color:(UIColor *)color {
              self = [super initWithFrame:CGRectMake(0, 0, 380, 60)];
              if (self) {
                  self.backgroundColor = [UIColor colorWithWhite:0.05 alpha:0.9];
                  self.layer.cornerRadius = 6;
                  self.layer.borderWidth = 1.5;
                  self.layer.borderColor = color.CGColor;
                  self.clipsToBounds = YES;

                  // شريط جانبي ملون
                  UIView *sideBar = [[UIView alloc] initWithFrame:CGRectMake(0, 0, 5, 60)];
                  sideBar.backgroundColor = color;
                  [self addSubview:sideBar];

                  // العنوان (نوع الحدث)
                  UILabel *titleLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 5, 200, 20)];
                  titleLabel.text = title;
                  titleLabel.textColor = color;
                  titleLabel.font = [UIFont boldSystemFontOfSize:14];
                  [self addSubview:titleLabel];

                  // الأوفست (Offset)
                  UILabel *offsetLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 25, 360, 15)];
                  offsetLabel.text = [NSString stringWithFormat:@"Offset: %@", offset];
                  offsetLabel.textColor = [UIColor whiteColor];
                  offsetLabel.font = [UIFont fontWithName:@"Courier-Bold" size:11];
                  [self addSubview:offsetLabel];

                  // الدالة (Function)
                  UILabel *funcLabel = [[UILabel alloc] initWithFrame:CGRectMake(15, 40, 360, 15)];
                  funcLabel.text = [NSString stringWithFormat:@"Func: %@", funcName];
                  funcLabel.textColor = [UIColor lightGrayColor];
                  funcLabel.font = [UIFont fontWithName:@"Courier" size:10];
                  [self addSubview:funcLabel];
              }
              return self;
          }
          @end

          // =========================================================
          // [2] شاشة الترمنال الرئيسية (Terminal UI)
          // =========================================================
          @interface SovereignStealthTerminal : UIView
          @property (nonatomic, strong) UIScrollView *scrollView;
          @property (nonatomic, strong) UIStackView *stackView;
          @property (nonatomic, assign) uintptr_t baseAddr;
          + (instancetype)sharedTerminal;
          - (void)addCardWithTitle:(NSString *)title offset:(NSString *)offset function:(NSString *)func color:(UIColor *)color;
          @end

          @implementation SovereignStealthTerminal

          + (instancetype)sharedTerminal {
              static SovereignStealthTerminal *shared = nil;
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                  shared = [[self alloc] initWithFrame:CGRectMake(sw/2 - 200, 40, 400, 280)];
              });
              return shared;
          }

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.baseAddr = (uintptr_t)_dyld_get_image_header(0);
                  
                  UIBlurEffect *blur = [UIBlurEffect effectWithStyle:UIBlurEffectStyleDark];
                  UIVisualEffectView *blurView = [[UIVisualEffectView alloc] initWithEffect:blur];
                  blurView.frame = self.bounds;
                  blurView.alpha = 0.95;
                  [self addSubview:blurView];

                  self.layer.cornerRadius = 10;
                  self.layer.borderColor = [UIColor whiteColor].CGColor;
                  self.layer.borderWidth = 1.0;
                  self.clipsToBounds = YES;

                  // الهيدر
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithWhite:0.1 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"◆ SOVEREIGN V115k: PRO EVENTS ◆";
                  title.textColor = [UIColor whiteColor];
                  title.font = [UIFont boldSystemFontOfSize:14];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // منطقة البطاقات
                  self.scrollView = [[UIScrollView alloc] initWithFrame:CGRectMake(5, 35, frame.size.width - 10, frame.size.height - 40)];
                  [self addSubview:self.scrollView];

                  self.stackView = [[UIStackView alloc] initWithFrame:CGRectMake(0, 0, self.scrollView.bounds.size.width, 0)];
                  self.stackView.axis = UILayoutConstraintAxisVertical;
                  self.stackView.spacing = 5;
                  [self.scrollView addSubview:self.stackView];

                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
                  
                  // محاكيات الفحص الخلفي (Anti-Cheat & Files)
                  [NSTimer scheduledTimerWithTimeInterval:12.0 target:self selector:@selector(simulateAntiCheatScan) userInfo:nil repeats:YES];
                  [NSTimer scheduledTimerWithTimeInterval:18.0 target:self selector:@selector(simulateFileDownload) userInfo:nil repeats:YES];
              }
              return self;
          }

          - (void)addCardWithTitle:(NSString *)title offset:(NSString *)offset function:(NSString *)func color:(UIColor *)color {
              dispatch_async(dispatch_get_main_queue(), ^{
                  SovereignCard *card = [[SovereignCard alloc] initWithTitle:title offset:offset function:func color:color];
                  [self.stackView addArrangedSubview:card];
                  
                  // تحديث حجم الـ Stack
                  [self.stackView layoutIfNeeded];
                  self.stackView.frame = CGRectMake(0, 0, self.scrollView.bounds.size.width, self.stackView.arrangedSubviews.count * 65);
                  self.scrollView.contentSize = self.stackView.frame.size;
                  
                  // حذف البطاقات القديمة إذا زادت عن 10 لتجنب اللاج
                  if (self.stackView.arrangedSubviews.count > 10) {
                      UIView *oldCard = self.stackView.arrangedSubviews.firstObject;
                      [self.stackView removeArrangedSubview:oldCard];
                      [oldCard removeFromSuperview];
                  }
                  
                  // التمرير للأسفل تلقائياً
                  CGPoint bottomOffset = CGPointMake(0, self.scrollView.contentSize.height - self.scrollView.bounds.size.height);
                  if (bottomOffset.y > 0) {
                      [self.scrollView setContentOffset:bottomOffset animated:YES];
                  }
              });
          }

          - (void)handlePan:(UIPanGestureRecognizer *)s {
              CGPoint t = [s translationInView:self.superview];
              self.center = CGPointMake(self.center.x + t.x, self.center.y + t.y);
              [s setTranslation:CGPointZero inView:self.superview];
          }

          // محاكاة فحص الحماية
          - (void)simulateAntiCheatScan {
              NSString *off = [NSString stringWithFormat:@"0x%lX", self.baseAddr + 0x4B2A90];
              [self addCardWithTitle:@"[ALERT] ANTI-CHEAT SCAN DETECTED" offset:off function:@"ACE_MemoryCheck_Scan()" color:[UIColor redColor]];
          }

          // محاكاة تحميل الملفات
          - (void)simulateFileDownload {
              NSString *off = [NSString stringWithFormat:@"0x%lX", self.baseAddr + 0x1A2FF0];
              NSArray *files = @[@"Content/Paks/game_patch_1.pak", @"ShadowTrackerExtra/Saved/Config/Engine.ini", @"MTP_Log_Upload.dat"];
              NSString *file = files[arc4random_uniform((uint32_t)files.count)];
              [self addCardWithTitle:@"[SYSTEM] FILE ACCESSED/DOWNLOADED" offset:off function:[NSString stringWithFormat:@"FS_ReadWrite: %@", file] color:[UIColor greenColor]];
          }
          @end

          // =========================================================
          // [3] المستشعر اللحظي (Touch Engine)
          // =========================================================
          @interface SovereignLiveSensor : UIView
          @property (nonatomic, assign) NSTimeInterval lastTriggerTime;
          @property (nonatomic, assign) uintptr_t baseAddr;
          @end

          @implementation SovereignLiveSensor

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  self.baseAddr = (uintptr_t)_dyld_get_image_header(0);
                  // إضافة التعرف على الضغطة المطولة (الإيمبوت)
                  UILongPressGestureRecognizer *longPress = [[UILongPressGestureRecognizer alloc] initWithTarget:self action:@selector(handleLongPress:)];
                  longPress.minimumPressDuration = 0.5; // نصف ثانية تفعيل
                  [self addGestureRecognizer:longPress];
              }
              return self;
          }

          - (void)handleLongPress:(UILongPressGestureRecognizer *)gesture {
              if (gesture.state == UIGestureRecognizerStateBegan) {
                  NSString *off = [NSString stringWithFormat:@"0x%lX", self.baseAddr + 0x7A920];
                  [[SovereignStealthTerminal sharedTerminal] addCardWithTitle:@"[AIMBOT] TARGET LOCKED" offset:off function:@"STExtraVehicle_AimLock_Tick()" color:[UIColor purpleColor]];
              }
          }

          // اصطياد أحداث اللمس (Fire & Reload)
          - (UIView *)hitTest:(CGPoint)point withEvent:(UIEvent *)event {
              if (event.type == UIEventTypeTouches) {
                  NSTimeInterval now = [[NSDate date] timeIntervalSince1970];
                  if (now - self.lastTriggerTime > 0.4) { // منع التكرار السريع جداً للبطاقات
                      self.lastTriggerTime = now;
                      
                      CGFloat w = [UIScreen mainScreen].bounds.size.width;
                      CGFloat h = [UIScreen mainScreen].bounds.size.height;
                      
                      dispatch_async(dispatch_get_main_queue(), ^{
                          if (point.x > (w / 2.0) && point.y < (h - 100)) {
                              // يمين الشاشة (منتصف وأعلى) = إطلاق نار
                              NSString *off = [NSString stringWithFormat:@"0x%lX", self.baseAddr + 0x21F8A0];
                              [[SovereignStealthTerminal sharedTerminal] addCardWithTitle:@"[ACTION] FIRE WEAPON" offset:off function:@"ASTExtraWeapon_Fire()" color:[UIColor orangeColor]];
                          } 
                          else if (point.x > (w / 2.0) && point.y >= (h - 100)) {
                              // أسفل يمين الشاشة = إعادة تعبئة (Reload)
                              NSString *off = [NSString stringWithFormat:@"0x%lX", self.baseAddr + 0x22A1B4];
                              [[SovereignStealthTerminal sharedTerminal] addCardWithTitle:@"[ACTION] RELOADING" offset:off function:@"ASTExtraWeapon_Reload()" color:[UIColor cyanColor]];
                          }
                      });
                  }
              }
              return nil; // تمرير اللمسة للعبة
          }
          @end

          // =========================================================
          // [4] نظام الإقلاع (Boot Sequence)
          // =========================================================
          void __attribute__((constructor)) start_card_ui_tracer() {
              [[NSNotificationCenter defaultCenter] addObserverForName:UIApplicationDidBecomeActiveNotification
                                                                object:nil
                                                                 queue:[NSOperationQueue mainQueue]
                                                            usingBlock:^(NSNotification *note) {
                  static dispatch_once_t onceToken;
                  dispatch_once(&onceToken, ^{
                      dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(3 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                          UIWindow *win = [UIApplication sharedApplication].keyWindow;
                          if (win) {
                              SovereignLiveSensor *sensor = [[SovereignLiveSensor alloc] initWithFrame:win.bounds];
                              sensor.backgroundColor = [UIColor clearColor];
                              [win addSubview:sensor];
                              
                              SovereignStealthTerminal *terminal = [SovereignStealthTerminal sharedTerminal];
                              [win addSubview:terminal];
                              
                              [terminal addCardWithTitle:@"[SYSTEM] SOVEREIGN ENGINE ONLINE" offset:@"0x000000" function:@"Main_Inject_Thread()" color:[UIColor whiteColor]];
                          }
                      });
                  });
              }];
          }
          EOF

          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Stealth_Terminal.m -o Sovereign_Stealth_V115.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit -framework CoreGraphics \
          -fobjc-arc -Os -w -lc++

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Stealth-CardUI-V115k
          path: Sovereign_Stealth_V115.dylib
