name: Sovereign-Recon-Terminal-v800k

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Recon Terminal
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Sovereign Recon Core
        run: |
          cat << 'EOF' > Sovereign_Recon_Terminal.mm
          /**
           * Project: Sovereign Recon Terminal v800k (Safe Edition)
           * Architect: General Wsam Al-Safi (Basrah Lab)
           * Feature: Live Memory Offsets + Hidden Files Scanner
           * Tech: 100% Native iOS APIs (Zero Crash / No Substrate)
           */

          #import <UIKit/UIKit.h>
          #import <mach-o/dyld.h>
          #import <Foundation/Foundation.h>

          @interface SovereignReconUI : UIView
          @property (nonatomic, strong) UITextView *consoleOutput;
          @property (nonatomic, strong) UIActivityIndicatorView *spinner;
          @end

          @implementation SovereignReconUI

          - (instancetype)initWithFrame:(CGRect)frame {
              self = [super initWithFrame:frame];
              if (self) {
                  // [1] التصميم العسكري للترمنال
                  self.backgroundColor = [[UIColor blackColor] colorWithAlphaComponent:0.9];
                  self.layer.cornerRadius = 10;
                  self.layer.borderColor = [UIColor cyanColor].CGColor;
                  self.layer.borderWidth = 1.5;
                  self.clipsToBounds = YES;

                  // شريط العنوان
                  UIView *header = [[UIView alloc] initWithFrame:CGRectMake(0, 0, frame.size.width, 30)];
                  header.backgroundColor = [UIColor colorWithRed:0.0 green:0.2 blue:0.2 alpha:1.0];
                  [self addSubview:header];

                  UILabel *title = [[UILabel alloc] initWithFrame:header.bounds];
                  title.text = @"SOVEREIGN RECON v800k";
                  title.textColor = [UIColor cyanColor];
                  title.font = [UIFont boldSystemFontOfSize:10];
                  title.textAlignment = NSTextAlignmentCenter;
                  [header addSubview:title];

                  // أزرار التحكم السيادية
                  UIButton *btnMemory = [self createButton:@"رادار الذاكرة (Offsets)" frame:CGRectMake(5, 35, (frame.size.width/2)-10, 25) color:[UIColor systemGreenColor]];
                  [btnMemory addTarget:self action:@selector(scanMemoryOffsets) forControlEvents:UIControlEventTouchUpInside];
                  [self addSubview:btnMemory];

                  UIButton *btnFiles = [self createButton:@"رادار الملفات المخفية" frame:CGRectMake((frame.size.width/2)+5, 35, (frame.size.width/2)-10, 25) color:[UIColor systemOrangeColor]];
                  [btnFiles addTarget:self action:@selector(scanHiddenFiles) forControlEvents:UIControlEventTouchUpInside];
                  [self addSubview:btnFiles];

                  // شاشة الترمنال الخضراء
                  self.consoleOutput = [[UITextView alloc] initWithFrame:CGRectMake(5, 65, frame.size.width - 10, frame.size.height - 70)];
                  self.consoleOutput.backgroundColor = [UIColor colorWithRed:0.05 green:0.05 blue:0.05 alpha:1.0];
                  self.consoleOutput.textColor = [UIColor colorWithRed:0.0 green:1.0 blue:0.4 alpha:1.0]; // أخضر ماتريكس
                  self.consoleOutput.font = [UIFont fontWithName:@"Courier-Bold" size:8.5];
                  self.consoleOutput.editable = NO;
                  self.consoleOutput.selectable = YES; // للسماح للجنرال بالنسخ
                  self.consoleOutput.layer.borderWidth = 0.5;
                  self.consoleOutput.layer.borderColor = [UIColor darkGrayColor].CGColor;
                  [self addSubview:self.consoleOutput];

                  // مؤشر التحميل
                  self.spinner = [[UIActivityIndicatorView alloc] initWithActivityIndicatorStyle:UIActivityIndicatorViewStyleWhite];
                  self.spinner.center = CGPointMake(frame.size.width - 15, 15);
                  [self addSubview:self.spinner];

                  // إيماءة التحريك (Drag)
                  UIPanGestureRecognizer *pan = [[UIPanGestureRecognizer alloc] initWithTarget:self action:@selector(handlePan:)];
                  [header addGestureRecognizer:pan];
                  self.userInteractionEnabled = YES;
                  
                  [self printLog:@"[SYSTEM] Sovereign Recon Terminal Initialized.\n[SYSTEM] Awaiting Commander Orders..."];
              }
              return self;
          }

          - (UIButton *)createButton:(NSString *)title frame:(CGRect)frame color:(UIColor *)color {
              UIButton *btn = [[UIButton alloc] initWithFrame:frame];
              [btn setTitle:title forState:UIControlStateNormal];
              [btn setTitleColor:color forState:UIControlStateNormal];
              btn.titleLabel.font = [UIFont boldSystemFontOfSize:9];
              btn.layer.borderColor = color.CGColor;
              btn.layer.borderWidth = 1.0;
              btn.layer.cornerRadius = 5;
              return btn;
          }

          - (void)printLog:(NSString *)text {
              dispatch_async(dispatch_get_main_queue(), ^{
                  self.consoleOutput.text = [NSString stringWithFormat:@"%@\n%@", self.consoleOutput.text, text];
                  NSRange range = NSMakeRange(self.consoleOutput.text.length - 1, 1);
                  [self.consoleOutput scrollRangeToVisible:range];
              });
          }

          // =========================================================
          // [🧠] محرك رصد الذاكرة والأوفستات الحية (ASLR Scanner)
          // =========================================================
          - (void)scanMemoryOffsets {
              [self.spinner startAnimating];
              self.consoleOutput.text = @"";
              [self printLog:@"[SCAN] Initiating Live Memory Offset Scan..."];
              
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0), ^{
                  uint32_t count = _dyld_image_count();
                  NSMutableString *report = [NSMutableString string];
                  [report appendString:@"\n--- [ ACTIVE MEMORY OFFSETS ] ---\n"];
                  
                  for (uint32_t i = 0; i < count; i++) {
                      const char *name = _dyld_get_image_name(i);
                      if (!name) continue;
                      
                      NSString *path = [NSString stringWithUTF8String:name];
                      NSString *fileName = [path lastPathComponent];
                      uintptr_t slide = _dyld_get_image_vmaddr_slide(i);
                      
                      // فلترة لتقليل الضجيج، نعرض اللعبة والحمايات فقط
                      if ([path containsString:@"ShadowTracker"] || [path containsString:@"anogs"] || [path containsString:@"MMKV"] || [path containsString:@"Plugin"]) {
                          [report appendFormat:@"[Target]: %@\n[Base Offset]: 0x%lx\n------------------------\n", fileName, slide];
                      }
                  }
                  
                  [self printLog:report];
                  dispatch_async(dispatch_get_main_queue(), ^{ [self.spinner stopAnimating]; });
              });
          }

          // =========================================================
          // [🕵️] محرك رصد الملفات المخفية (Deep Folder Scanner)
          // =========================================================
          - (void)scanHiddenFiles {
              [self.spinner startAnimating];
              self.consoleOutput.text = @"";
              [self printLog:@"[SCAN] Breaching App Sandbox... Extracting hidden files..."];
              
              dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_BACKGROUND, 0), ^{
                  NSMutableString *report = [NSMutableString string];
                  [report appendString:@"\n--- [ HIDDEN DOWNLOADED FILES ] ---\n"];
                  
                  NSFileManager *fm = [NSFileManager defaultManager];
                  NSString *docPath = [NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES) firstObject];
                  NSString *libPath = [NSSearchPathForDirectoriesInDomains(NSLibraryDirectory, NSUserDomainMask, YES) firstObject];
                  
                  NSArray *searchPaths = @[docPath, libPath];
                  
                  for (NSString *basePath in searchPaths) {
                      NSDirectoryEnumerator *enumerator = [fm enumeratorAtPath:basePath];
                      NSString *file;
                      while ((file = [enumerator nextObject])) {
                          // البحث عن الملفات المشبوهة التي تنزلها الحماية أو اللعبة (حجمها أو امتدادها)
                          if ([file hasSuffix:@".dat"] || [file hasSuffix:@".pak"] || [file hasSuffix:@".dylib"] || [file hasSuffix:@".json"] || [file containsString:@"anogs"] || [file containsString:@"Tencent"]) {
                              
                              NSString *fullPath = [basePath stringByAppendingPathComponent:file];
                              NSDictionary *attrs = [fm attributesOfItemAtPath:fullPath error:nil];
                              long long size = [attrs fileSize];
                              
                              [report appendFormat:@"[File]: %@\n[Size]: %lld Bytes\n------------------------\n", file, size];
                          }
                      }
                  }
                  
                  if (report.length < 50) {
                      [report appendString:@"No suspicious files found.\n"];
                  }
                  
                  [self printLog:report];
                  dispatch_async(dispatch_get_main_queue(), ^{ [self.spinner stopAnimating]; });
              });
          }

          // نظام التحريك
          - (void)handlePan:(UIPanGestureRecognizer *)gesture {
              CGPoint translation = [gesture translationInView:self.superview];
              self.center = CGPointMake(self.center.x + translation.x, self.center.y + translation.y);
              [gesture setTranslation:CGPointZero inView:self.superview];
          }
          @end

          // =========================================================
          // [🚀] صاعق الإقلاع الشبح (Entry Point)
          // =========================================================
          void __attribute__((constructor)) start_recon_terminal() {
              // تأخير 8 ثوانٍ لضمان استقرار اللعبة بالكامل ومنع أي تصادم
              dispatch_after(dispatch_time(DISPATCH_TIME_NOW, (int64_t)(8 * NSEC_PER_SEC)), dispatch_get_main_queue(), ^{
                  
                  UIWindow *win = nil;
                  if (@available(iOS 13.0, *)) {
                      for (UIWindowScene* scene in [UIApplication sharedApplication].connectedScenes) {
                          if (scene.activationState == UISceneActivationStateForegroundActive) { win = scene.windows.firstObject; break; }
                      }
                  }
                  #pragma clang diagnostic push
                  #pragma clang diagnostic ignored "-Wdeprecated-declarations"
                  if (!win) win = [UIApplication sharedApplication].keyWindow;
                  #pragma clang diagnostic pop

                  if (win) {
                      CGFloat sw = [UIScreen mainScreen].bounds.size.width;
                      // وضع الترمنال في مكان مريح (المنتصف يميناً)
                      SovereignReconUI *ui = [[SovereignReconUI alloc] initWithFrame:CGRectMake(sw - 280, 100, 270, 300)];
                      [win addSubview:ui];
                  }
              });
          }
          EOF

          # عملية الصهر المليمتري
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 Sovereign_Recon_Terminal.mm -o Sovereign_Recon.dylib \
          -isysroot $SDK_PATH \
          -framework Foundation -framework UIKit \
          -fobjc-arc -Os -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Recon-Dylib
          path: Sovereign_Recon.dylib
