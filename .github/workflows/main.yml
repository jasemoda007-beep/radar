name: Build Wessam Pro Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install ldid
          brew install dpkg

      - name: Setup Theos (بيئة البناء)
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Setup iOS SDKs (مكاتب أبل)
        run: |
          curl -LO https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          cp -R sdks-master/* ~/theos/sdks/
         
          
          
          
                - name: Setup Theos (بيئة البناء)
        run: |
          # تنزيل Theos برابط مباشر من المستودع بدلاً من السكربت الرسمي
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          
          
          
          
          rm -rf master.zip sdks-master

      - name: Fetch ImGui Library (جلب ملفات الرسم الناقصة)
        run: |
          mkdir -p ImGui
          git clone --depth 1 https://github.com/ocornut/imgui.git temp_imgui
          cp temp_imgui/*.cpp ImGui/
          cp temp_imgui/*.h ImGui/
          cp temp_imgui/backends/imgui_impl_metal.* ImGui/
          rm -rf temp_imgui

      - name: Build Tweak (عملية الصهر)
        run: |
          make clean
          make FINALPACKAGE=1

      - name: Upload Dylib Artifact (رفع السبيكة الجاهزة)
        uses: actions/upload-artifact@v4
        with:
          name: WessamMod-Dylib-Ready
          path: .theos/obj/**/*.dylib 
