name: Build Wessam Pro Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch ImGui Library
        run: |
          mkdir -p ImGui
          git clone --depth 1 https://github.com/ocornut/imgui.git temp_imgui
          cp temp_imgui/*.cpp ImGui/
          cp temp_imgui/*.h ImGui/
          cp temp_imgui/backends/imgui_impl_metal.* ImGui/
          rm -rf temp_imgui
          echo "✅ ImGui Metal backend is ready!"

      - name: Setup Theos
        # استخدمنا هنا التوكن الخاص بجيت هوب لإجبار النظام على التحميل بدون طلب يوزر وباسورد
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          export THEOS=~/theos
          rm -rf $THEOS
          git clone --recursive --quiet --depth 1 https://github.com/theos/theos.git $THEOS
          
          # حل مشكلة الـ SDKs الجذري
          mkdir -p $THEOS/sdks
          cd $THEOS/sdks
          # تحميل الـ SDK 16.5 مباشرة (الأكثر استقراراً لبوبجي) عن طريق رابط مباشر لتجنب تعقيدات git clone
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz
          rm iPhoneOS16.5.sdk.tar.xz
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Wessam-Pro-Build
          path: packages/*.deb
          
