name: Build Wessam Pro Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch ImGui Library
        run: |
          mkdir -p ImGui
          git clone --depth 1 https://github.com/ocornut/imgui.git temp_imgui
          cp temp_imgui/*.cpp ImGui/
          cp temp_imgui/*.h ImGui/
          cp temp_imgui/backends/imgui_impl_metal.* ImGui/
          rm -rf temp_imgui
          echo "✅ ImGui Metal backend is ready!"

      - name: Setup Theos
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          export THEOS=~/theos
          # الخطوة الأهم: تنظيف المسار تماماً لتجنب خطأ 128
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # حذف مجلد sdks الافتراضي (إذا وجد) لضمان تحميل الـ SDKs الجديدة بنجاح
          rm -rf $THEOS/sdks
          git clone https://github.com/Theos-SDKS/iOS-SDKs.git $THEOS/sdks
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Wessam-Pro-Build
          path: packages/*.deb
