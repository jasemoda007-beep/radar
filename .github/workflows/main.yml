name: Build Wessam Pro Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch ImGui Library
        run: |
          mkdir -p ImGui
          git clone --depth 1 https://github.com/ocornut/imgui.git temp_imgui
          cp temp_imgui/*.cpp ImGui/
          cp temp_imgui/*.h ImGui/
          cp temp_imgui/backends/imgui_impl_metal.* ImGui/
          rm -rf temp_imgui
          echo "✅ ImGui Metal backend is ready!"

      - name: Setup Theos
        # هذا المتغير يمنع جيت هوب من طلب اسم المستخدم والباسورد
        env:
          GIT_TERMINAL_PROMPT: 0
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          export THEOS=~/theos
          rm -rf $THEOS
          # تحميل Theos الأساسي
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS
          
          # تنظيف مجلد الـ SDKs تماماً
          rm -rf $THEOS/sdks
          # تحميل الـ SDKs من مصدر (Mirror) فائق الاستقرار ومخصص لجيت هوب أكشنز
          git clone --depth 1 https://github.com/Theos-SDKS/iOS-SDKs.git $THEOS/sdks
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=~/theos
          # تنفيذ بناء ملف الـ dylib
          make package FINALPACKAGE=1
          
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Wessam-Pro-Build
          path: packages/*.deb
