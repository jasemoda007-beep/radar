name: 🦅 W-MASTER Dylib Builder

# متى يشتغل هذا السكربت؟ 
# يشتغل تلقائياً أول ما تسوي Push (رفع) لأي تعديل على الكود مالتك
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # يخليك تكدر تشغله يدوياً من واجهة GitHub

jobs:
  build_dylib:
    name: طبخ حماية محمد الشمري (iOS)
    runs-on: macos-latest # نستخدم سيرفر ماك لأننا نبرمج للايفون

    steps:
    # 1. سحب الكود مالتك من الريبو
    - name: 📥 جلب ملفات المشروع
      uses: actions/checkout@v3
      with:
        submodules: recursive # جلب مكتبات ImGui و Dobby إذا كانت Submodules

    # 2. تجهيز بيئة التطوير (Xcode و Clang)
    - name: 🛠️ تجهيز أدوات بناء الايفون (SDK)
      run: |
        echo "جاري تجهيز بيئة حماية محمد الشمري..."
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        
    # 3. تثبيت المكتبات الخارجية المطلوبة (مثل Curl للاتصال باللوحة)
    - name: 📦 تثبيت مكتبة Curl و Json
      run: |
        brew install curl
        brew install nlohmann-json # مكتبة json.hpp اللي استخدمناها بالكود

    # 4. عملية الصهر (Compile) - تحويل الـ C++ إلى .dylib
    - name: 🔥 دمج الكود وصناعة الـ Dylib
      run: |
        echo "بدأ عملية الصهر..."
        
        # إنشاء مجلد للمخرجات
        mkdir -p build_output
        
        # أمر الترجمة العنيف (Clang) للايفون (arm64)
        xcrun --sdk iphoneos clang++ -arch arm64 -shared \
        -std=c++17 -O3 -fobjc-arc \
        -I./imgui -I./dobby/include -I/usr/local/include \
        wsam.cpp \
        ./imgui/imgui.cpp ./imgui/imgui_draw.cpp ./imgui/imgui_widgets.cpp ./imgui/imgui_tables.cpp \
        -L./dobby/lib -ldobby \
        -framework Foundation -framework UIKit -framework Metal -framework QuartzCore \
        -lcurl \
        -o build_output/WMASTER_Shammari.dylib
        
        echo "✅ تمت عملية الصهر بنجاح! ملف Dylib جاهز."

    # 5. رفع الملف الناتج (Artifact) حتى تكدر تحمله
    - name: 📤 رفع ملف الـ Dylib الجاهز للتحميل
      uses: actions/upload-artifact@v3
      with:
        name: WMASTER-Shammari-iOS
        path: build_output/WMASTER_Shammari.dylib
